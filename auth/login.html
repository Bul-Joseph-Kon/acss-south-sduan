<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Sign In - SSRA Customs</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <link href="../assets/icons/remixicon.css" rel="stylesheet">
    <style>
        .ssra-logo-text { background: linear-gradient(135deg, #1a365d 0%, #2563eb 100%); }
        .auth-card { background: white; border-radius: 1.5rem; box-shadow: 0 20px 60px rgba(0,0,0,0.08); }
        
        /* Forgot Password Modal */
        .modal-overlay {
            display: none;
            position: fixed;
            top: 0;
            left: 0;
            width: 100%;
            height: 100%;
            background: rgba(0,0,0,0.5);
            z-index: 1000;
            align-items: center;
            justify-content: center;
            backdrop-filter: blur(4px);
        }
        .modal-overlay.show { display: flex; }
        .modal-box {
            background: white;
            border-radius: 1.5rem;
            padding: 2rem;
            max-width: 420px;
            width: 90%;
            box-shadow: 0 20px 60px rgba(0,0,0,0.3);
            animation: modalSlide 0.3s ease;
        }
        @keyframes modalSlide {
            from { transform: translateY(-30px); opacity: 0; }
            to { transform: translateY(0); opacity: 1; }
        }
        .modal-box h3 { font-size: 1.2rem; font-weight: 700; color: #1f2937; margin-bottom: 0.5rem; }
        .modal-box p { font-size: 0.85rem; color: #6b7280; margin-bottom: 1.25rem; }
        .modal-box .input-group { margin-bottom: 1rem; }
        .modal-box .input-group label { display: block; font-size: 0.8rem; font-weight: 600; color: #374151; margin-bottom: 0.25rem; }
        .modal-box .input-group input { width: 100%; padding: 0.6rem 0.8rem; border: 1px solid #e5e7eb; border-radius: 0.5rem; font-size: 0.9rem; transition: 0.2s; }
        .modal-box .input-group input:focus { outline: none; border-color: #1a365d; box-shadow: 0 0 0 2px rgba(26,54,93,0.1); }
        .modal-actions { display: flex; gap: 0.75rem; margin-top: 1rem; }
        .modal-actions button { flex: 1; padding: 0.6rem; border-radius: 0.5rem; font-weight: 600; border: none; cursor: pointer; transition: 0.2s; }
        .btn-primary { background: #1a365d; color: white; }
        .btn-primary:hover { background: #15294a; }
        .btn-secondary { background: #e5e7eb; color: #374151; }
        .btn-secondary:hover { background: #d1d5db; }
        .btn-emerald { background: #059669; color: white; }
        .btn-emerald:hover { background: #047857; }
        .btn-danger { background: #dc2626; color: white; }
        .btn-danger:hover { background: #b91c1c; }
        .toast {
            position: fixed;
            bottom: 2rem;
            right: 2rem;
            padding: 0.75rem 1.25rem;
            border-radius: 0.75rem;
            color: white;
            font-weight: 600;
            font-size: 0.9rem;
            z-index: 2000;
            box-shadow: 0 10px 30px rgba(0,0,0,0.2);
            display: none;
            animation: toastIn 0.3s ease;
            max-width: 360px;
        }
        .toast.success { background: #059669; }
        .toast.error { background: #dc2626; }
        .toast.info { background: #2563eb; }
        @keyframes toastIn {
            from { transform: translateX(30px); opacity: 0; }
            to { transform: translateX(0); opacity: 1; }
        }
    </style>
</head>
<body class="bg-gray-100 min-h-screen flex items-center justify-center p-4">

    <!-- Toast Notification -->
    <div id="toast" class="toast"></div>

    <!-- Forgot Password Modal -->
    <div id="forgotModal" class="modal-overlay">
        <div class="modal-box">
            <div class="text-center mb-4">
                <div class="w-14 h-14 rounded-full bg-blue-50 flex items-center justify-center mx-auto mb-3">
                    <i class="ri-key-2-line text-2xl text-blue-900"></i>
                </div>
                <h3>Reset Password</h3>
                <p>Enter your email or ID number and we'll send you a reset link.</p>
            </div>
            
            <div class="input-group">
                <label>Email or ID Number</label>
                <input type="text" id="resetIdentifier" placeholder="Enter your email or ID">
            </div>
            
            <div class="modal-actions">
                <button class="btn-secondary" id="cancelResetBtn">Cancel</button>
                <button class="btn-primary" id="sendResetBtn">Send Reset Link</button>
            </div>
        </div>
    </div>

    <!-- Main Login Card -->
    <div class="auth-card max-w-md w-full p-8">
        <div class="text-center mb-8">
            <div class="w-20 h-20 rounded-2xl ssra-logo-text flex items-center justify-center text-white shadow-lg mx-auto mb-4">
                <div class="text-center"><i class="ri-government-line text-3xl block"></i><span class="text-[10px] font-bold tracking-wider">SSRA</span></div>
            </div>
            <h2 class="text-2xl font-bold text-gray-800">Welcome Back</h2>
            <p class="text-gray-500 text-sm mt-1">Sign in to your customs account</p>
        </div>

        <form id="loginForm">
            <div class="mb-4">
                <label class="block text-gray-700 font-semibold text-sm mb-2">Email / ID Number</label>
                <input type="text" id="loginIdentifier" placeholder="Enter your email or ID" class="w-full px-4 py-3 border rounded-lg focus:ring-2 focus:ring-emerald-400 outline-none" required>
            </div>
            <div class="mb-6">
                <label class="block text-gray-700 font-semibold text-sm mb-2">Password</label>
                <input type="password" id="loginPassword" placeholder="Enter your password" class="w-full px-4 py-3 border rounded-lg focus:ring-2 focus:ring-emerald-400 outline-none" required>
            </div>

            <!-- Forgot Password Link -->
            <div class="text-right mb-4">
                <a href="#" id="forgotPasswordLink" class="text-sm text-blue-600 hover:text-blue-800 hover:underline font-medium">
                    Forgot Password?
                </a>
            </div>

            <button type="submit" class="w-full bg-emerald-600 text-white py-3 rounded-lg font-semibold hover:bg-emerald-700 transition">Sign In</button>
        </form>

        <p class="text-center text-gray-500 mt-6 text-sm">Don't have an account? <a href="register.html" class="text-emerald-600 hover:underline font-semibold">Register</a></p>
        <p class="text-center text-gray-400 mt-2 text-xs"><a href="../index.html" class="hover:text-gray-600">← Back to Home</a></p>
    </div>

    <script type="module">
        import { signIn, signOut, resetPassword, redirectToDashboard, checkAuth } from '../js/auth.js';

        // ============ FORGOT PASSWORD ============
        function openForgotModal() {
            document.getElementById('forgotModal').classList.add('show');
            document.getElementById('resetIdentifier').value = '';
            document.getElementById('resetIdentifier').focus();
        }

        function closeForgotModal() {
            document.getElementById('forgotModal').classList.remove('show');
        }

        async function handleForgotPassword() {
            const identifier = document.getElementById('resetIdentifier').value.trim();
            if (!identifier) {
                showToast('Please enter your email address', 'error');
                return;
            }

            const result = await resetPassword(identifier);
            if (result.success) {
                showToast('Password reset email sent! Check your inbox.', 'success');
                closeForgotModal();
            } else {
                showToast(result.error || 'Failed to send reset email', 'error');
            }
        }

        // Close modal on overlay click
        document.getElementById('forgotModal').addEventListener('click', function(e) {
            if (e.target === this) closeForgotModal();
        });

        // Close modal on Escape key
        document.addEventListener('keydown', function(e) {
            if (e.key === 'Escape') closeForgotModal();
            if (e.key === 'Enter' && document.getElementById('forgotModal').classList.contains('show')) {
                handleForgotPassword();
            }
        });

        // ============ TOAST NOTIFICATION ============
        function showToast(message, type) {
            const toast = document.getElementById('toast');
            toast.textContent = message;
            toast.className = 'toast ' + (type || 'info');
            toast.style.display = 'block';
            clearTimeout(toast._timeout);
            toast._timeout = setTimeout(function() {
                toast.style.display = 'none';
            }, 5000);
        }

        // ============ SIGN OUT ============
        async function handleSignOut() {
            const result = await signOut();
            if (result.success) {
                showToast('You have been signed out successfully.', 'info');
                document.getElementById('signedInBanner').classList.add('hidden');
                document.getElementById('loginIdentifier').value = '';
                document.getElementById('loginPassword').value = '';
                document.getElementById('loginIdentifier').focus();
            } else {
                showToast(result.error || 'Failed to sign out', 'error');
            }
        }

        // ============ SIGN IN ============
        function getQueryParam(name) {
            return new URLSearchParams(window.location.search).get(name);
        }

        function getRedirectDestination(role) {
            const redirect = getQueryParam('redirect');
            if (redirect) {
                try {
                    const decoded = decodeURIComponent(redirect);
                    if (!decoded.includes('://')) {
                        return decoded;
                    }
                } catch (e) {
                    console.warn('Invalid redirect URL', redirect);
                }
            }
            return redirectToDashboard(role);
        }

        async function handleSignIn() {
            const identifier = document.getElementById('loginIdentifier').value.trim();
            const password = document.getElementById('loginPassword').value;

            if (!identifier || !password) {
                showToast('Please enter both email and password.', 'error');
                return;
            }

            console.log('=== HANDLE SIGN IN ===');
            console.log('Identifier:', identifier);

            // Treat identifier as email for Supabase auth
            const result = await signIn(identifier, password);

            console.log('=== SIGN IN RESULT ===');
            console.log('Success:', result.success);
            console.log('Profile:', result.profile);

            if (result.success) {
                const role = result.profile?.role;
                console.log('=== REDIRECTING BASED ON ROLE ===');
                console.log('Role from profile:', role);
                
                if (!role) {
                    console.error('No role found in profile!');
                    showToast('Invalid user profile. Please contact administrator.', 'error');
                    return;
                }
                
                showToast('Welcome back! Redirecting...', 'success');
                setTimeout(() => {
                    const dashboardUrl = getRedirectDestination(role);
                    console.log('Dashboard URL:', dashboardUrl);
                    // Prepend ../ to navigate from auth folder to pages folder
                    if (dashboardUrl && dashboardUrl !== 'undefined') {
                        console.log('=== FINAL REDIRECT ===');
                        const targetUrl = dashboardUrl.startsWith('/') ? dashboardUrl : '../' + dashboardUrl;
                        console.log('Redirecting to:', targetUrl);
                        window.location.href = targetUrl;
                    } else {
                        console.error('Invalid dashboard URL for role:', role);
                        showToast('Error redirecting to dashboard', 'error');
                    }
                }, 500);
            } else {
                showToast(result.error || 'Invalid credentials', 'error');
            }
        }

        // Initialize on load
        document.addEventListener('DOMContentLoaded', function() {
            // Attach form submit handler
            document.getElementById('loginForm').addEventListener('submit', function(e) {
                e.preventDefault();
                handleSignIn();
            });

            // Attach forgot password link handler
            document.getElementById('forgotPasswordLink').addEventListener('click', function(e) {
                e.preventDefault();
                openForgotModal();
            });

            // Attach cancel button handler
            document.getElementById('cancelResetBtn').addEventListener('click', function(e) {
                e.preventDefault();
                closeForgotModal();
            });

            // Attach send reset link button handler
            document.getElementById('sendResetBtn').addEventListener('click', function(e) {
                e.preventDefault();
                handleForgotPassword();
            });
        });
    </script>

    <script type="module">
        import { signIn, checkAuth, dashboardUrls } from '../js/auth.js';
        import { ERROR_MESSAGES } from '../js/config.js';
        import supabase from '../js/supabase.js';

        // Make functions globally available
        window.signIn = signIn;
        window.checkAuth = checkAuth;
        window.dashboardUrls = dashboardUrls;
        window.ERROR_MESSAGES = ERROR_MESSAGES;
        console.log('Login authentication system initialized successfully');

        // Handle post-email confirmation redirect
        async function handleEmailConfirmation() {
            try {
                // Check if user has access token (email confirmed)
                const { data: { user } } = await supabase.auth.getUser();
                
                if (user) {
                    console.log('Email confirmed user detected, auto-redirecting...');
                    
                    // Get user profile
                    const { data: profile } = await supabase
                        .from('profiles')
                        .select('*')
                        .eq('user_id', user.id)
                        .single();

                    if (profile) {
                        // Store session in localStorage
                        localStorage.setItem('isLoggedIn', 'true');
                        localStorage.setItem('userName', profile.full_name);
                        localStorage.setItem('userEmail', user.email);
                        localStorage.setItem('userRole', profile.role);
                        localStorage.setItem('userIdentifier', profile.id);

                        // Redirect to dashboard
                        const dashboardUrl = dashboardUrls[profile.role] || dashboardUrls.trader;
                        window.location.href = dashboardUrl;
                    }
                }
            } catch (error) {
                console.error('Post-confirmation redirect error:', error);
            }
        }

        // Check for email confirmation callback on page load
        if (window.location.hash.includes('access_token') || window.location.hash.includes('type=recovery')) {
            console.log('Email confirmation or recovery token detected');
            handleEmailConfirmation();
        }
    </script>

</body>
</html>
