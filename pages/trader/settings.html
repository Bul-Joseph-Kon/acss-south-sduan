<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>SSRA Customs · Settings</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <link href="https://cdn.jsdelivr.net/npm/remixicon@4.2.0/fonts/remixicon.css" rel="stylesheet" />
    <script type="module" src="../../js/trader-sidebar.js"></script>
    <style>
        .gradient-bg { background: linear-gradient(135deg, #0a4d3e 0%, #0a6b58 100%); }
    </style>
</head>
<body>
    <div class="min-h-screen bg-gray-100">
        <div class="max-w-7xl mx-auto px-4 py-5">
            <div class="flex flex-col lg:flex-row gap-6">
                <aside class="lg:w-72 flex-shrink-0">
                    <div id="trader-sidebar"></div>
                </aside>

                <main class="flex-1 space-y-5">
                    <div class="gradient-bg rounded-2xl p-5 text-white shadow-lg">
                        <h2 class="text-2xl font-bold tracking-tight">⚙️ Settings</h2>
                        <p class="opacity-90 text-sm">Manage your account preferences</p>
                    </div>

                    <div class="bg-white rounded-2xl shadow-sm border border-gray-200 p-6">
                        <div id="settingsContent">
                            <div class="text-center py-8">
                                <div class="animate-spin rounded-full h-8 w-8 border-b-2 border-emerald-600 mx-auto mb-2"></div>
                                Loading settings...
                            </div>
                        </div>
                    </div>
                </main>
            </div>
        </div>
    </div>

    <script type="module">
        import { getUserProfile, getCurrentUser } from '../../js/auth.js';

        async function loadSettings() {
            try {
                const user = await getCurrentUser();
                if (!user) {
                    window.location.href = '../../auth/login.html';
                    return;
                }

                const profile = await getUserProfile(user.id);
                if (!profile) {
                    document.getElementById('settingsContent').innerHTML = '<p class="text-red-500">Profile not found</p>';
                    return;
                }

                document.getElementById('settingsContent').innerHTML = `
                    <div class="space-y-6">
                        <div class="pb-6 border-b">
                            <h3 class="text-lg font-semibold text-gray-900 mb-2">Account Settings</h3>
                            <p class="text-gray-500 text-sm">Manage your account preferences and notifications</p>
                        </div>

                        <div class="space-y-4">
                            <div class="flex items-center justify-between p-4 bg-gray-50 rounded-lg">
                                <div>
                                    <h4 class="font-medium text-gray-900">Email Notifications</h4>
                                    <p class="text-sm text-gray-500">Receive email updates about your applications</p>
                                </div>
                                <label class="relative inline-flex items-center cursor-pointer">
                                    <input type="checkbox" class="sr-only peer" checked>
                                    <div class="w-11 h-6 bg-gray-200 peer-focus:outline-none peer-focus:ring-4 peer-focus:ring-emerald-300 rounded-full peer peer-checked:after:translate-x-full peer-checked:after:border-white after:content-[''] after:absolute after:top-[2px] after:left-[2px] after:bg-white after:border-gray-300 after:border after:rounded-full after:h-5 after:w-5 after:transition-all peer-checked:bg-emerald-600"></div>
                                </label>
                            </div>

                            <div class="flex items-center justify-between p-4 bg-gray-50 rounded-lg">
                                <div>
                                    <h4 class="font-medium text-gray-900">SMS Notifications</h4>
                                    <p class="text-sm text-gray-500">Receive SMS alerts for important updates</p>
                                </div>
                                <label class="relative inline-flex items-center cursor-pointer">
                                    <input type="checkbox" class="sr-only peer">
                                    <div class="w-11 h-6 bg-gray-200 peer-focus:outline-none peer-focus:ring-4 peer-focus:ring-emerald-300 rounded-full peer peer-checked:after:translate-x-full peer-checked:after:border-white after:content-[''] after:absolute after:top-[2px] after:left-[2px] after:bg-white after:border-gray-300 after:border after:rounded-full after:h-5 after:w-5 after:transition-all peer-checked:bg-emerald-600"></div>
                                </label>
                            </div>

                            <div class="flex items-center justify-between p-4 bg-gray-50 rounded-lg">
                                <div>
                                    <h4 class="font-medium text-gray-900">Two-Factor Authentication</h4>
                                    <p class="text-sm text-gray-500">Add an extra layer of security to your account</p>
                                </div>
                                <button class="px-4 py-2 bg-emerald-600 text-white rounded-lg text-sm font-medium hover:bg-emerald-700 transition">
                                    Enable
                                </button>
                            </div>
                        </div>

                        <div class="pt-6 border-t">
                            <h3 class="text-lg font-semibold text-gray-900 mb-4">Language & Region</h3>
                            <div class="grid grid-cols-1 md:grid-cols-2 gap-4">
                                <div>
                                    <label class="block text-sm font-medium text-gray-700 mb-1">Language</label>
                                    <select class="w-full border border-gray-300 rounded-lg px-3 py-2 text-gray-900">
                                        <option>English</option>
                                        <option>Arabic</option>
                                    </select>
                                </div>
                                <div>
                                    <label class="block text-sm font-medium text-gray-700 mb-1">Timezone</label>
                                    <select class="w-full border border-gray-300 rounded-lg px-3 py-2 text-gray-900">
                                        <option>UTC+3 (East Africa Time)</option>
                                        <option>UTC+0 (GMT)</option>
                                    </select>
                                </div>
                            </div>
                        </div>

                        <div class="pt-6 border-t">
                            <button class="bg-emerald-600 text-white px-6 py-2 rounded-lg font-medium hover:bg-emerald-700 transition">
                                Save Changes
                            </button>
                        </div>
                    </div>
                `;
            } catch (error) {
                console.error('Error loading settings:', error);
                document.getElementById('settingsContent').innerHTML = '<p class="text-red-500">Error loading settings</p>';
            }
        }

        loadSettings();
    </script>
</body>
</html>
