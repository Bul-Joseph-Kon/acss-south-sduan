<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>SSRA Customs · Notifications</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2"></script>
    <link href="../assets/icons/remixicon.css" rel="stylesheet" />
    <script type="module" src="../../js/trader-sidebar.js"></script>
    <style>
        .gradient-bg { background: linear-gradient(135deg, #0a4d3e 0%, #0a6b58 100%); }
        .sidebar-link { transition: all 0.3s ease; cursor: pointer; display: flex; align-items: center; gap: 0.75rem; padding: 0.6rem 1rem; border-radius: 0.5rem; font-size: 0.9rem; color: #4b5563; }
        .sidebar-link:hover, .sidebar-link.active { background-color: #ecfdf5; color: #0a4d3e; }
        .sidebar-link i { font-size: 1.2rem; width: 1.5rem; text-align: center; }
        .notification-item { padding: 1rem; border-radius: 0.75rem; border: 1px solid #e5e7eb; transition: all 0.2s ease; }
        .notification-item:hover { background: #f9fafb; }
        .notification-item.unread { background: #ecfdf5; border-color: #0a4d3e; }
        .notification-item .notif-time { font-size: 0.75rem; color: #6b7280; }
        .profile-dropdown { position: absolute; right: 0; top: calc(100% + 0.5rem); background: white; border-radius: 0.75rem; box-shadow: 0 10px 25px rgba(0,0,0,0.1); border: 1px solid #e5e7eb; min-width: 200px; z-index: 50; overflow: hidden; opacity: 0; transform: translateY(-10px); pointer-events: none; transition: all 0.2s ease; }
        .profile-dropdown.open { opacity: 1; transform: translateY(0); pointer-events: auto; }
        .profile-dropdown a { display: flex; align-items: center; gap: 0.75rem; padding: 0.6rem 1rem; font-size: 0.85rem; color: #374151; transition: background 0.15s; cursor: pointer; text-decoration: none; }
        .profile-dropdown a:hover { background: #ecfdf5; color: #0a4d3e; }
        .profile-dropdown .divider { height: 1px; background: #e5e7eb; margin: 0.25rem 0; }
        .profile-dropdown .danger { color: #dc2626; }
        .profile-dropdown .danger:hover { background: #fef2f2; color: #dc2626; }
        .header-profile-btn { cursor: pointer; display: flex; align-items: center; gap: 0.5rem; padding: 0.3rem 0.75rem 0.3rem 0.5rem; border-radius: 9999px; background: rgba(255,255,255,0.2); transition: background 0.2s; border: 1px solid rgba(255,255,255,0.3); }
        .header-profile-btn:hover { background: rgba(255,255,255,0.3); }
        .header-profile-btn .avatar-sm { width: 2rem; height: 2rem; border-radius: 50%; background: white; display: flex; align-items: center; justify-content: center; color: #0a4d3e; }
    </style>
</head>
<body>
    <div class="min-h-screen bg-gray-100">
        <div class="max-w-7xl mx-auto px-4 py-5">
            <div class="flex flex-col lg:flex-row gap-6">
                <!-- Sidebar -->
                <aside class="lg:w-72 flex-shrink-0">
                    <div id="trader-sidebar"></div>
                </aside>

                <!-- Main Content -->
                <main class="flex-1 space-y-5">
                    <div class="gradient-bg rounded-2xl p-5 text-white shadow-lg flex items-center justify-between">
                        <div>
                            <h2 class="text-2xl font-bold tracking-tight">🔔 Notifications</h2>
                            <p class="opacity-90 text-sm">Stay updated on your application status</p>
                        </div>
                        <div class="relative">
                            <button onclick="document.getElementById('profileDropdown').classList.toggle('open')" class="header-profile-btn">
                                <span class="avatar-sm"><i class="ri-user-line"></i></span>
                                <span class="text-sm font-medium hidden sm:inline">Trader</span>
                                <i class="ri-arrow-down-s-line text-sm"></i>
                            </button>
                            <div class="profile-dropdown" id="profileDropdown">
                                <a href="#"><i class="ri-user-settings-line"></i> My Profile</a>
                                <a href="#"><i class="ri-edit-line"></i> Edit Profile</a>
                                <div class="divider"></div>
                                <a href="#" id="dropdownSignOut" class="danger"><i class="ri-logout-box-line"></i> Sign Out</a>
                            </div>
                        </div>
                    </div>
                    <!-- Notification Filters -->
                    <div class="bg-white rounded-xl border border-gray-200 p-4 shadow-sm flex flex-wrap gap-3 items-center justify-between">
                        <div class="flex flex-wrap gap-2">
                            <button id="filterAll" class="px-4 py-1.5 rounded-full text-sm bg-emerald-600 text-white" onclick="filterNotifications('all')">All</button>
                            <button id="filterUnread" class="px-4 py-1.5 rounded-full text-sm border hover:bg-gray-50" onclick="filterNotifications('unread')">Unread</button>
                            <button id="filterRead" class="px-4 py-1.5 rounded-full text-sm border hover:bg-gray-50" onclick="filterNotifications('read')">Read</button>
                        </div>
                        <button id="markAllReadBtn" class="text-sm text-emerald-600 hover:underline">Mark all as read</button>
                    </div>

                    <!-- Notifications List -->
                    <div class="space-y-3" id="notificationsList">
                        <div class="text-sm text-gray-500 text-center py-8">Loading notifications...</div>
                    </div>

                    <!-- Load More -->
                    <div class="text-center py-4">
                        <button id="loadMoreBtn" class="border border-gray-300 px-6 py-2 rounded-lg text-sm hover:bg-gray-50 transition min-w-[140px] inline-flex items-center justify-center gap-2">Load More</button>
                    </div>
                </main>
            </div>
        </div>
    </div>
    <script type="module">
        import { signOut } from '../../js/auth.js';
        import { fetchNotifications, markAllNotificationsAsRead, markNotificationAsRead } from '../../js/notifications.js';
        import toastManager from '../../js/toast.js';

        let currentPage = 0;
        const pageSize = 5;
        let currentFilter = 'all';

        function timeAgo(dateString) {
            if (!dateString) return '';
            const date = new Date(dateString);
            const seconds = Math.floor((new Date() - date) / 1000);
            if (seconds < 60) return 'Just now';
            if (seconds < 3600) return `${Math.floor(seconds / 60)} mins ago`;
            if (seconds < 86400) return `${Math.floor(seconds / 3600)} hours ago`;
            return `${Math.floor(seconds / 86400)} days ago`;
        }

        function renderNotificationHTML(notif) {
            const isUnread = !notif.read;
            const typeIcons = {
                'submission': { icon: 'ri-check-line', bg: 'bg-emerald-100', text: 'text-emerald-600' },
                'payment': { icon: 'ri-bank-card-line', bg: 'bg-yellow-100', text: 'text-yellow-600' },
                'certificate': { icon: 'ri-file-pdf-line', bg: 'bg-green-100', text: 'text-green-600' },
                'approval': { icon: 'ri-check-double-line', bg: 'bg-blue-100', text: 'text-blue-600' },
                'rejection': { icon: 'ri-close-line', bg: 'bg-red-100', text: 'text-red-600' },
                'system': { icon: 'ri-information-line', bg: 'bg-purple-100', text: 'text-purple-600' }
            };
            const style = typeIcons[notif.type] || { icon: 'ri-notification-3-line', bg: 'bg-emerald-100', text: 'text-emerald-600' };

            return `
                <div class="notification-item ${isUnread ? 'unread' : ''}" data-id="${notif.id}">
                    <div class="flex items-start gap-3">
                        <div class="w-10 h-10 rounded-full ${style.bg} flex items-center justify-center flex-shrink-0">
                            <i class="${style.icon} ${style.text} text-xl"></i>
                        </div>
                        <div class="flex-1">
                            <div class="flex justify-between items-start">
                                <h4 class="font-semibold text-sm">${notif.title || 'Notification'}</h4>
                                ${isUnread ? '<span class="text-xs bg-red-500 text-white px-2 py-0.5 rounded-full">New</span>' : ''}
                            </div>
                            <p class="text-sm text-gray-600 mt-1">${notif.message || ''}</p>
                            <div class="flex items-center gap-4 mt-2">
                                <span class="notif-time"><i class="ri-time-line mr-1"></i>${timeAgo(notif.created_at)}</span>
                                ${isUnread ? `<button onclick="markAsRead('${notif.id}', this)" class="text-emerald-600 text-sm hover:underline">Mark as read</button>` : ''}
                            </div>
                        </div>
                    </div>
                </div>
            `;
        }

        async function loadNotifications(append = false) {
            const listContainer = document.getElementById('notificationsList');
            const loadMoreBtn = document.getElementById('loadMoreBtn');
            if (!listContainer) return;

            if (!append) {
                listContainer.innerHTML = '<div class="text-sm text-gray-500 text-center py-8"><i class="ri-loader-4-line animate-spin text-2xl mb-2 block"></i>Loading notifications...</div>';
            }

            if (loadMoreBtn) {
                loadMoreBtn.disabled = true;
                loadMoreBtn.innerHTML = '<i class="ri-loader-4-line animate-spin mr-1"></i> Loading...';
            }

            const start = currentPage * pageSize;
            const end = start + pageSize - 1;

            const filters = {};
            if (currentFilter === 'unread') filters.read = false;
            if (currentFilter === 'read') filters.read = true;

            const res = await fetchNotifications({
                filters,
                range: { start, end },
                orderBy: { column: 'created_at', ascending: false }
            });

            const notifications = (res.success && res.data) ? res.data : [];

            if (!append) {
                if (notifications.length === 0) {
                    listContainer.innerHTML = '<div class="text-sm text-gray-500 text-center py-8"><i class="ri-notification-off-line text-3xl mb-2 text-gray-300 block"></i>No notifications found</div>';
                } else {
                    listContainer.innerHTML = notifications.map(renderNotificationHTML).join('');
                }
            } else {
                if (notifications.length > 0) {
                    listContainer.insertAdjacentHTML('beforeend', notifications.map(renderNotificationHTML).join(''));
                }
            }

            if (loadMoreBtn) {
                if (notifications.length < pageSize) {
                    loadMoreBtn.style.display = 'none';
                } else {
                    loadMoreBtn.style.display = 'inline-flex';
                    loadMoreBtn.disabled = false;
                    loadMoreBtn.innerHTML = 'Load More';
                }
            }
        }

        window.filterNotifications = function(filterType) {
            currentFilter = filterType;
            currentPage = 0;
            
            ['filterAll', 'filterUnread', 'filterRead'].forEach(id => {
                const btn = document.getElementById(id);
                if (btn) {
                    btn.className = 'px-4 py-1.5 rounded-full text-sm border hover:bg-gray-50';
                }
            });
            const activeBtn = document.getElementById('filter' + filterType.charAt(0).toUpperCase() + filterType.slice(1));
            if (activeBtn) {
                activeBtn.className = 'px-4 py-1.5 rounded-full text-sm bg-emerald-600 text-white';
            }

            loadNotifications(false);
        };

        window.markAsRead = async function(id, btn) {
            const res = await markNotificationAsRead(id);
            if (res.success) {
                const item = btn.closest('.notification-item');
                if (item) {
                    item.classList.remove('unread');
                    btn.remove();
                }
                toastManager.success('Notification marked as read');
            }
        };

        document.getElementById('loadMoreBtn')?.addEventListener('click', () => {
            currentPage++;
            loadNotifications(true);
        });

        document.getElementById('markAllReadBtn')?.addEventListener('click', async () => {
            const res = await markAllNotificationsAsRead();
            if (res.success) {
                toastManager.success('All notifications marked as read');
                currentPage = 0;
                loadNotifications(false);
            }
        });

        document.addEventListener('DOMContentLoaded', () => {
            loadNotifications(false);
        });

        document.addEventListener('click', function(e) {
            if (!e.target.closest('.header-profile-btn') && !e.target.closest('.profile-dropdown')) {
                document.getElementById('profileDropdown')?.classList.remove('open');
            }
        });

        // Sign out handler
        const signOutBtn = document.getElementById('signOutBtn');
        if (signOutBtn) {
            signOutBtn.addEventListener('click', async () => {
                const result = await signOut();
                if (result.success) {
                    toastManager.success('Signed out successfully');
                    window.location.href = '../../auth/login.html';
                }
            });
        }
    </script>

    <!-- Supabase & Shared Authentication Guards -->
    <script type="module">
        import supabase from '../../js/supabase.js';
        import { checkPageAuth } from '../../js/auth-check.js';
        import { signOut } from '../../js/auth.js';
        import { loadCurrentUserProfile } from '../../js/profile-loader.js';

        async function initPage() {
            console.log('=== INITIALIZING AUTH GUARD ON MOCK PAGE ===');
            const role = 'trader';
            
            // 1. Run auth check
            const hasAccess = await checkPageAuth(role);
            if (!hasAccess) {
                console.log('Access denied, redirecting...');
                return;
            }

            // 2. Load profile data from Supabase
            const { user, profile } = await loadCurrentUserProfile();
            
            // 3. Update sidebar and profile UI
            if (profile) {
                const displayName = profile.full_name || user?.email || 'User';
                const displayRole = role === 'agent' ? 'Clearing Agent' : 'Trader';
                
                const nameEl = document.getElementById(role + 'ProfileName') || document.querySelector('[data-user-name]');
                if (nameEl) nameEl.textContent = displayName;
                
                const roleEl = document.getElementById(role + 'ProfileRole') || document.querySelector('[data-user-role]');
                if (roleEl) roleEl.textContent = displayRole;
                
                const statusEl = document.getElementById(role + 'ProfileStatus');
                if (statusEl) statusEl.textContent = '● ' + (profile.status || 'Active');
                
                const tinEl = document.getElementById(role + 'ProfileTIN');
                if (tinEl && profile.organization) {
                    tinEl.textContent = 'Org: ' + profile.organization;
                }
            }

            // 4. Bind Logout Button Listeners
            const handleLogout = async (e) => {
                e.preventDefault();
                console.log('Signing out...');
                const result = await signOut();
                if (result.success) {
                    window.location.href = '../../auth/login.html';
                }
            };

            const signOutBtn = document.getElementById('signOutBtn');
            if (signOutBtn) signOutBtn.addEventListener('click', handleLogout);

            const dropdownSignOut = document.getElementById('dropdownSignOut');
            if (dropdownSignOut) dropdownSignOut.addEventListener('click', handleLogout);
        }

        document.addEventListener('DOMContentLoaded', initPage);
        if (document.readyState === 'interactive' || document.readyState === 'complete') {
            initPage();
        }
    </script>
</body>
</html>
