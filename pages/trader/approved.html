<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>SSRA Customs · Approved Applications</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2"></script>
    <link href="../assets/icons/remixicon.css" rel="stylesheet" />
    <script type="module" src="../../js/trader-sidebar.js"></script>
    <style>
        .gradient-bg { background: linear-gradient(135deg, #0a4d3e 0%, #0a6b58 100%); }
        .sidebar-link { transition: all 0.3s ease; cursor: pointer; display: flex; align-items: center; gap: 0.75rem; padding: 0.6rem 1rem; border-radius: 0.5rem; font-size: 0.9rem; color: #4b5563; }
        .sidebar-link:hover, .sidebar-link.active { background-color: #ecfdf5; color: #0a4d3e; }
        .sidebar-link i { font-size: 1.2rem; width: 1.5rem; text-align: center; }
        .status-badge { padding: 0.2rem 0.6rem; border-radius: 9999px; font-size: 0.65rem; font-weight: 600; }
        .status-approved { background: #d1fae5; color: #065f46; }
        .profile-dropdown { position: absolute; right: 0; top: calc(100% + 0.5rem); background: white; border-radius: 0.75rem; box-shadow: 0 10px 25px rgba(0,0,0,0.1); border: 1px solid #e5e7eb; min-width: 200px; z-index: 50; overflow: hidden; opacity: 0; transform: translateY(-10px); pointer-events: none; transition: all 0.2s ease; }
        .profile-dropdown.open { opacity: 1; transform: translateY(0); pointer-events: auto; }
        .profile-dropdown a { display: flex; align-items: center; gap: 0.75rem; padding: 0.6rem 1rem; font-size: 0.85rem; color: #374151; transition: background 0.15s; cursor: pointer; text-decoration: none; }
        .profile-dropdown a:hover { background: #ecfdf5; color: #0a4d3e; }
        .profile-dropdown .divider { height: 1px; background: #e5e7eb; margin: 0.25rem 0; }
        .profile-dropdown .danger { color: #dc2626; }
        .profile-dropdown .danger:hover { background: #fef2f2; color: #dc2626; }
        .header-profile-btn { cursor: pointer; display: flex; align-items: center; gap: 0.5rem; padding: 0.3rem 0.75rem 0.3rem 0.5rem; border-radius: 9999px; background: rgba(255,255,255,0.2); transition: background 0.2s; border: 1px solid rgba(255,255,255,0.3); }
        .header-profile-btn:hover { background: rgba(255,255,255,0.3); }
        .header-profile-btn .avatar-sm { width: 2rem; height: 2rem; border-radius: 50%; background: white; display: flex; align-items: center; justify-content: center; color: #0a4d3e; }
    </style>
</head>
<body>
    <div class="min-h-screen bg-gray-100">
        <div class="max-w-7xl mx-auto px-4 py-5">
            <div class="flex flex-col lg:flex-row gap-6">
                <aside class="lg:w-72 flex-shrink-0">
                    <div id="trader-sidebar"></div>
                </aside>

                <main class="flex-1 space-y-5">
                    <div class="gradient-bg rounded-2xl p-5 text-white shadow-lg flex items-center justify-between">
                        <div>
                            <h2 class="text-2xl font-bold tracking-tight">💰 Payment & Completed Applications</h2>
                            <p class="opacity-90 text-sm">Applications that have been approved</p>
                        </div>
                        <div class="relative">
                            <button onclick="document.getElementById('profileDropdown').classList.toggle('open')" class="header-profile-btn">
                                <span class="avatar-sm"><i class="ri-user-line"></i></span>
                                <span class="text-sm font-medium hidden sm:inline">Trader</span>
                                <i class="ri-arrow-down-s-line text-sm"></i>
                            </button>
                            <div class="profile-dropdown" id="profileDropdown">
                                <a href="#"><i class="ri-user-settings-line"></i> My Profile</a>
                                <a href="#"><i class="ri-edit-line"></i> Edit Profile</a>
                                <div class="divider"></div>
                                <a href="#" id="dropdownSignOut" class="danger"><i class="ri-logout-box-line"></i> Sign Out</a>
                            </div>
                        </div>
                    </div>

                    <div class="bg-white rounded-xl border border-gray-200 p-4 shadow-sm">
                        <div class="flex items-center justify-between">
                            <span class="text-sm text-gray-500" id="approvedCount">Loading...</span>
                            <span class="text-sm text-emerald-600" id="approvedStatus">✓ All cleared</span>
                        </div>
                    </div>

                    <div class="space-y-3" id="approvedList">
                        <div class="text-center py-8 text-gray-500">
                            <div class="animate-spin rounded-full h-8 w-8 border-b-2 border-emerald-600 mx-auto mb-2"></div>
                            Loading payment & completed applications...
                        </div>
                    </div>
                </main>
            </div>
        </div>
    </div>
    <script type="module">
        import { ApplicationListManager } from '../../js/trader-applications-list.js';
        
        import { signOut } from '../../js/auth.js';
        
        import { getUnreadCount } from '../../js/notifications.js';
        
        import toastManager from '../../js/toast.js';

        import supabase from '../../js/supabase.js';

        // Make toastManager available globally for inline onclick handlers
        window.toastManager = toastManager;

        
        document.addEventListener('click', function(e) {
            if (!e.target.closest('.header-profile-btn') && !e.target.closest('.profile-dropdown')) {
                document.getElementById('profileDropdown').classList.remove('open');
            }
        });

        // Initialize application list manager for approved applications
        const listManager = new ApplicationListManager({
            status: 'approved',
            pageKey: 'trader-approved',
            containerId: 'approvedList'
        });

        // Override render method to use card format for approved applications
        listManager.renderApplications = function() {
            const container = document.getElementById(this.containerId);
            
            if (!container) return;

            if (this.applications.length === 0) {
                container.innerHTML = `
                    <div class="text-center py-8">
                        <i class="ri-checkbox-circle-line text-gray-400 text-4xl mb-2 block"></i>
                        <p class="text-gray-500">No approved applications yet</p>
                    </div>
                `;
                document.getElementById('approvedCount').textContent = '0 approved applications';
                return;
            }

            container.innerHTML = this.applications.map(app => this.renderApprovedCard(app)).join('');
            document.getElementById('approvedCount').textContent = `${this.applications.length} approved application${this.applications.length !== 1 ? 's' : ''}`;
        };

        listManager.renderApprovedCard = function(app) {
            const refColor = app.application_type === 'CVET' ? 'text-emerald-600' : 
                            app.application_type === 'Direct Assessment' ? 'text-blue-600' : 'text-purple-600';
            const actionUrl = 'payment.html';
            const actionLabel = 'Pay Now';

            return `
                <div class="bg-white rounded-xl border border-green-200 p-5 shadow-sm">
                    <div class="flex flex-wrap justify-between items-start gap-2">
                        <div>
                            <h4 class="font-bold ${refColor}">${app.application_number || 'N/A'}</h4>
                            <p class="text-sm text-gray-500">${app.application_type || 'Unknown'} · ${app.goods_description || app.vehicle_description || 'N/A'} · ${formatCurrency(app.declared_value)}</p>
                            <div class="flex items-center gap-4 mt-2">
                                <span class="status-badge status-approved">✓ Approved</span>
                                <span class="text-xs text-gray-400">Approved: ${formatDate(app.approved_at)}</span>
                                <span class="text-xs text-gray-400">By: ${app.approved_by || 'Officer'}</span>
                            </div>
                        </div>
                        <div class="flex gap-2">
                            <a href="${actionUrl}?ref=${app.application_number}&id=${app.id}" class="bg-emerald-600 text-white px-4 py-1.5 rounded-lg text-sm font-semibold hover:bg-emerald-700 transition">${actionLabel}</a>
                            <button class="border border-gray-300 px-4 py-1.5 rounded-lg text-sm hover:bg-gray-50 transition" onclick="downloadApprovalLetter('${app.id}', '${app.application_number}')">Download Letter</button>
                            <button class="border border-gray-300 px-4 py-1.5 rounded-lg text-sm hover:bg-gray-50 transition" onclick="viewCertificate('${app.id}', '${app.application_number}')">View Certificate</button>
                        </div>
                    </div>
                </div>
            `;
        };

        function formatCurrency(value) {
            if (!value) return 'N/A';
            return new Intl.NumberFormat('en-US', { style: 'currency', currency: 'USD' }).format(value);
        }

        function formatDate(dateString) {
            if (!dateString) return 'N/A';
            return new Date(dateString).toLocaleDateString('en-US', { month: 'short', day: 'numeric', year: 'numeric' });
        }

        // Download approval letter function
        async function downloadApprovalLetter(applicationId, applicationNumber) {
            try {
                toastManager.info('Generating approval letter...');
                
                // Fetch application details
                const { data: app, error } = await supabase
                    .from('applications')
                    .select('*')
                    .eq('id', applicationId)
                    .single();
                
                if (error) throw error;
                
                // Generate letter content
                const letterContent = generateApprovalLetterContent(app);
                
                // Create and download PDF
                const blob = new Blob([letterContent], { type: 'text/html' });
                const url = URL.createObjectURL(blob);
                const a = document.createElement('a');
                a.href = url;
                a.download = `Approval_Letter_${applicationNumber}.html`;
                document.body.appendChild(a);
                a.click();
                document.body.removeChild(a);
                URL.revokeObjectURL(url);
                
                toastManager.success('Approval letter downloaded successfully');
            } catch (error) {
                console.error('Download error:', error);
                toastManager.error('Failed to download approval letter');
            }
        }

        function generateApprovalLetterContent(app) {
            const currentDate = new Date().toLocaleDateString('en-US', { 
                month: 'long', 
                day: 'numeric', 
                year: 'numeric' 
            });
            
            return `
<!DOCTYPE html>
<html>
<head>
    <meta charset="UTF-8">
    <title>Approval Letter - ${app.application_number}</title>
    <style>
        body { font-family: Arial, sans-serif; max-width: 800px; margin: 40px auto; padding: 20px; line-height: 1.6; }
        .header { text-align: center; border-bottom: 3px solid #0a4d3e; padding-bottom: 20px; margin-bottom: 30px; }
        .logo { font-size: 24px; font-weight: bold; color: #0a4d3e; }
        .title { font-size: 18px; color: #666; margin-top: 10px; }
        .content { margin: 30px 0; }
        .recipient { margin-bottom: 20px; }
        .recipient strong { display: block; margin-bottom: 5px; }
        .details { background: #f5f5f5; padding: 20px; margin: 20px 0; border-left: 4px solid #0a4d3e; }
        .details table { width: 100%; border-collapse: collapse; }
        .details td { padding: 8px 0; border-bottom: 1px solid #ddd; }
        .details td:first-child { font-weight: bold; width: 200px; }
        .footer { margin-top: 40px; border-top: 1px solid #ddd; padding-top: 20px; }
        .signature { margin-top: 60px; }
        .signature-line { border-top: 1px solid #000; width: 200px; margin-top: 80px; }
    </style>
</head>
<body>
    <div class="header">
        <div class="logo">SOUTH SUDAN REVENUE AUTHORITY</div>
        <div class="title">Customs & Excise Department</div>
    </div>
    
    <div class="content">
        <div class="recipient">
            <strong>To:</strong>
            ${app.applicant_name || app.company_name || 'Applicant'}
            <br>
            ${app.applicant_address || 'Address not provided'}
        </div>
        
        <p><strong>Date:</strong> ${currentDate}</p>
        <p><strong>Reference:</strong> ${app.application_number}</p>
        
        <h2 style="color: #0a4d3e;">CERTIFICATE OF APPROVAL</h2>
        
        <p>This is to certify that the customs application referenced above has been reviewed and approved by the South Sudan Revenue Authority.</p>
        
        <div class="details">
            <table>
                <tr>
                    <td>Application Number:</td>
                    <td>${app.application_number}</td>
                </tr>
                <tr>
                    <td>Application Type:</td>
                    <td>${app.application_type || 'Customs Declaration'}</td>
                </tr>
                <tr>
                    <td>Service Type:</td>
                    <td>${app.service_type || 'N/A'}</td>
                </tr>
                <tr>
                    <td>Goods Description:</td>
                    <td>${app.goods_description || app.vehicle_description || 'N/A'}</td>
                </tr>
                <tr>
                    <td>Declared Value:</td>
                    <td>${formatCurrency(app.declared_value)}</td>
                </tr>
                <tr>
                    <td>Approval Date:</td>
                    <td>${formatDate(app.approved_at)}</td>
                </tr>
                <tr>
                    <td>Status:</td>
                    <td><strong>APPROVED</strong></td>
                </tr>
            </table>
        </div>
        
        <p>This approval is valid subject to payment of applicable customs duties and taxes. Please proceed to the payment section to complete the process.</p>
        
        <p>Should you have any questions, please contact the Customs & Excise Department.</p>
    </div>
    
    <div class="footer">
        <div class="signature">
            <strong>Authorized Signature:</strong>
            <div class="signature-line"></div>
            <p>For: South Sudan Revenue Authority</p>
            <p>Customs & Excise Department</p>
        </div>
        
        <p style="margin-top: 30px; font-size: 12px; color: #666;">
            This is an electronically generated document. No physical signature is required.
        </p>
    </div>
</body>
</html>
            `;
        }

        // Make functions available globally
        window.downloadApprovalLetter = downloadApprovalLetter;

        // View certificate function
        function viewCertificate(applicationId, applicationNumber) {
            window.location.href = `certificate.html?id=${applicationId}`;
        }

        // Make certificate function available globally
        window.viewCertificate = viewCertificate;

        // Initialize
        await listManager.initialize();

        // Sign out
        const signOutBtn = document.getElementById('signOutBtn');
        if (signOutBtn) {
            signOutBtn.addEventListener('click', async () => {
                const result = await signOut();
                if (result.success) {
                    toastManager.success('Signed out successfully');
                    window.location.href = '../../auth/login.html';
                }
            });
        }

        // Cleanup on page unload
        window.addEventListener('beforeunload', () => {
            listManager.cleanup();
        });

        // Update notification badge
        async function updateNotificationBadge() {
            const result = await getUnreadCount();
            if (result.success && result.count > 0) {
                const badge = document.getElementById('notificationBadge');
                if (badge) {
                    badge.textContent = result.count;
                    badge.classList.remove('hidden');
                }
            }
        }
        updateNotificationBadge();
    </script>

    <!-- Supabase & Shared Authentication Guards -->
    <script type="module">
        import supabase from '../../js/supabase.js';
        import { checkPageAuth } from '../../js/auth-check.js';
        import { signOut } from '../../js/auth.js';
        import { loadCurrentUserProfile } from '../../js/profile-loader.js';

        async function initPage() {
            console.log('=== INITIALIZING AUTH GUARD ON MOCK PAGE ===');
            const role = 'trader';
            
            // 1. Run auth check
            const hasAccess = await checkPageAuth(role);
            if (!hasAccess) {
                console.log('Access denied, redirecting...');
                return;
            }

            // 2. Load profile data from Supabase
            const { user, profile } = await loadCurrentUserProfile();
            
            // 3. Update sidebar and profile UI
            if (profile) {
                const displayName = profile.full_name || user?.email || 'User';
                const displayRole = role === 'agent' ? 'Clearing Agent' : 'Trader';
                
                const nameEl = document.getElementById(role + 'ProfileName') || document.querySelector('[data-user-name]');
                if (nameEl) nameEl.textContent = displayName;
                
                const roleEl = document.getElementById(role + 'ProfileRole') || document.querySelector('[data-user-role]');
                if (roleEl) roleEl.textContent = displayRole;
                
                const statusEl = document.getElementById(role + 'ProfileStatus');
                if (statusEl) statusEl.textContent = '● ' + (profile.status || 'Active');
                
                const tinEl = document.getElementById(role + 'ProfileTIN');
                if (tinEl && profile.organization) {
                    tinEl.textContent = 'Org: ' + profile.organization;
                }
            }

            // 4. Bind Logout Button Listeners
            const handleLogout = async (e) => {
                e.preventDefault();
                console.log('Signing out...');
                const result = await signOut();
                if (result.success) {
                    window.location.href = '../../auth/login.html';
                }
            };

            const signOutBtn = document.getElementById('signOutBtn');
            if (signOutBtn) signOutBtn.addEventListener('click', handleLogout);

            const dropdownSignOut = document.getElementById('dropdownSignOut');
            if (dropdownSignOut) dropdownSignOut.addEventListener('click', handleLogout);
        }

        document.addEventListener('DOMContentLoaded', initPage);
        if (document.readyState === 'interactive' || document.readyState === 'complete') {
            initPage();
        }
    </script>
</body></html>
