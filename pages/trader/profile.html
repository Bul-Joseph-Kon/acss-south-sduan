<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>SSRA Customs · Profile</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <link href="../assets/icons/remixicon.css" rel="stylesheet" />
    <script type="module" src="../../js/trader-sidebar.js"></script>
    <style>
        .gradient-bg { background: linear-gradient(135deg, #0a4d3e 0%, #0a6b58 100%); }
    </style>
</head>
<body>
    <div class="min-h-screen bg-gray-100">
        <div class="max-w-7xl mx-auto px-4 py-5">
            <div class="flex flex-col lg:flex-row gap-6">
                <aside class="lg:w-72 flex-shrink-0">
                    <div id="trader-sidebar"></div>
                </aside>

                <main class="flex-1 space-y-5">
                    <div class="gradient-bg rounded-2xl p-5 text-white shadow-lg">
                        <h2 class="text-2xl font-bold tracking-tight">👤 My Profile</h2>
                        <p class="opacity-90 text-sm">View and manage your account information</p>
                    </div>

                    <div class="bg-white rounded-2xl shadow-sm border border-gray-200 p-6">
                        <div id="profileContent">
                            <div class="text-center py-8">
                                <div class="animate-spin rounded-full h-8 w-8 border-b-2 border-emerald-600 mx-auto mb-2"></div>
                                Loading profile...
                            </div>
                        </div>
                    </div>
                </main>
            </div>
        </div>
    </div>

    <script type="module">
        import { getUserProfile, getCurrentUser } from '../../js/auth.js';

        async function loadProfile() {
            try {
                const user = await getCurrentUser();
                if (!user) {
                    window.location.href = '../../auth/login.html';
                    return;
                }

                const profile = await getUserProfile(user.id);
                if (!profile) {
                    document.getElementById('profileContent').innerHTML = '<p class="text-red-500">Profile not found</p>';
                    return;
                }

                document.getElementById('profileContent').innerHTML = `
                    <div class="space-y-6">
                        <div class="flex items-center gap-4 pb-6 border-b">
                            <div class="w-20 h-20 rounded-full bg-gradient-to-br from-emerald-500 to-emerald-600 flex items-center justify-center text-white text-3xl font-bold">
                                ${profile.full_name?.charAt(0).toUpperCase() || 'U'}
                            </div>
                            <div>
                                <h3 class="text-xl font-bold text-gray-900">${profile.full_name || 'N/A'}</h3>
                                <p class="text-gray-500 capitalize">${profile.role || 'Trader'}</p>
                                <span class="inline-block mt-1 text-xs bg-green-100 text-green-700 px-2.5 py-0.5 rounded-full font-medium">
                                    ● ${profile.status || 'Active'}
                                </span>
                            </div>
                        </div>

                        <div class="grid grid-cols-1 md:grid-cols-2 gap-6">
                            <div>
                                <label class="block text-sm font-medium text-gray-700 mb-1">Full Name</label>
                                <p class="text-gray-900">${profile.full_name || 'N/A'}</p>
                            </div>
                            <div>
                                <label class="block text-sm font-medium text-gray-700 mb-1">Email</label>
                                <p class="text-gray-900">${profile.email || 'N/A'}</p>
                            </div>
                            <div>
                                <label class="block text-sm font-medium text-gray-700 mb-1">Phone</label>
                                <p class="text-gray-900">${profile.phone || 'N/A'}</p>
                            </div>
                            <div>
                                <label class="block text-sm font-medium text-gray-700 mb-1">Nationality</label>
                                <p class="text-gray-900">${profile.nationality || 'N/A'}</p>
                            </div>
                            <div>
                                <label class="block text-sm font-medium text-gray-700 mb-1">Company</label>
                                <p class="text-gray-900">${profile.company || 'N/A'}</p>
                            </div>
                            <div>
                                <label class="block text-sm font-medium text-gray-700 mb-1">Organization</label>
                                <p class="text-gray-900">${profile.organization || 'N/A'}</p>
                            </div>
                        </div>

                        <div class="pt-6 border-t">
                            <h4 class="font-semibold text-gray-900 mb-4">Account Information</h4>
                            <div class="grid grid-cols-1 md:grid-cols-2 gap-4 text-sm">
                                <div>
                                    <span class="text-gray-500">Profile ID:</span>
                                    <span class="text-gray-900 ml-2">${profile.id || 'N/A'}</span>
                                </div>
                                <div>
                                    <span class="text-gray-500">User ID:</span>
                                    <span class="text-gray-900 ml-2">${profile.user_id || 'N/A'}</span>
                                </div>
                                <div>
                                    <span class="text-gray-500">Created:</span>
                                    <span class="text-gray-900 ml-2">${profile.created_at ? new Date(profile.created_at).toLocaleDateString() : 'N/A'}</span>
                                </div>
                                <div>
                                    <span class="text-gray-500">Last Updated:</span>
                                    <span class="text-gray-900 ml-2">${profile.updated_at ? new Date(profile.updated_at).toLocaleDateString() : 'N/A'}</span>
                                </div>
                            </div>
                        </div>
                    </div>
                `;
            } catch (error) {
                console.error('Error loading profile:', error);
                document.getElementById('profileContent').innerHTML = '<p class="text-red-500">Error loading profile</p>';
            }
        }

        loadProfile();
    </script>
</body>
</html>
