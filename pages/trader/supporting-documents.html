<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>SSRA Customs · Supporting Documents</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2"></script>
    <link href="../assets/icons/remixicon.css" rel="stylesheet" />
    <script type="module" src="../../js/trader-sidebar.js"></script>
    <style>
        .gradient-bg { background: linear-gradient(135deg, #0a4d3e 0%, #0a6b58 100%); }
        .sidebar-link { transition: all 0.3s ease; cursor: pointer; display: flex; align-items: center; gap: 0.75rem; padding: 0.6rem 1rem; border-radius: 0.5rem; font-size: 0.9rem; color: #4b5563; }
        .sidebar-link:hover, .sidebar-link.active { background-color: #ecfdf5; color: #0a4d3e; }
        .sidebar-link i { font-size: 1.2rem; width: 1.5rem; text-align: center; }
        .doc-upload-box { border: 2px dashed #d1d5db; border-radius: 0.5rem; padding: 1.5rem; text-align: center; transition: all 0.2s ease; cursor: pointer; }
        .doc-upload-box:hover { border-color: #0a4d3e; background: #ecfdf5; }
        .doc-upload-box .doc-icon { font-size: 2.5rem; color: #d1d5db; }
        .doc-upload-box.uploaded { border-color: #0a4d3e; background: #d1fae5; }
        .doc-upload-box.uploaded .doc-icon { color: #0a4d3e; }
        .profile-dropdown { position: absolute; right: 0; top: calc(100% + 0.5rem); background: white; border-radius: 0.75rem; box-shadow: 0 10px 25px rgba(0,0,0,0.1); border: 1px solid #e5e7eb; min-width: 200px; z-index: 50; overflow: hidden; opacity: 0; transform: translateY(-10px); pointer-events: none; transition: all 0.2s ease; }
        .profile-dropdown.open { opacity: 1; transform: translateY(0); pointer-events: auto; }
        .profile-dropdown a { display: flex; align-items: center; gap: 0.75rem; padding: 0.6rem 1rem; font-size: 0.85rem; color: #374151; transition: background 0.15s; cursor: pointer; text-decoration: none; }
        .profile-dropdown a:hover { background: #ecfdf5; color: #0a4d3e; }
        .profile-dropdown .divider { height: 1px; background: #e5e7eb; margin: 0.25rem 0; }
        .profile-dropdown .danger { color: #dc2626; }
        .profile-dropdown .danger:hover { background: #fef2f2; color: #dc2626; }
        .header-profile-btn { cursor: pointer; display: flex; align-items: center; gap: 0.5rem; padding: 0.3rem 0.75rem 0.3rem 0.5rem; border-radius: 9999px; background: rgba(255,255,255,0.2); transition: background 0.2s; border: 1px solid rgba(255,255,255,0.3); }
        .header-profile-btn:hover { background: rgba(255,255,255,0.3); }
        .header-profile-btn .avatar-sm { width: 2rem; height: 2rem; border-radius: 50%; background: white; display: flex; align-items: center; justify-content: center; color: #0a4d3e; }
    </style>
</head>
<body>
    <div class="min-h-screen bg-gray-100">
        <div class="max-w-7xl mx-auto px-4 py-5">
            <div class="flex flex-col lg:flex-row gap-6">
                <aside class="lg:w-72 flex-shrink-0">
                    <div id="trader-sidebar"></div>
                </aside>

                <main class="flex-1 space-y-5">
                    <div class="gradient-bg rounded-2xl p-5 text-white shadow-lg flex items-center justify-between">
                        <div>
                            <h2 class="text-2xl font-bold tracking-tight">📎 Step 7: Supporting Documents</h2>
                            <p class="opacity-90 text-sm">Upload required supporting documents</p>
                        </div>
                        <div class="relative">
                            <button onclick="document.getElementById('profileDropdown').classList.toggle('open')" class="header-profile-btn">
                                <span class="avatar-sm"><i class="ri-user-line"></i></span>
                                <span class="text-sm font-medium hidden sm:inline">Trader</span>
                                <i class="ri-arrow-down-s-line text-sm"></i>
                            </button>
                            <div class="profile-dropdown" id="profileDropdown">
                                <a href="#"><i class="ri-user-settings-line"></i> My Profile</a>
                                <a href="#"><i class="ri-edit-line"></i> Edit Profile</a>
                                <div class="divider"></div>
                                <a href="#" id="dropdownSignOut" class="danger"><i class="ri-logout-box-line"></i> Sign Out</a>
                            </div>
                        </div>
                    </div>

                    <div class="bg-white rounded-xl border border-gray-200 p-4 shadow-sm">
                        <div class="flex items-center justify-between text-sm text-gray-500 mb-2">
                            <span id="progressText">Step 7 of 9</span>
                            <span id="progressPercent">78% Complete</span>
                        </div>
                        <div class="w-full bg-gray-200 rounded-full h-2">
                            <div id="progressBar" class="bg-emerald-600 h-2 rounded-full" style="width:78%"></div>
                        </div>
                    </div>

                    <div class="bg-white rounded-xl border border-gray-200 p-5 shadow-sm">
                        <h3 class="font-bold text-lg mb-4">Required Documents</h3>
                        <div class="grid md:grid-cols-2 lg:grid-cols-4 gap-4">
                            <div class="doc-upload-box" id="packingListBox" onclick="handleDocumentUpload('packing_list')">
                                <i class="ri-file-pdf-2-line doc-icon"></i>
                                <p class="font-medium text-sm mt-1">Packing List <span class="text-red-500">*</span></p>
                                <p class="text-xs text-gray-400" id="packingListStatus">Not uploaded</p>
                            </div>
                            <div class="doc-upload-box" id="billOfLadingBox" onclick="handleDocumentUpload('bill_of_lading')">
                                <i class="ri-file-pdf-2-line doc-icon"></i>
                                <p class="font-medium text-sm mt-1">Bill of Lading <span class="text-red-500">*</span></p>
                                <p class="text-xs text-gray-400" id="billOfLadingStatus">Not uploaded</p>
                            </div>
                            <div class="doc-upload-box" id="certificateOfOriginBox" onclick="handleDocumentUpload('certificate_of_origin')">
                                <i class="ri-file-pdf-2-line doc-icon"></i>
                                <p class="font-medium text-sm mt-1">Certificate of Origin <span class="text-red-500">*</span></p>
                                <p class="text-xs text-gray-400" id="certificateOfOriginStatus">Not uploaded</p>
                            </div>
                            <div class="doc-upload-box" id="importPermitBox" onclick="handleDocumentUpload('import_permit')">
                                <i class="ri-file-pdf-2-line doc-icon"></i>
                                <p class="font-medium text-sm mt-1">Import Permit <span class="text-red-500">*</span></p>
                                <p class="text-xs text-gray-400" id="importPermitStatus">Not uploaded</p>
                            </div>
                        </div>

                        <div class="flex justify-between mt-4 pt-4 border-t border-gray-200">
                            <a href="transport-information.html" id="backBtn" class="bg-gray-100 hover:bg-gray-200 text-gray-700 px-6 py-2 rounded-lg text-sm font-semibold transition flex items-center gap-1">
                                <i class="ri-arrow-left-line"></i> Previous
                            </a>
                            <button id="saveAndContinueBtn" class="bg-emerald-600 hover:bg-emerald-700 text-white px-6 py-2 rounded-lg text-sm font-semibold transition flex items-center gap-1">
                                Save & Continue <i class="ri-arrow-right-line"></i>
                            </button>
                        </div>
                    </div>
                </main>
            </div>
        </div>
    </div>
    <script type="module">import { loadCurrentUserProfile } from '../../js/profile-loader.js';

        import { getWorkflow, initializeWorkflowFromURL } from '../../js/cvet-workflow-manager.js';
        
        import { signOut } from '../../js/auth.js';
        
        import { checkPageAuth } from '../../js/auth-check.js';
        
        import { getUnreadCount } from '../../js/notifications.js';
        
        import toastManager from '../../js/toast.js';

        
        document.addEventListener('click', function(e) {
            if (!e.target.closest('.header-profile-btn') && !e.target.closest('.profile-dropdown')) {
                document.getElementById('profileDropdown').classList.remove('open');
            }
        });

        // Check authentication
        await checkPageAuth('trader');

        // Load trader profile
        await loadCurrentUserProfile();

        // Load trader profile
        await loadCurrentUserProfile();

        // Sign out handler
        const signOutBtn = document.getElementById('signOutBtn');
        if (signOutBtn) {
            signOutBtn.addEventListener('click', async () => {
                const result = await signOut();
                if (result.success) {
                    toastManager.success('Signed out successfully');
                    window.location.href = '../../auth/login.html';
                }
            });
        }

        // Initialize workflow
        const workflow = getWorkflow();
        const state = await initializeWorkflowFromURL();

        // Document storage
        const documents = {
            packing_list: null,
            bill_of_lading: null,
            certificate_of_origin: null,
            import_permit: null
        };

        // Update progress
        function updateProgress() {
            const progress = Math.round((state.currentStep / 9) * 100);
            document.getElementById('progressText').textContent = `Step ${state.currentStep} of 9`;
            document.getElementById('progressPercent').textContent = `${progress}% Complete`;
            document.getElementById('progressBar').style.width = `${progress}%`;
        }
        updateProgress();

        // Update back button URL
        if (state.applicationId) {
            document.getElementById('backBtn').href = 'transport-information.html?id=' + state.applicationId;
        }

        // Load saved documents
        function loadDocuments() {
            if (state.draftData) {
                if (state.draftData.packing_list) {
                    documents.packing_list = state.draftData.packing_list;
                    document.getElementById('packingListBox').classList.add('uploaded');
                    document.getElementById('packingListStatus').textContent = '✓ Uploaded';
                    document.getElementById('packingListStatus').className = 'text-xs text-green-600';
                }
                if (state.draftData.bill_of_lading) {
                    documents.bill_of_lading = state.draftData.bill_of_lading;
                    document.getElementById('billOfLadingBox').classList.add('uploaded');
                    document.getElementById('billOfLadingStatus').textContent = '✓ Uploaded';
                    document.getElementById('billOfLadingStatus').className = 'text-xs text-green-600';
                }
                if (state.draftData.certificate_of_origin) {
                    documents.certificate_of_origin = state.draftData.certificate_of_origin;
                    document.getElementById('certificateOfOriginBox').classList.add('uploaded');
                    document.getElementById('certificateOfOriginStatus').textContent = '✓ Uploaded';
                    document.getElementById('certificateOfOriginStatus').className = 'text-xs text-green-600';
                }
                if (state.draftData.import_permit) {
                    documents.import_permit = state.draftData.import_permit;
                    document.getElementById('importPermitBox').classList.add('uploaded');
                    document.getElementById('importPermitStatus').textContent = '✓ Uploaded';
                    document.getElementById('importPermitStatus').className = 'text-xs text-green-600';
                }
            }
        }
        loadDocuments();

        // Handle document upload (simulated)
        window.handleDocumentUpload = function(docType) {
            const input = document.createElement('input');
            input.type = 'file';
            input.accept = '.pdf,.jpg,.jpeg,.png';
            input.onchange = (e) => {
                const file = e.target.files[0];
                if (file) {
                    documents[docType] = file.name;
                    const boxId = docType + 'Box';
                    const statusId = docType + 'Status';
                    document.getElementById(boxId).classList.add('uploaded');
                    document.getElementById(statusId).textContent = '✓ Uploaded';
                    document.getElementById(statusId).className = 'text-xs text-green-600';
                }
            };
            input.click();
        };

        // Save and continue
        document.getElementById('saveAndContinueBtn').addEventListener('click', async function() {
            const stepData = {
                packing_list: documents.packing_list,
                bill_of_lading: documents.bill_of_lading,
                certificate_of_origin: documents.certificate_of_origin,
                import_permit: documents.import_permit
            };

            // Validate
            const validation = workflow.validateStep(7, stepData);
            if (!validation.success) {
                toastManager.warning('Please upload all required documents: ' + validation.missingFields.join(', '));
                return;
            }

            // Save draft
            const saveResult = await workflow.saveDraft(stepData);
            if (!saveResult.success) {
                toastManager.error('Error saving: ' + saveResult.error);
                return;
            }

            // Move to next step
            const nextResult = workflow.nextStep();
            if (nextResult.success) {
                toastManager.success('Step saved successfully');
                window.location.href = nextResult.step.page + '?id=' + workflow.applicationId;
            }
        });

        // Update notification badge
        async function updateNotificationBadge() {
            const result = await getUnreadCount();
            if (result.success && result.count > 0) {
                const badge = document.getElementById('notificationBadge');
                badge.textContent = result.count;
                badge.classList.remove('hidden');
            }
        }
        updateNotificationBadge();
    </script>
</body></html>
