<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>SSRA Customs · Goods Information</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <link href="https://cdn.jsdelivr.net/npm/remixicon@4.2.0/fonts/remixicon.css" rel="stylesheet" />
    <style>
        .gradient-bg { background: linear-gradient(135deg, #0a4d3e 0%, #0a6b58 100%); }
        .sidebar-link { transition: all 0.3s ease; cursor: pointer; display: flex; align-items: center; gap: 0.75rem; padding: 0.6rem 1rem; border-radius: 0.5rem; font-size: 0.9rem; color: #4b5563; }
        .sidebar-link:hover, .sidebar-link.active { background-color: #ecfdf5; color: #0a4d3e; }
        .sidebar-link i { font-size: 1.2rem; width: 1.5rem; text-align: center; }
        .form-group { margin-bottom: 1rem; }
        .form-group label { display: block; font-size: 0.8rem; font-weight: 500; color: #374151; margin-bottom: 0.2rem; }
        .form-group .form-input { width: 100%; padding: 0.4rem 0.6rem; border-radius: 0.4rem; border: 1px solid #d1d5db; font-size: 0.85rem; transition: border-color 0.2s; }
        .form-group .form-input:focus { outline: none; border-color: #0a4d3e; box-shadow: 0 0 0 3px rgba(10,77,62,0.1); }
        .ai-badge-sm { font-size: 0.5rem; font-weight: 700; background: linear-gradient(135deg, #0a4d3e, #0a6b58); color: white; padding: 0.05rem 0.35rem; border-radius: 9999px; text-transform: uppercase; letter-spacing: 0.3px; display: inline-block; }
        .form-input.ai-highlight { border-color: #0a4d3e; background: #ecfdf5; }
        .profile-dropdown { position: absolute; right: 0; top: calc(100% + 0.5rem); background: white; border-radius: 0.75rem; box-shadow: 0 10px 25px rgba(0,0,0,0.1); border: 1px solid #e5e7eb; min-width: 200px; z-index: 50; overflow: hidden; opacity: 0; transform: translateY(-10px); pointer-events: none; transition: all 0.2s ease; }
        .profile-dropdown.open { opacity: 1; transform: translateY(0); pointer-events: auto; }
        .profile-dropdown a { display: flex; align-items: center; gap: 0.75rem; padding: 0.6rem 1rem; font-size: 0.85rem; color: #374151; transition: background 0.15s; cursor: pointer; text-decoration: none; }
        .profile-dropdown a:hover { background: #ecfdf5; color: #0a4d3e; }
        .profile-dropdown .divider { height: 1px; background: #e5e7eb; margin: 0.25rem 0; }
        .profile-dropdown .danger { color: #dc2626; }
        .profile-dropdown .danger:hover { background: #fef2f2; color: #dc2626; }
        .header-profile-btn { cursor: pointer; display: flex; align-items: center; gap: 0.5rem; padding: 0.3rem 0.75rem 0.3rem 0.5rem; border-radius: 9999px; background: rgba(255,255,255,0.2); transition: background 0.2s; border: 1px solid rgba(255,255,255,0.3); }
        .header-profile-btn:hover { background: rgba(255,255,255,0.3); }
        .header-profile-btn .avatar-sm { width: 2rem; height: 2rem; border-radius: 50%; background: white; display: flex; align-items: center; justify-content: center; color: #0a4d3e; }
    </style>
</head>
<body>
    <div class="min-h-screen bg-gray-100">
        <div class="max-w-7xl mx-auto px-4 py-5">
            <div class="flex flex-col lg:flex-row gap-6">
                <aside class="lg:w-72 flex-shrink-0">
                    <div class="bg-white rounded-2xl shadow-sm border border-gray-200/70 p-5 sticky top-6">
                        <div class="text-center mb-5">
                            <div class="w-20 h-20 rounded-2xl flex items-center justify-center mx-auto mb-2 shadow-md gradient-bg">
                                <i class="ri-user-line text-white text-3xl"></i>
                            </div>
                            <h3 class="text-lg font-bold text-gray-800">Trader</h3>
                            <p class="text-gray-500 text-sm">Direct Assessment</p>
                            <span class="inline-block mt-1 text-xs bg-green-100 text-green-700 px-2.5 py-0.5 rounded-full font-medium">● Active</span>
                        </div>
                        <nav class="space-y-1 mb-4">
                            <a href="../../dashboard-trader.html" class="sidebar-link"><i class="ri-dashboard-line"></i><span>Dashboard</span></a>
                            <a href="dashboard.html" class="sidebar-link"><i class="ri-file-search-line"></i><span>Direct Assessment</span></a>
                            <a href="create-assessment.html" class="sidebar-link active"><i class="ri-file-add-line"></i><span>New Assessment</span></a>
                            <a href="../../applications/submitted.html" class="sidebar-link"><i class="ri-file-copy-line"></i><span>My Applications</span></a>
                            <a href="../../notifications/application-updates.html" class="sidebar-link"><i class="ri-notification-3-line"></i><span>Notifications</span><span class="ml-auto bg-red-500 text-white text-[10px] px-2 py-0.5 rounded-full font-semibold">3</span></a>
                        </nav>
                        <button onclick="alert('👋 Signed out')" class="mt-4 w-full bg-red-50 text-red-600 py-2.5 rounded-xl text-sm font-semibold hover:bg-red-100 transition flex items-center justify-center gap-2">
                            <i class="ri-logout-box-line"></i> Sign Out
                        </button>
                    </div>
                </aside>

                <main class="flex-1 space-y-5">
                    <div class="gradient-bg rounded-2xl p-5 text-white shadow-lg flex items-center justify-between">
                        <div>
                            <h2 class="text-2xl font-bold tracking-tight">📦 Step 2: Goods Information</h2>
                            <p class="opacity-90 text-sm">Enter goods description, HS Code, quantity, and weight</p>
                        </div>
                        <div class="relative">
                            <button onclick="document.getElementById('profileDropdown').classList.toggle('open')" class="header-profile-btn">
                                <span class="avatar-sm"><i class="ri-user-line"></i></span>
                                <span class="text-sm font-medium hidden sm:inline">Trader</span>
                                <i class="ri-arrow-down-s-line text-sm"></i>
                            </button>
                            <div class="profile-dropdown" id="profileDropdown">
                                <a href="#"><i class="ri-user-settings-line"></i> My Profile</a>
                                <a href="#"><i class="ri-edit-line"></i> Edit Profile</a>
                                <div class="divider"></div>
                                <a href="#" class="danger"><i class="ri-logout-box-line"></i> Sign Out</a>
                            </div>
                        </div>
                    </div>

                    <div class="bg-white rounded-xl border border-gray-200 p-4 shadow-sm">
                        <div class="flex items-center justify-between text-sm text-gray-500 mb-2">
                            <span>Step 2 of 8</span>
                            <span>25% Complete</span>
                        </div>
                        <div class="w-full bg-gray-200 rounded-full h-2">
                            <div class="bg-emerald-600 h-2 rounded-full" style="width:25%"></div>
                        </div>
                    </div>

                    <div class="bg-white rounded-xl border border-gray-200 p-5 shadow-sm">
                        <h3 class="font-bold text-lg mb-4">Goods Information</h3>
                        <div class="grid md:grid-cols-2 gap-4">
                            <div class="form-group">
                                <label>Goods Description <span class="text-red-500">*</span></label>
                                <input type="text" class="form-input" placeholder="Enter goods description" value="Industrial Machinery" />
                            </div>
                            <div class="form-group">
                                <label>HS Code <span class="text-red-500">*</span> <span class="ai-badge-sm">AI Recommend</span></label>
                                <input type="text" class="form-input ai-highlight" placeholder="Enter HS Code" value="8479.89" />
                            </div>
                            <div class="form-group">
                                <label>Quantity <span class="text-red-500">*</span></label>
                                <input type="number" class="form-input" placeholder="Enter quantity" value="5" />
                            </div>
                            <div class="form-group">
                                <label>Unit of Measurement <span class="text-red-500">*</span></label>
                                <select class="form-input">
                                    <option>Units</option>
                                    <option selected>Kg</option>
                                    <option>Liters</option>
                                    <option>Meters</option>
                                </select>
                            </div>
                            <div class="form-group">
                                <label>Gross Weight (kg) <span class="text-red-500">*</span></label>
                                <input type="number" class="form-input" placeholder="Enter gross weight" value="2100" />
                            </div>
                            <div class="form-group">
                                <label>Net Weight (kg) <span class="text-red-500">*</span></label>
                                <input type="number" class="form-input" placeholder="Enter net weight" value="2000" />
                            </div>
                            <div class="form-group">
                                <label>Unit Value (SSP) <span class="text-red-500">*</span></label>
                                <input type="number" class="form-input" placeholder="Enter unit value in SSP" value="12,000,000" />
                            </div>
                            <div class="form-group">
                                <label>Customs Value (SSP) <span class="ai-badge-sm">AI Estimate</span></label>
                                <input type="text" class="form-input ai-highlight" value="SSP 60,000,000" />
                            </div>
                            <div class="form-group">
                                <label>CIF Value (SSP) <span class="ai-badge-sm">AI Estimate</span></label>
                                <input type="text" class="form-input ai-highlight" value="SSP 66,000,000" />
                            </div>
                            <div class="form-group">
                                <label>Currency <span class="text-red-500">*</span></label>
                                <select class="form-input">
                                    <option selected>SSP (South Sudanese Pound)</option>
                                    <option>USD (US Dollar)</option>
                                    <option>EUR (Euro)</option>
                                    <option>GBP (British Pound)</option>
                                    <option>KES (Kenyan Shilling)</option>
                                    <option>UGX (Ugandan Shilling)</option>
                                </select>
                            </div>
                        </div>

                        <div class="flex justify-between mt-4 pt-4 border-t border-gray-200">
                            <a href="shipment-information.html" class="bg-gray-100 hover:bg-gray-200 text-gray-700 px-6 py-2 rounded-lg text-sm font-semibold transition flex items-center gap-1">
                                <i class="ri-arrow-left-line"></i> Previous
                            </a>
                            <a href="supporting-documents.html" class="bg-emerald-600 hover:bg-emerald-700 text-white px-6 py-2 rounded-lg text-sm font-semibold transition flex items-center gap-1">
                                Save & Continue <i class="ri-arrow-right-line"></i>
                            </a>
                        </div>
                    </div>
                </main>
            </div>
        </div>
    </div>
    <script>
        document.addEventListener('click', function(e) {
            if (!e.target.closest('.header-profile-btn') && !e.target.closest('.profile-dropdown')) {
                document.getElementById('profileDropdown').classList.remove('open');
            }
        });
    </script>
</body>
</html>
