<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>SSRA Customs · Officer Notifications</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <link href="../assets/icons/remixicon.css" rel="stylesheet" />
    
    <script type="module" src="../../js/officer-sidebar.js"></script>
    <style>
        .gradient-bg { background: linear-gradient(135deg, #1e3a5f 0%, #2a5f8f 100%); }
        .sidebar-link { transition: all 0.3s ease; cursor: pointer; display: flex; align-items: center; gap: 0.75rem; padding: 0.6rem 1rem; border-radius: 0.5rem; font-size: 0.9rem; color: #4b5563; }
        .sidebar-link:hover, .sidebar-link.active { background-color: #e8f0fe; color: #1e3a5f; }
        .sidebar-link i { font-size: 1.2rem; width: 1.5rem; text-align: center; }
        .notification-item { padding: 1rem; border-radius: 0.75rem; border: 1px solid #e5e7eb; transition: all 0.2s ease; background: white; }
        .notification-item:hover { background: #f9fafb; }
        .notification-item.unread { background: #e8f0fe; border-color: #1e3a5f; }
        .notification-item .notif-time { font-size: 0.75rem; color: #6b7280; }
        .profile-dropdown { position: absolute; right: 0; top: calc(100% + 0.5rem); background: white; border-radius: 0.75rem; box-shadow: 0 10px 25px rgba(0,0,0,0.1); border: 1px solid #e5e7eb; min-width: 200px; z-index: 50; overflow: hidden; opacity: 0; transform: translateY(-10px); pointer-events: none; transition: all 0.2s ease; }
        .profile-dropdown.open { opacity: 1; transform: translateY(0); pointer-events: auto; }
        .profile-dropdown a { display: flex; align-items: center; gap: 0.75rem; padding: 0.6rem 1rem; font-size: 0.85rem; color: #374151; transition: background 0.15s; cursor: pointer; text-decoration: none; }
        .profile-dropdown a:hover { background: #e8f0fe; color: #1e3a5f; }
        .profile-dropdown .divider { height: 1px; background: #e5e7eb; margin: 0.25rem 0; }
        .profile-dropdown .danger { color: #dc2626; }
        .profile-dropdown .danger:hover { background: #fef2f2; color: #dc2626; }
        .header-profile-btn { cursor: pointer; display: flex; align-items: center; gap: 0.5rem; padding: 0.3rem 0.75rem 0.3rem 0.5rem; border-radius: 9999px; background: rgba(255,255,255,0.2); transition: background 0.2s; border: 1px solid rgba(255,255,255,0.3); }
        .header-profile-btn:hover { background: rgba(255,255,255,0.3); }
        .header-profile-btn .avatar-sm { width: 2rem; height: 2rem; border-radius: 50%; background: white; display: flex; align-items: center; justify-content: center; color: #1e3a5f; }
    </style>
</head>
<body>
    <div class="min-h-screen bg-gray-100">
        <div class="max-w-7xl mx-auto px-4 py-5">
            <div class="flex flex-col lg:flex-row gap-6">
                <!-- Sidebar -->
                <aside class="lg:w-72 flex-shrink-0">
                    <div id="officer-sidebar"></div>
                </aside>

                <!-- Main Content -->
                <main class="flex-1 space-y-5">
                    <div class="gradient-bg rounded-2xl p-5 text-white shadow-lg flex items-center justify-between">
                        <div>
                            <h2 class="text-2xl font-bold tracking-tight">🔔 Notifications</h2>
                            <p class="opacity-90 text-sm">Stay updated on applications and reviews</p>
                        </div>
                        <div class="relative">
                            <button onclick="document.getElementById('profileDropdown').classList.toggle('open')" class="header-profile-btn">
                                <span class="avatar-sm"><i class="ri-user-line"></i></span>
                                <span class="text-sm font-medium hidden sm:inline">Officer</span>
                                <i class="ri-arrow-down-s-line text-sm"></i>
                            </button>
                            <div class="profile-dropdown" id="profileDropdown">
                                <a href="#"><i class="ri-user-settings-line"></i> My Profile</a>
                                <a href="#"><i class="ri-edit-line"></i> Edit Profile</a>
                                <div class="divider"></div>
                                <a href="#" class="danger" id="dropdownSignOut"><i class="ri-logout-box-line"></i> Sign Out</a>
                            </div>
                        </div>
                    </div>

                    <div class="bg-white rounded-xl border border-gray-200 p-4 shadow-sm flex flex-wrap gap-3 items-center justify-between">
                        <div class="flex flex-wrap gap-2">
                            <button id="filter-all" class="px-4 py-1.5 rounded-full text-sm bg-blue-600 text-white font-medium">All</button>
                            <button id="filter-unread" class="px-4 py-1.5 rounded-full text-sm border hover:bg-gray-50 font-medium">Unread</button>
                            <button id="filter-read" class="px-4 py-1.5 rounded-full text-sm border hover:bg-gray-50 font-medium">Read</button>
                        </div>
                        <button id="markAllReadBtn" class="text-sm text-blue-600 hover:underline font-medium">Mark all as read</button>
                    </div>

                    <div class="space-y-3" id="notificationsList">
                        <div class="text-center py-8 text-gray-500">Loading notifications...</div>
                    </div>
                </main>
            </div>
        </div>
    </div>
    <script>
        document.addEventListener('click', function(e) {
            if (!e.target.closest('.header-profile-btn') && !e.target.closest('.profile-dropdown')) {
                document.getElementById('profileDropdown').classList.remove('open');
            }
        });
    </script>
    <script type="module">
        import { checkPageAuth } from '../../js/auth-check.js';
        import { loadCurrentUserProfile } from '../../js/profile-loader.js';
        import { signOut as authSignOut } from '../../js/auth.js';
        import { fetchNotifications, markNotificationAsRead, markAllNotificationsAsRead } from '../../js/notifications.js';
        import supabase from '../../js/supabase.js';

        let activeFilter = 'all'; // all, unread, read
        let userProfile = null;
        let realtimeChannel = null;

        async function initPage() {
            await checkPageAuth('officer');
            userProfile = await loadCurrentUserProfile();
            
            await loadNotifications();
            setupRealtimeNotifications();

            // Set up filter click events
            document.getElementById('filter-all').addEventListener('click', () => setFilter('all'));
            document.getElementById('filter-unread').addEventListener('click', () => setFilter('unread'));
            document.getElementById('filter-read').addEventListener('click', () => setFilter('read'));
            document.getElementById('markAllReadBtn').addEventListener('click', handleMarkAllRead);
        }

        async function setFilter(filter) {
            activeFilter = filter;
            
            // Toggle active classes
            ['all', 'unread', 'read'].forEach(f => {
                const btn = document.getElementById(`filter-${f}`);
                if (f === filter) {
                    btn.classList.add('bg-blue-600', 'text-white');
                    btn.classList.remove('border', 'hover:bg-gray-50');
                } else {
                    btn.classList.remove('bg-blue-600', 'text-white');
                    btn.classList.add('border', 'hover:bg-gray-50');
                }
            });

            await loadNotifications();
        }

        async function loadNotifications() {
            const options = {};
            if (activeFilter === 'unread') {
                options.filters = { read: false };
            } else if (activeFilter === 'read') {
                options.filters = { read: true };
            }

            const result = await fetchNotifications(options);
            if (result.success && result.data) {
                renderNotifications(result.data);
            } else {
                console.error('Failed to load notifications:', result.error);
            }
        }

        function renderNotifications(notifications) {
            const container = document.getElementById('notificationsList');
            if (!container) return;

            let html = '';
            notifications.forEach(notif => {
                const isUnread = !notif.read;
                const unreadClass = isUnread ? 'unread' : '';
                
                // Determine icon based on notification type/title
                let iconClass = 'ri-notification-3-line bg-blue-100 text-blue-600';
                if (notif.title?.toLowerCase().includes('cvet')) {
                    iconClass = 'ri-file-text-line bg-blue-100 text-blue-600';
                } else if (notif.title?.toLowerCase().includes('assessment') || notif.title?.toLowerCase().includes('direct')) {
                    iconClass = 'ri-file-search-line bg-emerald-100 text-emerald-600';
                } else if (notif.title?.toLowerCase().includes('license') || notif.title?.toLowerCase().includes('agent')) {
                    iconClass = 'ri-id-card-line bg-purple-100 text-purple-600';
                }

                // Action link helper
                let actionHtml = '';
                if (notif.title?.toLowerCase().includes('cvet')) {
                    actionHtml = `<a href="cvet-review-queue.html" class="text-blue-600 text-sm hover:underline font-semibold">Review Now</a>`;
                } else if (notif.title?.toLowerCase().includes('assessment') || notif.title?.toLowerCase().includes('direct')) {
                    actionHtml = `<a href="direct-assessment-queue.html" class="text-blue-600 text-sm hover:underline font-semibold">Review Now</a>`;
                } else if (notif.title?.toLowerCase().includes('license')) {
                    actionHtml = `<a href="agent-license-review.html" class="text-blue-600 text-sm hover:underline font-semibold">Review Now</a>`;
                }

                html += `
                    <div class="notification-item ${unreadClass}" data-id="${notif.id}">
                        <div class="flex items-start gap-3">
                            <div class="w-10 h-10 rounded-full flex items-center justify-center flex-shrink-0 ${iconClass.split(' ')[1]}">
                                <i class="${iconClass.split(' ')[0]} text-xl"></i>
                            </div>
                            <div class="flex-1">
                                <div class="flex justify-between items-start">
                                    <h4 class="font-semibold text-sm">${notif.title || 'Notification'}</h4>
                                    ${isUnread ? '<span class="text-xs bg-red-500 text-white px-2 py-0.5 rounded-full font-medium">New</span>' : ''}
                                </div>
                                <p class="text-sm text-gray-600 mt-1">${notif.message || ''}</p>
                                <div class="flex items-center gap-4 mt-2">
                                    <span class="notif-time"><i class="ri-time-line mr-1"></i>${formatTimeAgo(notif.created_at)}</span>
                                    ${actionHtml}
                                    ${isUnread ? `
                                        <button class="text-xs text-gray-500 hover:text-blue-600 transition ml-auto" onclick="handleMarkAsRead('${notif.id}')">Mark as read</button>
                                    ` : ''}
                                </div>
                            </div>
                        </div>
                    </div>
                `;
            });

            container.innerHTML = html || '<p class="text-gray-500 text-center py-8">No notifications found</p>';
        }

        window.handleMarkAsRead = async function(id) {
            const result = await markNotificationAsRead(id);
            if (result.success) {
                await loadNotifications();
                if (window.initializeOfficerSidebar) {
                    window.initializeOfficerSidebar();
                }
            }
        };

        async function handleMarkAllRead() {
            if (confirm('Mark all notifications as read?')) {
                const result = await markAllNotificationsAsRead();
                if (result.success) {
                    alert('✓ All notifications marked as read');
                    await loadNotifications();
                    if (window.initializeOfficerSidebar) {
                        window.initializeOfficerSidebar();
                    }
                }
            }
        }

        function setupRealtimeNotifications() {
            if (!userProfile) return;

            realtimeChannel = supabase
                .channel('officer-notifications-page')
                .on('postgres_changes', { 
                    event: '*', 
                    schema: 'public', 
                    table: 'notifications',
                    filter: `user_id=eq.${userProfile.id}`
                }, async (payload) => {
                    console.log('Realtime notification update received:', payload);
                    await loadNotifications();
                })
                .subscribe();
        }

        function formatTimeAgo(dateString) {
            const date = new Date(dateString);
            const now = new Date();
            const MathDiff = Math.floor((now - date) / 1000);
            
            if (MathDiff < 60) return 'Just now';
            if (MathDiff < 3600) return `${Math.floor(MathDiff / 60)} min ago`;
            if (MathDiff < 86400) return `${Math.floor(MathDiff / 3600)} hours ago`;
            if (MathDiff < 604800) return `${Math.floor(MathDiff / 86400)} days ago`;
            return date.toLocaleDateString();
        }

        async function handleSignOut() {
            if (realtimeChannel) {
                supabase.removeChannel(realtimeChannel);
            }
            const result = await authSignOut();
            if (result.success) {
                window.location.href = '../../auth/login.html';
            }
        }

        document.getElementById('dropdownSignOut')?.addEventListener('click', handleSignOut);

        initPage();
    </script>
</body>
</html>
