<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>SSRA Customs · Agent License Review</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <link href="https://cdn.jsdelivr.net/npm/remixicon@4.2.0/fonts/remixicon.css" rel="stylesheet" />
    <script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2"></script>
    <script type="module" src="../../js/officer-sidebar.js"></script>
    <style>
        .gradient-bg { background: linear-gradient(135deg, #1e3a5f 0%, #2a5f8f 100%); }
        .sidebar-link { transition: all 0.3s ease; cursor: pointer; display: flex; align-items: center; gap: 0.75rem; padding: 0.6rem 1rem; border-radius: 0.5rem; font-size: 0.9rem; color: #4b5563; }
        .sidebar-link:hover, .sidebar-link.active { background-color: #e8f0fe; color: #1e3a5f; }
        .sidebar-link i { font-size: 1.2rem; width: 1.5rem; text-align: center; }
        .status-badge { padding: 0.2rem 0.6rem; border-radius: 9999px; font-size: 0.65rem; font-weight: 600; }
        .status-pending { background: #fef3c7; color: #92400e; }
        .status-review { background: #dbeafe; color: #1e40af; }
        .status-approved { background: #d1fae5; color: #065f46; }
        .status-rejected { background: #fee2e2; color: #991b1b; }
        .profile-dropdown { position: absolute; right: 0; top: calc(100% + 0.5rem); background: white; border-radius: 0.75rem; box-shadow: 0 10px 25px rgba(0,0,0,0.1); border: 1px solid #e5e7eb; min-width: 200px; z-index: 50; overflow: hidden; opacity: 0; transform: translateY(-10px); pointer-events: none; transition: all 0.2s ease; }
        .profile-dropdown.open { opacity: 1; transform: translateY(0); pointer-events: auto; }
        .profile-dropdown a { display: flex; align-items: center; gap: 0.75rem; padding: 0.6rem 1rem; font-size: 0.85rem; color: #374151; transition: background 0.15s; cursor: pointer; text-decoration: none; }
        .profile-dropdown a:hover { background: #e8f0fe; color: #1e3a5f; }
        .profile-dropdown .divider { height: 1px; background: #e5e7eb; margin: 0.25rem 0; }
        .profile-dropdown .danger { color: #dc2626; }
        .profile-dropdown .danger:hover { background: #fef2f2; color: #dc2626; }
        .header-profile-btn { cursor: pointer; display: flex; align-items: center; gap: 0.5rem; padding: 0.3rem 0.75rem 0.3rem 0.5rem; border-radius: 9999px; background: rgba(255,255,255,0.2); transition: background 0.2s; border: 1px solid rgba(255,255,255,0.3); }
        .header-profile-btn:hover { background: rgba(255,255,255,0.3); }
        .header-profile-btn .avatar-sm { width: 2rem; height: 2rem; border-radius: 50%; background: white; display: flex; align-items: center; justify-content: center; color: #1e3a5f; }
        .review-card { border: 1px solid #e5e7eb; border-radius: 0.75rem; padding: 1rem; transition: all 0.2s ease; }
        .review-card:hover { border-color: #1e3a5f; background: #f8fafc; }
    </style>
</head>
<body>
    <div class="min-h-screen bg-gray-100">
        <div class="max-w-7xl mx-auto px-4 py-5">
            <div class="flex flex-col lg:flex-row gap-6">
                <!-- Sidebar -->
                <aside class="lg:w-72 flex-shrink-0">
                    <div id="officer-sidebar"></div>
                </aside>

                <main class="flex-1 space-y-5">
                    <div class="gradient-bg rounded-2xl p-5 text-white shadow-lg flex items-center justify-between">
                        <div>
                            <h2 class="text-2xl font-bold tracking-tight">🪪 Agent License Review</h2>
                            <p class="opacity-90 text-sm">Review and approve agent license applications</p>
                        </div>
                        <div class="relative">
                            <button onclick="document.getElementById('profileDropdown').classList.toggle('open')" class="header-profile-btn">
                                <span class="avatar-sm"><i class="ri-user-line"></i></span>
                                <span class="text-sm font-medium hidden sm:inline">Officer</span>
                                <i class="ri-arrow-down-s-line text-sm"></i>
                            </button>
                            <div class="profile-dropdown" id="profileDropdown">
                                <a href="#"><i class="ri-user-settings-line"></i> My Profile</a>
                                <a href="#"><i class="ri-edit-line"></i> Edit Profile</a>
                                <div class="divider"></div>
                                <a href="#" class="danger"><i class="ri-logout-box-line"></i> Sign Out</a>
                            </div>
                        </div>
                    </div>

                    <div class="space-y-3" id="reviewList">
                        <div class="text-sm text-gray-500 text-center py-8">Loading Agent License queue...</div>
                    </div>
                </main>
            </div>
        </div>
    </div>
    <script type="module">
        import supabase from '../../js/supabase.js';
        import { loadCurrentUserProfile } from '../../js/profile-loader.js';
        import { checkAuth, getUserProfile, signOut, getCurrentUser, verifyRoleAccess, redirectToDashboard } from '../../js/auth.js';
        
        import { fetchApplicationsForRole } from '../../js/applications.js';

        
        const PAGE_KEY = 'agent-license-review';
        let currentRole = null;
        let currentUserId = null;

        document.addEventListener('click', function(e) {
            if (!e.target.closest('.header-profile-btn') && !e.target.closest('.profileDropdown')) {
                document.getElementById('profileDropdown').classList.remove('open');
            }
        });

        async function init() {
            console.log('=== LOADING AGENT LICENSE REVIEW ===');

            const isAuthenticated = await checkAuth();

        // Load user profile
        await loadCurrentUserProfile();
            if (!isAuthenticated) {
                window.location.href = '../../auth/login.html';
                return;
            }

            const hasAccess = await verifyRoleAccess('officer');
            if (!hasAccess) {
                
                if (user) {
                    
                    if (profile && profile.role) {
                        const dashboardUrl = redirectToDashboard(profile.role);
                        window.location.href = dashboardUrl;
                        return;
                    }
                }
                window.location.href = '../../auth/login.html';
                return;
            }

            
            

            if (profile) {
                currentRole = profile.role || 'officer';
                currentUserId = profile.id;
            } else {
                currentRole = 'officer';
                currentUserId = user?.id;
            }

            await loadAgentLicenseQueue();
            setupRealtime();
        }

        let realtimeChannel = null;
        function setupRealtime() {
            realtimeChannel = supabase
                .channel('agent-license-updates')
                .on('postgres_changes', { event: '*', schema: 'public', table: 'applications' }, async () => {
                    await loadAgentLicenseQueue();
                })
                .subscribe();
        }

        async function loadAgentLicenseQueue() {
            console.log('=== LOADING AGENT LICENSE QUEUE ===');

            const result = await fetchApplicationsForRole('officer', {
                filters: { application_type: 'Agent License' },
                limit: 20
            });

            if (result.success && result.data) {
                const applications = result.data;
                console.log('Agent License applications loaded:', applications);

                renderReviewList(applications);
            } else {
                console.error('Failed to load Agent License queue:', result.error);
                document.getElementById('reviewList').innerHTML = `
                    <div class="text-sm text-red-500 text-center py-8">
                        Failed to load Agent License queue: ${result.error}
                    </div>
                `;
            }
        }

        function renderReviewList(applications) {
            const container = document.getElementById('reviewList');

            if (!applications || applications.length === 0) {
                container.innerHTML = `
                    <div class="text-sm text-gray-500 text-center py-8">
                        No Agent License applications in queue
                    </div>
                `;
                return;
            }

            container.innerHTML = applications.map(app => {
                const statusClass = getStatusClass(app.status);
                const statusLabel = getStatusLabel(app.status);

                return `
                    <div class="review-card">
                        <div class="flex flex-wrap justify-between items-start gap-2">
                            <div>
                                <h4 class="font-bold text-purple-600">${app.application_number || 'N/A'}</h4>
                                <p class="text-sm text-gray-500">${app.applicant_name || app.company_name || 'Unknown'} · ${app.license_type || app.license_class || 'N/A'}</p>
                                <div class="flex items-center gap-4 mt-2">
                                    <span class="status-badge ${statusClass}">${statusLabel}</span>
                                    <span class="text-xs text-gray-400">Submitted: ${formatDate(app.submitted_at || app.created_at)}</span>
                                </div>
                            </div>
                            <div class="flex gap-2">
                                <a href="review-application.html?id=${app.id}" class="bg-blue-600 text-white px-4 py-1.5 rounded-lg text-sm font-semibold hover:bg-blue-700 transition">Review</a>
                            </div>
                        </div>
                    </div>
                `;
            }).join('');
        }

        function getStatusClass(status) {
            const statusMap = {
                'pending': 'status-pending',
                'submitted': 'status-pending',
                'under_review': 'status-review',
                'approved': 'status-approved',
                'rejected': 'status-rejected',
                'returned': 'status-rejected'
            };
            return statusMap[status] || 'status-pending';
        }

        function getStatusLabel(status) {
            const statusMap = {
                'pending': 'Pending',
                'submitted': 'Submitted',
                'under_review': 'Under Review',
                'approved': '✓ Approved',
                'rejected': 'Rejected',
                'returned': 'Returned'
            };
            return statusMap[status] || status;
        }

        function formatDate(dateString) {
            if (!dateString) return 'N/A';
            return new Date(dateString).toLocaleDateString('en-US', {
                month: 'short',
                day: 'numeric',
                year: 'numeric'
            });
        }

        init();
    </script>
</body></html>
