<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>SSRA Customs · Inspector Notifications</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <link href="../assets/icons/remixicon.css" rel="stylesheet" />
    
    <style>
        .gradient-bg { background: linear-gradient(135deg, #1e3a5f 0%, #2a5f8f 100%); }
        .sidebar-link { transition: all 0.3s ease; cursor: pointer; display: flex; align-items: center; gap: 0.75rem; padding: 0.6rem 1rem; border-radius: 0.5rem; font-size: 0.9rem; color: #4b5563; }
        .sidebar-link:hover, .sidebar-link.active { background-color: #e8f0fe; color: #1e3a5f; }
        .sidebar-link i { font-size: 1.2rem; width: 1.5rem; text-align: center; }
        .notification-item { padding: 1rem; border-radius: 0.75rem; border: 1px solid #e5e7eb; transition: all 0.2s ease; }
        .notification-item:hover { background: #f9fafb; }
        .notification-item.unread { background: #e8f0fe; border-color: #1e3a5f; }
        .notification-item .notif-time { font-size: 0.75rem; color: #6b7280; }
        .profile-dropdown { position: absolute; right: 0; top: calc(100% + 0.5rem); background: white; border-radius: 0.75rem; box-shadow: 0 10px 25px rgba(0,0,0,0.1); border: 1px solid #e5e7eb; min-width: 200px; z-index: 50; overflow: hidden; opacity: 0; transform: translateY(-10px); pointer-events: none; transition: all 0.2s ease; }
        .profile-dropdown.open { opacity: 1; transform: translateY(0); pointer-events: auto; }
        .profile-dropdown a { display: flex; align-items: center; gap: 0.75rem; padding: 0.6rem 1rem; font-size: 0.85rem; color: #374151; transition: background 0.15s; cursor: pointer; text-decoration: none; }
        .profile-dropdown a:hover { background: #e8f0fe; color: #1e3a5f; }
        .profile-dropdown .divider { height: 1px; background: #e5e7eb; margin: 0.25rem 0; }
        .profile-dropdown .danger { color: #dc2626; }
        .profile-dropdown .danger:hover { background: #fef2f2; color: #dc2626; }
        .header-profile-btn { cursor: pointer; display: flex; align-items: center; gap: 0.5rem; padding: 0.3rem 0.75rem 0.3rem 0.5rem; border-radius: 9999px; background: rgba(255,255,255,0.2); transition: background 0.2s; border: 1px solid rgba(255,255,255,0.3); }
        .header-profile-btn:hover { background: rgba(255,255,255,0.3); }
        .header-profile-btn .avatar-sm { width: 2rem; height: 2rem; border-radius: 50%; background: white; display: flex; align-items: center; justify-content: center; color: #1e3a5f; }
    </style>
</head>
<body>
    <div class="min-h-screen bg-gray-100">
        <div class="max-w-7xl mx-auto px-4 py-5">
            <div class="flex flex-col lg:flex-row gap-6">
                <aside class="lg:w-72 flex-shrink-0">
                    <div class="bg-white rounded-2xl shadow-sm border border-gray-200/70 p-5 sticky top-6">
                        <div class="text-center mb-5">
                            <div class="w-20 h-20 rounded-2xl flex items-center justify-center mx-auto mb-2 shadow-md gradient-bg">
                                <i class="ri-user-line text-white text-3xl"></i>
                            </div>
                            <h3 id="profileName" class="text-lg font-bold text-gray-800">Loading...</h3>
                            <p id="profileRole" class="text-gray-500 text-sm">Loading...</p>
                            <span class="inline-block mt-1 text-xs bg-green-100 text-green-700 px-2.5 py-0.5 rounded-full font-medium">● Active</span>
                        </div>
                        <nav class="space-y-1 mb-4">
                            <a href="dashboard-inspector.html" class="sidebar-link"><i class="ri-dashboard-line"></i><span>Dashboard</span></a>
                            <a href="inspection-queue.html" class="sidebar-link"><i class="ri-clipboard-line"></i><span>Inspection Queue</span></a>
                            <a href="cargo-inspection.html" class="sidebar-link"><i class="ri-truck-line"></i><span>Cargo Inspection</span></a>
                            <a href="vehicle-inspection.html" class="sidebar-link"><i class="ri-car-line"></i><span>Vehicle Inspection</span></a>
                            <a href="inspection-reports.html" class="sidebar-link"><i class="ri-file-chart-line"></i><span>Inspection Reports</span></a>
                            <a href="notifications.html" class="sidebar-link active"><i class="ri-notification-3-line"></i><span>Notifications</span><span class="ml-auto bg-red-500 text-white text-[10px] px-2 py-0.5 rounded-full font-semibold" id="notificationBadge">0</span></a>
                        </nav>
                        <button id="signOutBtn" class="mt-4 w-full bg-red-50 text-red-600 py-2.5 rounded-xl text-sm font-semibold hover:bg-red-100 transition flex items-center justify-center gap-2">
                            <i class="ri-logout-box-line"></i> Sign Out
                        </button>
                    </div>
                </aside>

                <main class="flex-1 space-y-5">
                    <div class="gradient-bg rounded-2xl p-5 text-white shadow-lg flex items-center justify-between">
                        <div>
                            <h2 class="text-2xl font-bold tracking-tight">🔔 Notifications</h2>
                            <p class="opacity-90 text-sm">Stay updated on inspection assignments</p>
                        </div>
                        <div class="relative">
                            <button id="profileDropdownBtn" class="header-profile-btn">
                                <span class="avatar-sm"><i class="ri-user-line"></i></span>
                                <span class="text-sm font-medium hidden sm:inline">Inspector</span>
                                <i class="ri-arrow-down-s-line text-sm"></i>
                            </button>
                            <div class="profile-dropdown" id="profileDropdown">
                                <a href="#"><i class="ri-user-settings-line"></i> My Profile</a>
                                <a href="#"><i class="ri-edit-line"></i> Edit Profile</a>
                                <div class="divider"></div>
                                <a href="#" class="danger"><i class="ri-logout-box-line"></i> Sign Out</a>
                            </div>
                        </div>
                    </div>

                    <div class="bg-white rounded-xl border border-gray-200 p-4 shadow-sm flex flex-wrap gap-3 items-center justify-between">
                        <div class="flex flex-wrap gap-2">
                            <button class="px-4 py-1.5 rounded-full text-sm bg-blue-600 text-white">All</button>
                            <button class="px-4 py-1.5 rounded-full text-sm border hover:bg-gray-50">Unread</button>
                            <button class="px-4 py-1.5 rounded-full text-sm border hover:bg-gray-50">Read</button>
                        </div>
                        <button id="markAllReadBtn" class="text-sm text-blue-600 hover:underline">Mark all as read</button>
                    </div>

                    <div class="space-y-3" id="notificationsContainer">
                        <div class="text-center py-10 bg-white rounded-xl border border-gray-200 shadow-sm">
                            <i class="ri-loader-4-line text-4xl text-blue-500 animate-spin block mb-2"></i>
                            <p class="text-gray-500">Loading notifications...</p>
                        </div>
                    </div>
                </main>
            </div>
        </div>
    </div>
    <script type="module">
        import supabase from '../../js/supabase.js';
        import { loadCurrentUserProfile } from '../../js/profile-loader.js';
        import { checkPageAuth } from '../../js/auth-check.js';
        
        import { fetchNotifications, markAllNotificationsAsRead, markNotificationAsRead, fetchUnreadNotifications } from '../../js/notifications.js';
        
        import { signOut as authSignOut } from '../../js/auth.js';
        
        import { realtimeManager } from '../../js/realtime.js';

        
        const PAGE_KEY = 'inspector-notifications';
        let currentRole = null;
        let currentUserId = null;
        let currentFilter = 'all';

        document.addEventListener('click', function(e) {
            if (!e.target.closest('.header-profile-btn') && !e.target.closest('.profileDropdown')) {
                const dropdown = document.getElementById('profileDropdown');
                if (dropdown) dropdown.classList.remove('open');
            }
        });

        async function init() {
            const hasAuth = await checkPageAuth('inspector');

        // Load user profile
        await loadCurrentUserProfile();
            if (!hasAuth) return;

            
            if (!user) {
                window.location.href = '../../auth/login.html';
                return;
            }

            const profile = await supabase.from('profiles').select('*').eq('user_id', user.id).single();
            if (profile.data) {
                currentRole = profile.data.role;
                currentUserId = profile.data.id;
                document.querySelectorAll('.text-center h3, .header-profile-btn span.hidden').forEach(el => {
                    el.textContent = profile.data.full_name || 'Inspector';
                });
            }

            await loadNotifications();
            await initializeRealtime();
            await loadNotificationBadge();

            document.getElementById('markAllReadBtn').addEventListener('click', markAllAsRead);
            document.getElementById('profileDropdownBtn')?.addEventListener('click', () => {
                document.getElementById('profileDropdown')?.classList.toggle('open');
            });
        }

        async function loadNotifications(filter = 'all') {
            try {
                currentFilter = filter;
                const container = document.getElementById('notificationsContainer');

                let result;
                if (filter === 'unread') {
                    result = await fetchNotifications();
                    if (result.success && result.data) {
                        result.data = result.data.filter(n => !n.read);
                    }
                } else if (filter === 'read') {
                    result = await fetchNotifications();
                    if (result.success && result.data) {
                        result.data = result.data.filter(n => n.read);
                    }
                } else {
                    result = await fetchNotifications();
                }

                if (result.success && result.data && result.data.length > 0) {
                    container.innerHTML = result.data.map(notif => createNotificationItem(notif)).join('');

                    result.data.forEach(notif => {
                        const item = document.getElementById(`notif-${notif.id}`);
                        if (item && !notif.read) {
                            item.addEventListener('click', () => markAsRead(notif.id));
                        }
                    });
                } else {
                    container.innerHTML = `
                        <div class="text-center py-10 bg-white rounded-xl border border-gray-200 shadow-sm">
                            <i class="ri-notification-off-line text-4xl text-gray-300 block mb-2"></i>
                            <p class="text-gray-500">No notifications found</p>
                        </div>
                    `;
                }
            } catch (error) {
                console.error('Error loading notifications:', error);
            }
        }

        function createNotificationItem(notif) {
            const iconClass = getNotificationIcon(notif.type);
            const iconColorClass = getNotificationIconColor(notif.type);
            const timeAgo = formatTimeAgo(notif.created_at);
            const unreadClass = !notif.read ? 'unread' : '';
            const newBadge = !notif.read ? '<span class="text-xs bg-red-500 text-white px-2 py-0.5 rounded-full">New</span>' : '';
            
            return `
                <div class="notification-item ${unreadClass}" id="notif-${notif.id}">
                    <div class="flex items-start gap-3">
                        <div class="w-10 h-10 rounded-full ${iconColorClass} flex items-center justify-center flex-shrink-0">
                            <i class="${iconClass} text-xl"></i>
                        </div>
                        <div class="flex-1">
                            <div class="flex justify-between items-start">
                                <h4 class="font-semibold text-sm">${notif.title || 'Notification'}</h4>
                                ${newBadge}
                            </div>
                            <p class="text-sm text-gray-600 mt-1">${notif.message || ''}</p>
                            <div class="flex items-center gap-4 mt-2">
                                <span class="notif-time"><i class="ri-time-line mr-1"></i>${timeAgo}</span>
                                ${notif.reference_type === 'application' && notif.reference_id ? `<a href="inspection-details.html?id=${notif.reference_id}" class="text-blue-600 text-sm hover:underline">View Details</a>` : ''}
                            </div>
                        </div>
                    </div>
                </div>
            `;
        }

        function getNotificationIcon(type) {
            const iconMap = {
                'inspection_assignment': 'ri-clipboard-line',
                'vehicle_inspection': 'ri-car-line',
                'inspection_approved': 'ri-check-double-line',
                'deadline_reminder': 'ri-time-line',
                'ai_validation_error': 'ri-robot-line',
                'ai_monitoring_alert': 'ri-alert-line',
                'application_status_update': 'ri-file-edit-line',
                'payment_required': 'ri-bank-card-line'
            };
            return iconMap[type] || 'ri-notification-3-line';
        }

        function getNotificationIconColor(type) {
            const colorMap = {
                'inspection_assignment': 'bg-blue-100 text-blue-600',
                'vehicle_inspection': 'bg-orange-100 text-orange-600',
                'inspection_approved': 'bg-green-100 text-green-600',
                'deadline_reminder': 'bg-yellow-100 text-yellow-600',
                'ai_validation_error': 'bg-red-100 text-red-600',
                'ai_monitoring_alert': 'bg-purple-100 text-purple-600',
                'application_status_update': 'bg-indigo-100 text-indigo-600',
                'payment_required': 'bg-pink-100 text-pink-600'
            };
            return colorMap[type] || 'bg-gray-100 text-gray-600';
        }

        function formatTimeAgo(dateString) {
            const date = new Date(dateString);
            const now = new Date();
            const seconds = Math.floor((now - date) / 1000);
            
            if (seconds < 60) return 'Just now';
            if (seconds < 3600) return `${Math.floor(seconds / 60)} min ago`;
            if (seconds < 86400) return `${Math.floor(seconds / 3600)} hours ago`;
            if (seconds < 604800) return `${Math.floor(seconds / 86400)} days ago`;
            return date.toLocaleDateString();
        }

        async function markAsRead(id) {
            try {
                const result = await markNotificationAsRead(id);
                if (result.success) {
                    const item = document.getElementById(`notif-${id}`);
                    if (item) {
                        item.classList.remove('unread');
                        const badge = item.querySelector('.bg-red-500');
                        if (badge) badge.remove();
                    }
                }
            } catch (error) {
                console.error('Error marking notification as read:', error);
            }
        }

        async function markAllAsRead() {
            try {
                const result = await markAllNotificationsAsRead();
                if (result.success) {
                    document.querySelectorAll('.notification-item.unread').forEach(el => {
                        el.classList.remove('unread');
                        const badge = el.querySelector('.bg-red-500');
                        if (badge) badge.remove();
                    });
                } else {
                    console.error('Failed to mark all as read:', result.error);
                }
            } catch (error) {
                console.error('Error marking all as read:', error);
            }
        }

        async function initializeRealtime() {
            await realtimeManager.initialize();
            
            realtimeManager.registerPage(PAGE_KEY, currentRole, currentUserId, {
                onNotificationChange: async () => {
                    await loadNotifications(currentFilter);
                }
            });
        }

        window.addEventListener('beforeunload', () => {
            realtimeManager.unregisterPage(PAGE_KEY);
        });

        async function handleSignOut() {
            realtimeManager.unregisterPage(PAGE_KEY);
            const result = await authSignOut();
            if (result.success) {
                window.location.href = '../../auth/login.html';
            } else {
                console.error('Sign out failed:', result.error);
            }
        }

        async function loadNotificationBadge() {
            const result = await fetchUnreadNotifications();
            const badge = document.getElementById('notificationBadge');
            if (badge && result.success) {
                badge.textContent = result.data?.length || 0;
                badge.style.display = result.data?.length > 0 ? 'inline' : 'none';
            }
        }

        document.getElementById('signOutBtn')?.addEventListener('click', handleSignOut);

        document.addEventListener('DOMContentLoaded', init);
    </script>
</body></html>
