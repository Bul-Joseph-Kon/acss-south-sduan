<!DOCTYPE html>
<html lang="en">

<head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>SSRA Customs · Cargo Inspection</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2"></script>
    <link href="../assets/icons/remixicon.css" rel="stylesheet" />
    
    <style>
        .gradient-bg {
            background: linear-gradient(135deg, #1e3a5f 0%, #2a5f8f 100%);
        }

        .sidebar-link {
            transition: all 0.3s ease;
            cursor: pointer;
            display: flex;
            align-items: center;
            gap: 0.75rem;
            padding: 0.6rem 1rem;
            border-radius: 0.5rem;
            font-size: 0.9rem;
            color: #4b5563;
        }

        .sidebar-link:hover,
        .sidebar-link.active {
            background-color: #e8f0fe;
            color: #1e3a5f;
        }

        .sidebar-link i {
            font-size: 1.2rem;
            width: 1.5rem;
            text-align: center;
        }

        .form-group {
            margin-bottom: 1rem;
        }

        .form-group label {
            display: block;
            font-size: 0.8rem;
            font-weight: 500;
            color: #374151;
            margin-bottom: 0.2rem;
        }

        .form-group .form-input {
            width: 100%;
            padding: 0.4rem 0.6rem;
            border-radius: 0.4rem;
            border: 1px solid #d1d5db;
            font-size: 0.85rem;
            transition: border-color 0.2s;
        }

        .form-group .form-input:focus {
            outline: none;
            border-color: #1e3a5f;
            box-shadow: 0 0 0 3px rgba(30, 58, 95, 0.1);
        }

        .form-group .form-textarea {
            width: 100%;
            padding: 0.4rem 0.6rem;
            border-radius: 0.4rem;
            border: 1px solid #d1d5db;
            font-size: 0.85rem;
            transition: border-color 0.2s;
            min-height: 100px;
        }

        .form-group .form-textarea:focus {
            outline: none;
            border-color: #1e3a5f;
            box-shadow: 0 0 0 3px rgba(30, 58, 95, 0.1);
        }

        .profile-dropdown {
            position: absolute;
            right: 0;
            top: calc(100% + 0.5rem);
            background: white;
            border-radius: 0.75rem;
            box-shadow: 0 10px 25px rgba(0, 0, 0, 0.1);
            border: 1px solid #e5e7eb;
            min-width: 200px;
            z-index: 50;
            overflow: hidden;
            opacity: 0;
            transform: translateY(-10px);
            pointer-events: none;
            transition: all 0.2s ease;
        }

        .profile-dropdown.open {
            opacity: 1;
            transform: translateY(0);
            pointer-events: auto;
        }

        .profile-dropdown a {
            display: flex;
            align-items: center;
            gap: 0.75rem;
            padding: 0.6rem 1rem;
            font-size: 0.85rem;
            color: #374151;
            transition: background 0.15s;
            cursor: pointer;
            text-decoration: none;
        }

        .profile-dropdown a:hover {
            background: #e8f0fe;
            color: #1e3a5f;
        }

        .profile-dropdown .divider {
            height: 1px;
            background: #e5e7eb;
            margin: 0.25rem 0;
        }

        .profile-dropdown .danger {
            color: #dc2626;
        }

        .profile-dropdown .danger:hover {
            background: #fef2f2;
            color: #dc2626;
        }

        .header-profile-btn {
            cursor: pointer;
            display: flex;
            align-items: center;
            gap: 0.5rem;
            padding: 0.3rem 0.75rem 0.3rem 0.5rem;
            border-radius: 9999px;
            background: rgba(255, 255, 255, 0.2);
            transition: background 0.2s;
            border: 1px solid rgba(255, 255, 255, 0.3);
        }

        .header-profile-btn:hover {
            background: rgba(255, 255, 255, 0.3);
        }

        .header-profile-btn .avatar-sm {
            width: 2rem;
            height: 2rem;
            border-radius: 50%;
            background: white;
            display: flex;
            align-items: center;
            justify-content: center;
            color: #1e3a5f;
        }

        .status-badge {
            padding: 0.2rem 0.6rem;
            border-radius: 9999px;
            font-size: 0.65rem;
            font-weight: 600;
        }

        .status-approved {
            background: #d1fae5;
            color: #065f46;
        }
    </style>
</head>

<body>
    <div class="min-h-screen bg-gray-100">
        <div class="max-w-7xl mx-auto px-4 py-5">
            <div class="flex flex-col lg:flex-row gap-6">
                <aside class="lg:w-72 flex-shrink-0">
                    <div class="bg-white rounded-2xl shadow-sm border border-gray-200/70 p-5 sticky top-6">
                        <div class="text-center mb-5">
                            <div
                                class="w-20 h-20 rounded-2xl flex items-center justify-center mx-auto mb-2 shadow-md gradient-bg">
                                <i class="ri-user-line text-white text-3xl"></i>
                            </div>
                            <h3 id="profileName" class="text-lg font-bold text-gray-800">Loading...</h3>
                            <p id="profileRole" class="text-gray-500 text-sm">Loading...</p>
                            <span
                                class="inline-block mt-1 text-xs bg-green-100 text-green-700 px-2.5 py-0.5 rounded-full font-medium">●
                                Active</span>
                        </div>
                        <nav class="space-y-1 mb-4">
                            <a href="dashboard-inspector.html" class="sidebar-link"><i
                                    class="ri-dashboard-line"></i><span>Dashboard</span></a>
                            <a href="inspection-queue.html" class="sidebar-link"><i
                                    class="ri-clipboard-line"></i><span>Inspection Queue</span></a>
                            <a href="cargo-inspection.html" class="sidebar-link active"><i
                                    class="ri-truck-line"></i><span>Cargo Inspection</span></a>
                            <a href="vehicle-inspection.html" class="sidebar-link"><i
                                    class="ri-car-line"></i><span>Vehicle Inspection</span></a>
                            <a href="inspection-reports.html" class="sidebar-link"><i
                                    class="ri-file-chart-line"></i><span>Inspection Reports</span></a>
                            <a href="notifications.html" class="sidebar-link"><i
                                    class="ri-notification-3-line"></i><span>Notifications</span><span
                                    class="ml-auto bg-red-500 text-white text-[10px] px-2 py-0.5 rounded-full font-semibold"
                                    id="notificationBadge">0</span></a>
                        </nav>
                        <button id="signOutBtn"
                            class="mt-4 w-full bg-red-50 text-red-600 py-2.5 rounded-xl text-sm font-semibold hover:bg-red-100 transition flex items-center justify-center gap-2">
                            <i class="ri-logout-box-line"></i> Sign Out
                        </button>
                    </div>
                </aside>

                <main class="flex-1 space-y-5">
                    <div class="gradient-bg rounded-2xl p-5 text-white shadow-lg flex items-center justify-between">
                        <div>
                            <h2 class="text-2xl font-bold tracking-tight">🚚 Cargo Inspection</h2>
                            <p class="opacity-90 text-sm">Inspect cargo and record findings</p>
                        </div>
                        <div class="relative">
                            <button id="profileDropdownBtn" class="header-profile-btn">
                                <span class="avatar-sm"><i class="ri-user-line"></i></span>
                                <span class="text-sm font-medium hidden sm:inline">Inspector</span>
                                <i class="ri-arrow-down-s-line text-sm"></i>
                            </button>
                            <div class="profile-dropdown" id="profileDropdown">
                                <a href="#"><i class="ri-user-settings-line"></i> My Profile</a>
                                <a href="#"><i class="ri-edit-line"></i> Edit Profile</a>
                                <div class="divider"></div>
                                <a href="#" class="danger"><i class="ri-logout-box-line"></i> Sign Out</a>
                            </div>
                        </div>
                    </div>

                    <div class="bg-white rounded-xl border border-gray-200 p-5 shadow-sm">
                        <h3 class="font-bold text-lg mb-4">Inspection Details</h3>
                        <div class="grid md:grid-cols-2 gap-4">
                            <div class="form-group">
                                <label>Declaration Reference</label>
                                <input type="text" id="declarationRef" class="form-input" disabled />
                            </div>
                            <div class="form-group">
                                <label>Importer</label>
                                <input type="text" id="importer" class="form-input" disabled />
                            </div>
                            <div class="form-group">
                                <label>Goods Description</label>
                                <input type="text" id="goodsDescription" class="form-input" disabled />
                            </div>
                            <div class="form-group">
                                <label>Location</label>
                                <input type="text" id="location" class="form-input" disabled />
                            </div>
                            <div class="form-group">
                                <label>Inspection Date</label>
                                <input type="date" id="inspectionDate" class="form-input" />
                            </div>
                            <div class="form-group">
                                <label>Inspector Name</label>
                                <input type="text" id="inspectorName" class="form-input" disabled />
                            </div>
                            <div class="form-group">
                                <label>Status</label>
                                <span id="statusBadge" class="status-badge status-approved">In Progress</span>
                            </div>
                        </div>

                        <div class="form-group mt-4">
                            <label>Inspection Findings</label>
                            <textarea id="inspectionFindings" class="form-textarea"
                                placeholder="Enter detailed inspection findings..."></textarea>
                        </div>

                        <div class="form-group">
                            <label>Additional Notes</label>
                            <textarea id="additionalNotes" class="form-textarea"
                                placeholder="Additional notes..."></textarea>
                        </div>

                        <div class="flex gap-3 mt-4">
                            <button id="passBtn"
                                class="bg-green-600 text-white px-6 py-2 rounded-lg text-sm font-semibold hover:bg-green-700 transition flex items-center gap-2">
                                <i class="ri-check-line"></i> Pass Inspection
                            </button>
                            <button id="failBtn"
                                class="bg-red-600 text-white px-6 py-2 rounded-lg text-sm font-semibold hover:bg-red-700 transition flex items-center gap-2">
                                <i class="ri-close-line"></i> Fail Inspection
                            </button>
                            <button id="draftBtn"
                                class="bg-yellow-600 text-white px-6 py-2 rounded-lg text-sm font-semibold hover:bg-yellow-700 transition flex items-center gap-2">
                                <i class="ri-save-line"></i> Save Draft
                            </button>
                        </div>

                        <div class="flex justify-between mt-4 pt-4 border-t border-gray-200">
                            <a href="inspection-queue.html"
                                class="bg-gray-100 hover:bg-gray-200 text-gray-700 px-6 py-2 rounded-lg text-sm font-semibold transition flex items-center gap-1">
                                <i class="ri-arrow-left-line"></i> Back to Queue
                            </a>
                            <a href="inspection-reports.html"
                                class="bg-blue-600 hover:bg-blue-700 text-white px-6 py-2 rounded-lg text-sm font-semibold transition flex items-center gap-1">
                                View Reports <i class="ri-arrow-right-line"></i>
                            </a>
                        </div>
                    </div>
                </main>
            </div>
        </div>
    </div>
    <script type="module">
        import supabase from '../../js/supabase.js';
        import { loadCurrentUserProfile } from '../../js/profile-loader.js';
        import { checkPageAuth } from '../../js/auth-check.js';

        import { fetchApplicationById, updateApplication, logInspectionActivity, logAuditAction } from '../../js/applications.js';

        import { fetchUnreadNotifications, sendInspectionPassedNotification, sendInspectionFailedNotification } from '../../js/notifications.js';

        import { signOut as authSignOut } from '../../js/auth.js';

        import { realtimeManager } from '../../js/realtime.js';


        const PAGE_KEY = 'cargo-inspection';
        let currentRole = null;
        let currentUserId = null;
        let applicationId = null;
        let application = null;

        document.addEventListener('click', function (e) {
            if (!e.target.closest('.header-profile-btn') && !e.target.closest('.profileDropdown')) {
                const dropdown = document.getElementById('profileDropdown');
                if (dropdown) dropdown.classList.remove('open');
            }
        });

        async function init() {
            const hasAuth = await checkPageAuth('inspector');

            // Load user profile
            await loadCurrentUserProfile();
            if (!hasAuth) return;


            if (!user) {
                window.location.href = '../../auth/login.html';
                return;
            }

            const profile = await supabase.from('profiles').select('*').eq('user_id', user.id).single();
            if (profile.data) {
                currentRole = profile.data.role;
                currentUserId = profile.data.id;
                document.querySelectorAll('.text-center h3, .header-profile-btn span.hidden').forEach(el => {
                    el.textContent = profile.data.full_name || 'Inspector';
                });
            }

            const urlParams = new URLSearchParams(window.location.search);
            applicationId = urlParams.get('id');

            if (!applicationId) {
                const { data: apps } = await supabase
                    .from('applications')
                    .select('id')
                    .eq('status', 'under_inspection')
                    .eq('inspector_id', currentUserId)
                    .limit(1);
                if (apps && apps.length > 0) {
                    applicationId = apps[0].id;
                    window.history.replaceState({}, '', `?id=${applicationId}`);
                }
            }

            if (applicationId) {
                await loadApplicationData(applicationId);
            } else {
                document.getElementById('declarationRef').value = 'No application assigned';
            }

            await initializeRealtime();
            await loadNotificationBadge();

            document.getElementById('passBtn').addEventListener('click', () => submitInspection('passed'));
            document.getElementById('failBtn').addEventListener('click', () => submitInspection('failed'));
            document.getElementById('draftBtn').addEventListener('click', saveDraft);
            document.getElementById('profileDropdownBtn')?.addEventListener('click', () => {
                document.getElementById('profileDropdown')?.classList.toggle('open');
            });
        }

        async function loadApplicationData(appId) {
            try {
                const result = await fetchApplicationById(appId);
                if (result.success && result.data) {
                    application = result.data;
                    populateForm(application);
                } else {
                    console.error('Failed to load application:', result.error);
                    document.getElementById('declarationRef').value = 'Error loading application';
                }
            } catch (error) {
                console.error('Error loading application:', error);
                document.getElementById('declarationRef').value = 'Error loading application';
            }
        }

        function populateForm(app) {
            document.getElementById('declarationRef').value = app.application_number || '';

            const importerName = app.goods_data?.importer_name || app.declaration_data?.importer_name || '';
            document.getElementById('importer').value = importerName;

            const goodsDesc = app.goods_data?.item_description || app.declaration_data?.product_description || '';
            document.getElementById('goodsDescription').value = goodsDesc;

            const location = app.declaration_data?.port_of_entry || app.goods_data?.location || '';
            document.getElementById('location').value = location;

            document.getElementById('inspectionDate').value = new Date().toISOString().split('T')[0];

            document.getElementById('inspectorName').value = currentUserId ? 'Loading...' : 'Inspector';

            if (currentUserId) {
                supabase.from('profiles').select('full_name').eq('id', currentUserId).single().then(({ data }) => {
                    if (data) document.getElementById('inspectorName').value = data.full_name;
                }).catch(() => {
                    document.getElementById('inspectorName').value = 'Inspector';
                });
            }

            const statusBadge = document.getElementById('statusBadge');
            statusBadge.textContent = app.status?.replace('_', ' ').toUpperCase() || 'IN PROGRESS';
            statusBadge.className = 'status-badge ' + getStatusBadgeClass(app.status);

            if (app.inspection_report) {
                document.getElementById('inspectionFindings').value = app.inspection_report.findings || '';
                document.getElementById('additionalNotes').value = app.inspection_report.notes || '';
            }
        }

        function getStatusBadgeClass(status) {
            switch (status) {
                case 'passed':
                case 'completed':
                case 'cleared':
                    return 'status-approved';
                case 'failed':
                case 'rejected':
                    return 'status-pending';
                case 'in_progress':
                case 'under_inspection':
                    return 'status-in-progress';
                default:
                    return 'status-pending';
            }
        }

        async function submitInspection(result) {
            try {
                if (!applicationId) {
                    console.error('No application selected');
                    return;
                }

                const findings = document.getElementById('inspectionFindings').value;
                const notes = document.getElementById('additionalNotes').value;
                const inspectionDate = document.getElementById('inspectionDate').value;

                if (!findings.trim()) {
                    console.error('Please enter inspection findings');
                    return;
                }

                const inspectionReport = {
                    findings,
                    notes,
                    inspection_date: inspectionDate,
                    inspector_id: currentUserId,
                    result,
                    submitted_at: new Date().toISOString()
                };

                const updates = {
                    inspection_report: inspectionReport,
                    status: result === 'passed' ? 'pending_review' : 'returned',
                    inspection_completed_at: new Date().toISOString()
                };

                const oldStatus = application?.status || 'unknown';
                const newStatus = updates.status;

                const updateResult = await updateApplication(applicationId, updates);
                if (updateResult.success) {
                    console.log(`Inspection ${result === 'passed' ? 'passed' : 'failed'} successfully`);

                    // Log inspection activity
                    await logInspectionActivity(
                        result === 'passed' ? 'inspection_passed' : 'inspection_failed',
                        applicationId,
                        `Cargo inspection ${result === 'passed' ? 'passed' : 'failed'}`,
                        { inspection_type: 'cargo', findings, notes },
                        currentUserId
                    );

                    // Log audit action
                    await logAuditAction(
                        'UPDATE',
                        'applications',
                        applicationId,
                        { status: oldStatus },
                        { status: newStatus, inspection_report: inspectionReport },
                        currentUserId
                    );

                    // Send notification to application owner
                    if (application?.user_id) {
                        if (result === 'passed') {
                            await sendInspectionPassedNotification(application.user_id, applicationId);
                        } else {
                            await sendInspectionFailedNotification(application.user_id, applicationId, findings);
                        }
                    }

                    window.location.href = 'inspection-queue.html';
                } else {
                    console.error('Failed to submit inspection:', updateResult.error);
                }
            } catch (error) {
                console.error('Error submitting inspection:', error);
            }
        }

        async function saveDraft() {
            try {
                if (!applicationId) {
                    console.error('No application selected');
                    return;
                }

                const findings = document.getElementById('inspectionFindings').value;
                const notes = document.getElementById('additionalNotes').value;
                const inspectionDate = document.getElementById('inspectionDate').value;

                const inspectionReport = {
                    findings,
                    notes,
                    inspection_date: inspectionDate,
                    inspector_id: currentUserId,
                    result: 'draft',
                    saved_at: new Date().toISOString()
                };

                const updates = {
                    inspection_report: inspectionReport
                };

                const updateResult = await updateApplication(applicationId, updates);
                if (updateResult.success) {
                    console.log('Draft saved successfully');
                } else {
                    console.error('Failed to save draft:', updateResult.error);
                }
            } catch (error) {
                console.error('Error saving draft:', error);
            }
        }

        async function initializeRealtime() {
            await realtimeManager.initialize();

            realtimeManager.registerPage(PAGE_KEY, currentRole, currentUserId, {
                onApplicationChange: async (payload) => {
                    if (applicationId && payload.new?.id === applicationId) {
                        await loadApplicationData(applicationId);
                    }
                }
            });
        }

        window.addEventListener('beforeunload', () => {
            realtimeManager.unregisterPage(PAGE_KEY);
        });

        async function handleSignOut() {
            realtimeManager.unregisterPage(PAGE_KEY);
            const result = await authSignOut();
            if (result.success) {
                window.location.href = '../../auth/login.html';
            } else {
                console.error('Sign out failed:', result.error);
            }
        }

        async function loadNotificationBadge() {
            const result = await fetchUnreadNotifications();
            const badge = document.getElementById('notificationBadge');
            if (badge && result.success) {
                badge.textContent = result.data?.length || 0;
                badge.style.display = result.data?.length > 0 ? 'inline' : 'none';
            }
        }

        document.getElementById('signOutBtn')?.addEventListener('click', handleSignOut);

        document.addEventListener('DOMContentLoaded', init);
    </script>
</body>

</html>
