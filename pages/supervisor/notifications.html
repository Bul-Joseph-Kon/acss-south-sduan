<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>SSRA Customs · Supervisor Notifications</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2"></script>
    <link href="../assets/icons/remixicon.css" rel="stylesheet" />
    <style>
        .gradient-bg { background: linear-gradient(135deg, #1e3a5f 0%, #2a5f8f 100%); }
        .sidebar-link { transition: all 0.3s ease; cursor: pointer; display: flex; align-items: center; gap: 0.75rem; padding: 0.6rem 1rem; border-radius: 0.5rem; font-size: 0.9rem; color: #4b5563; }
        .sidebar-link:hover, .sidebar-link.active { background-color: #e8f0fe; color: #1e3a5f; }
        .sidebar-link i { font-size: 1.2rem; width: 1.5rem; text-align: center; }
        .notification-item { padding: 1rem; border-radius: 0.75rem; border: 1px solid #e5e7eb; transition: all 0.2s ease; }
        .notification-item:hover { background: #f9fafb; }
        .notification-item.unread { background: #e8f0fe; border-color: #1e3a5f; }
        .notification-item .notif-time { font-size: 0.75rem; color: #6b7280; }
        .profile-dropdown { position: absolute; right: 0; top: calc(100% + 0.5rem); background: white; border-radius: 0.75rem; box-shadow: 0 10px 25px rgba(0,0,0,0.1); border: 1px solid #e5e7eb; min-width: 200px; z-index: 50; overflow: hidden; opacity: 0; transform: translateY(-10px); pointer-events: none; transition: all 0.2s ease; }
        .profile-dropdown.open { opacity: 1; transform: translateY(0); pointer-events: auto; }
        .profile-dropdown a { display: flex; align-items: center; gap: 0.75rem; padding: 0.6rem 1rem; font-size: 0.85rem; color: #374151; transition: background 0.15s; cursor: pointer; text-decoration: none; }
        .profile-dropdown a:hover { background: #e8f0fe; color: #1e3a5f; }
        .profile-dropdown .divider { height: 1px; background: #e5e7eb; margin: 0.25rem 0; }
        .profile-dropdown .danger { color: #dc2626; }
        .profile-dropdown .danger:hover { background: #fef2f2; color: #dc2626; }
        .header-profile-btn { cursor: pointer; display: flex; align-items: center; gap: 0.5rem; padding: 0.3rem 0.75rem 0.3rem 0.5rem; border-radius: 9999px; background: rgba(255,255,255,0.2); transition: background 0.2s; border: 1px solid rgba(255,255,255,0.3); }
        .header-profile-btn:hover { background: rgba(255,255,255,0.3); }
        .header-profile-btn .avatar-sm { width: 2rem; height: 2rem; border-radius: 50%; background: white; display: flex; align-items: center; justify-content: center; color: #1e3a5f; }
    </style>
</head>
<body>
    <div class="min-h-screen bg-gray-100">
        <div class="max-w-7xl mx-auto px-4 py-5">
            <div class="flex flex-col lg:flex-row gap-6">
                <aside class="lg:w-72 flex-shrink-0">
                    <div class="bg-white rounded-2xl shadow-sm border border-gray-200/70 p-5 sticky top-6">
                        <div class="text-center mb-5">
                            <div class="w-20 h-20 rounded-2xl flex items-center justify-center mx-auto mb-2 shadow-md gradient-bg">
                                <i class="ri-user-line text-white text-3xl"></i>
                            </div>
                            <h3 id="profileName" class="text-lg font-bold text-gray-800">Loading...</h3>
                            <p id="profileRole" class="text-gray-500 text-sm">Loading...</p>
                            <span class="inline-block mt-1 text-xs bg-green-100 text-green-700 px-2.5 py-0.5 rounded-full font-medium">● Active</span>
                        </div>
                        <nav class="space-y-1 mb-4">
                            <a href="dashboard-supervisor.html" class="sidebar-link"><i class="ri-dashboard-line"></i><span>Dashboard</span></a>
                            <a href="final-approvals.html" class="sidebar-link"><i class="ri-check-double-line"></i><span>Final Approvals</span></a>
                            <a href="compliance-monitoring.html" class="sidebar-link"><i class="ri-shield-line"></i><span>Compliance Monitoring</span></a>
                            <a href="escalated-cases.html" class="sidebar-link"><i class="ri-alert-line"></i><span>Escalated Cases</span></a>
                            <a href="reports.html" class="sidebar-link"><i class="ri-file-chart-line"></i><span>Reports</span></a>
                            <a href="notifications.html" class="sidebar-link active"><i class="ri-notification-3-line"></i><span>Notifications</span><span class="ml-auto bg-red-500 text-white text-[10px] px-2 py-0.5 rounded-full font-semibold" id="notificationBadge">0</span></a>
                        </nav>
                        <button id="signOutBtn" class="mt-4 w-full bg-red-50 text-red-600 py-2.5 rounded-xl text-sm font-semibold hover:bg-red-100 transition flex items-center justify-center gap-2">
                            <i class="ri-logout-box-line"></i> Sign Out
                        </button>
                    </div>
                </aside>

                <main class="flex-1 space-y-5">
                    <div class="gradient-bg rounded-2xl p-5 text-white shadow-lg flex items-center justify-between">
                        <div>
                            <h2 class="text-2xl font-bold tracking-tight">🔔 Notifications</h2>
                            <p class="opacity-90 text-sm">Stay updated on supervisory activities</p>
                        </div>
                        <div class="relative">
                            <button onclick="document.getElementById('profileDropdown').classList.toggle('open')" class="header-profile-btn">
                                <span class="avatar-sm"><i class="ri-user-line"></i></span>
                                <span class="text-sm font-medium hidden sm:inline">Supervisor</span>
                                <i class="ri-arrow-down-s-line text-sm"></i>
                            </button>
                            <div class="profile-dropdown" id="profileDropdown">
                                <a href="#"><i class="ri-user-settings-line"></i> My Profile</a>
                                <a href="#"><i class="ri-edit-line"></i> Edit Profile</a>
                                <div class="divider"></div>
                                <a href="#" id="dropdownSignOut" class="danger"><i class="ri-logout-box-line"></i> Sign Out</a>
                            </div>
                        </div>
                    </div>

                    <div class="bg-white rounded-xl border border-gray-200 p-4 shadow-sm flex flex-wrap gap-3 items-center justify-between">
                        <div class="flex flex-wrap gap-2">
                            <button id="filterAll" class="px-4 py-1.5 rounded-full text-sm bg-blue-600 text-white">All</button>
                            <button id="filterUnread" class="px-4 py-1.5 rounded-full text-sm border hover:bg-gray-50">Unread</button>
                            <button id="filterRead" class="px-4 py-1.5 rounded-full text-sm border hover:bg-gray-50">Read</button>
                        </div>
                        <button id="markAllRead" class="text-sm text-blue-600 hover:underline">Mark all as read</button>
                    </div>

                    <div class="space-y-3" id="notificationsList">
                        <div class="text-center py-10 bg-white rounded-xl border border-gray-200 shadow-sm">
                            <i class="ri-loader-4-line text-4xl text-blue-500 animate-spin block mb-2 mx-auto"></i>
                            <p class="text-gray-500">Loading notifications...</p>
                        </div>
                    </div>
                </main>
            </div>
        </div>
    </div>

    <script type="module">
        import supabase from '../../js/supabase.js';
        import { loadCurrentUserProfile } from '../../js/profile-loader.js';
        import { checkPageAuth } from '../../js/auth-check.js';
        import { signOut as authSignOut } from '../../js/auth.js';

        let currentFilter = 'all';
        let notifications = [];
        let notificationChannel = null;
        let currentUserId = null;

        async function init() {
            const hasAuth = await checkPageAuth('supervisor');
            if (!hasAuth) return;

            await loadCurrentUserProfile();

            const { data: { user } } = await supabase.auth.getUser();
            if (user) {
                currentUserId = user.id;
                const { data: profile } = await supabase
                    .from('profiles')
                    .select('full_name')
                    .eq('user_id', user.id)
                    .single();
                if (profile && profile.full_name) {
                    document.getElementById('profileName').textContent = profile.full_name;
                    document.getElementById('profileRole').textContent = 'Supervisor';
                }
            }

            await loadNotifications();
            setupRealtime();
            setupEventListeners();
        }

        function setupEventListeners() {
            document.getElementById('signOutBtn').addEventListener('click', handleSignOut);
            document.getElementById('dropdownSignOut').addEventListener('click', handleSignOut);
            document.getElementById('filterAll').addEventListener('click', () => setFilter('all'));
            document.getElementById('filterUnread').addEventListener('click', () => setFilter('unread'));
            document.getElementById('filterRead').addEventListener('click', () => setFilter('read'));
            document.getElementById('markAllRead').addEventListener('click', markAllAsRead);

            document.addEventListener('click', function(e) {
                if (!e.target.closest('.header-profile-btn') && !e.target.closest('.profileDropdown')) {
                    document.getElementById('profileDropdown').classList.remove('open');
                }
            });
        }

        async function handleSignOut() {
            const result = await authSignOut();
            if (result.success) {
                window.location.href = '../../auth/login.html';
            } else {
                console.error('Sign out failed:', result.error);
            }
        }

        async function loadNotifications() {
            const listEl = document.getElementById('notificationsList');
            if (!listEl) return;

            const { data: { user } } = await supabase.auth.getUser();
            if (!user) return;

            let query = supabase
                .from('notifications')
                .select('*')
                .eq('user_id', user.id)
                .order('created_at', { ascending: false });

            if (currentFilter === 'unread') {
                query = query.eq('read', false);
            } else if (currentFilter === 'read') {
                query = query.eq('read', true);
            }

            const { data, error } = await query;

            if (error) {
                console.error('Load notifications error:', error.code, error.message, error.details, error.hint);
                listEl.innerHTML = `<div class="text-center py-10 bg-white rounded-xl border border-gray-200 shadow-sm"><p class="text-red-500">Failed to load notifications: ${error.message}</p></div>`;
                return;
            }

            notifications = data || [];
            renderNotifications();
            updateBadge();
        }

        function renderNotifications() {
            const listEl = document.getElementById('notificationsList');
            if (!listEl) return;

            if (notifications.length === 0) {
                listEl.innerHTML = `
                    <div class="text-center py-10 bg-white rounded-xl border border-gray-200 shadow-sm">
                        <i class="ri-notification-off-line text-4xl text-gray-300 block mb-2 mx-auto"></i>
                        <p class="text-gray-500">No notifications found.</p>
                    </div>
                `;
                return;
            }

            let html = '';
            notifications.forEach(notif => {
                const isUnread = !notif.read;
                const icon = getNotificationIcon(notif.type || notif.title);
                const timeAgo = formatTimeAgo(notif.created_at);
                const link = getNotificationLink(notif.reference_type, notif.reference_id);

                html += `
                    <div class="notification-item ${isUnread ? 'unread' : ''}" data-id="${notif.id}">
                        <div class="flex items-start gap-3">
                            <div class="w-10 h-10 rounded-full ${icon.bg} flex items-center justify-center flex-shrink-0">
                                <i class="${icon.icon} ${icon.color} text-xl"></i>
                            </div>
                            <div class="flex-1">
                                <div class="flex justify-between items-start">
                                    <h4 class="font-semibold text-sm">${escapeHTML(notif.title)}</h4>
                                    ${isUnread ? '<span class="text-xs bg-red-500 text-white px-2 py-0.5 rounded-full">New</span>' : ''}
                                </div>
                                <p class="text-sm text-gray-600 mt-1">${escapeHTML(notif.message)}</p>
                                <div class="flex items-center gap-4 mt-2">
                                    <span class="notif-time"><i class="ri-time-line mr-1"></i>${timeAgo}</span>
                                    ${link ? `<a href="${link}" class="text-blue-600 text-sm hover:underline">View</a>` : ''}
                                    <button onclick="window.deleteNotification('${notif.id}')" class="text-red-500 text-sm hover:underline">Delete</button>
                                </div>
                            </div>
                        </div>
                    </div>
                `;
            });

            listEl.innerHTML = html;
        }

        function getNotificationIcon(type) {
            const iconMap = {
                'approval': { icon: 'ri-check-double-line', bg: 'bg-blue-100', color: 'text-blue-600' },
                'escalation': { icon: 'ri-alert-line', bg: 'bg-red-100', color: 'text-red-600' },
                'compliance': { icon: 'ri-shield-line', bg: 'bg-yellow-100', color: 'text-yellow-600' },
                'payment': { icon: 'ri-money-dollar-circle-line', bg: 'bg-green-100', color: 'text-green-600' },
                'inspection': { icon: 'ri-survey-line', bg: 'bg-purple-100', color: 'text-purple-600' },
                'report': { icon: 'ri-file-chart-line', bg: 'bg-purple-100', color: 'text-purple-600' },
                'default': { icon: 'ri-notification-3-line', bg: 'bg-gray-100', color: 'text-gray-600' }
            };
            return iconMap[type] || iconMap['default'];
        }

        function getNotificationLink(referenceType, referenceId) {
            const linkMap = {
                'application': 'final-approvals.html',
                'escalation': 'escalated-cases.html',
                'compliance': 'compliance-monitoring.html',
                'payment': 'payment-management.html'
            };
            return linkMap[referenceType] || null;
        }

        function formatTimeAgo(dateString) {
            const now = new Date();
            const date = new Date(dateString);
            const seconds = Math.floor((now - date) / 1000);

            if (seconds < 60) return 'Just now';
            const minutes = Math.floor(seconds / 60);
            if (minutes < 60) return `${minutes} minute${minutes > 1 ? 's' : ''} ago`;
            const hours = Math.floor(minutes / 60);
            if (hours < 24) return `${hours} hour${hours > 1 ? 's' : ''} ago`;
            const days = Math.floor(hours / 24);
            if (days < 7) return `${days} day${days > 1 ? 's' : ''} ago`;
            return date.toLocaleDateString();
        }

        function escapeHTML(str) {
            if (!str) return '';
            return str.replace(/[&<>'"]/g, tag => ({
                '&': '&amp;', '<': '&lt;', '>': '&gt;', "'": '&#39;', '"': '&quot;'
            }[tag]));
        }

        function setFilter(filter) {
            currentFilter = filter;
            document.getElementById('filterAll').className = `px-4 py-1.5 rounded-full text-sm ${filter === 'all' ? 'bg-blue-600 text-white' : 'border hover:bg-gray-50'}`;
            document.getElementById('filterUnread').className = `px-4 py-1.5 rounded-full text-sm ${filter === 'unread' ? 'bg-blue-600 text-white' : 'border hover:bg-gray-50'}`;
            document.getElementById('filterRead').className = `px-4 py-1.5 rounded-full text-sm ${filter === 'read' ? 'bg-blue-600 text-white' : 'border hover:bg-gray-50'}`;
            loadNotifications();
        }

        async function markAllAsRead() {
            const { data: { user } } = await supabase.auth.getUser();
            if (!user) return;

            const { error } = await supabase
                .from('notifications')
                .update({ read: true, read_at: new Date().toISOString() })
                .eq('user_id', user.id)
                .eq('read', false);

            if (error) {
                console.error('Mark all as read error:', error.code, error.message, error.details, error.hint);
                return;
            }

            await loadNotifications();
        }

        async function markAsRead(notificationId) {
            const { error } = await supabase
                .from('notifications')
                .update({ read: true, read_at: new Date().toISOString() })
                .eq('id', notificationId);

            if (error) {
                console.error('Mark as read error:', error.code, error.message, error.details, error.hint);
                return;
            }

            await loadNotifications();
        }

        async function deleteNotification(notificationId) {
            const { error } = await supabase
                .from('notifications')
                .delete()
                .eq('id', notificationId);

            if (error) {
                console.error('Delete notification error:', error.code, error.message, error.details, error.hint);
                return;
            }

            await loadNotifications();
        }

        async function updateBadge() {
            const { data: { user } } = await supabase.auth.getUser();
            if (!user) return;

            const { data, error } = await supabase
                .from('notifications')
                .select('id', { count: 'exact' })
                .eq('user_id', user.id)
                .eq('read', false);

            if (error) {
                console.error('Update badge error:', error.code, error.message, error.details, error.hint);
                return;
            }

            const badge = document.getElementById('notificationBadge');
            if (badge) {
                badge.textContent = data?.length || 0;
                badge.style.display = data?.length > 0 ? 'inline-block' : 'none';
            }
        }

        function setupRealtime() {
            notificationChannel = supabase
                .channel('notifications_changes')
                .on(
                    'postgres_changes',
                    {
                        event: '*',
                        schema: 'public',
                        table: 'notifications'
                    },
                    (payload) => {
                        console.log('Notification change:', payload);
                        loadNotifications();
                    }
                )
                .subscribe();
        }

        window.addEventListener('beforeunload', () => {
            if (notificationChannel) {
                supabase.removeChannel(notificationChannel);
            }
        });

        window.deleteNotification = deleteNotification;

        init();
    </script>
</body>
</html>
