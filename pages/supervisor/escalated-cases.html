<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>SSRA Customs · Escalated Cases</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2"></script>
    <link href="../assets/icons/remixicon.css" rel="stylesheet" />
    <style>
        .gradient-bg { background: linear-gradient(135deg, #1e3a5f 0%, #2a5f8f 100%); }
        .sidebar-link { transition: all 0.3s ease; cursor: pointer; display: flex; align-items: center; gap: 0.75rem; padding: 0.6rem 1rem; border-radius: 0.5rem; font-size: 0.9rem; color: #4b5563; }
        .sidebar-link:hover, .sidebar-link.active { background-color: #e8f0fe; color: #1e3a5f; }
        .sidebar-link i { font-size: 1.2rem; width: 1.5rem; text-align: center; }
        .status-badge { padding: 0.2rem 0.6rem; border-radius: 9999px; font-size: 0.65rem; font-weight: 600; }
        .status-pending { background: #fef3c7; color: #92400e; }
        .status-review { background: #dbeafe; color: #1e40af; }
        .status-approved { background: #d1fae5; color: #065f46; }
        .status-rejected { background: #fee2e2; color: #991b1b; }
        .profile-dropdown { position: absolute; right: 0; top: calc(100% + 0.5rem); background: white; border-radius: 0.75rem; box-shadow: 0 10px 25px rgba(0,0,0,0.1); border: 1px solid #e5e7eb; min-width: 200px; z-index: 50; overflow: hidden; opacity: 0; transform: translateY(-10px); pointer-events: none; transition: all 0.2s ease; }
        .profile-dropdown.open { opacity: 1; transform: translateY(0); pointer-events: auto; }
        .profile-dropdown a { display: flex; align-items: center; gap: 0.75rem; padding: 0.6rem 1rem; font-size: 0.85rem; color: #374151; transition: background 0.15s; cursor: pointer; text-decoration: none; }
        .profile-dropdown a:hover { background: #e8f0fe; color: #1e3a5f; }
        .profile-dropdown .divider { height: 1px; background: #e5e7eb; margin: 0.25rem 0; }
        .profile-dropdown .danger { color: #dc2626; }
        .profile-dropdown .danger:hover { background: #fef2f2; color: #dc2626; }
        .header-profile-btn { cursor: pointer; display: flex; align-items: center; gap: 0.5rem; padding: 0.3rem 0.75rem 0.3rem 0.5rem; border-radius: 9999px; background: rgba(255,255,255,0.2); transition: background 0.2s; border: 1px solid rgba(255,255,255,0.3); }
        .header-profile-btn:hover { background: rgba(255,255,255,0.3); }
        .header-profile-btn .avatar-sm { width: 2rem; height: 2rem; border-radius: 50%; background: white; display: flex; align-items: center; justify-content: center; color: #1e3a5f; }
        .escalated-card { border: 1px solid #e5e7eb; border-radius: 0.75rem; padding: 1rem; transition: all 0.2s ease; }
        .escalated-card:hover { border-color: #1e3a5f; background: #f8fafc; }
        .escalated-card.high { border-left: 4px solid #dc2626; }
        .escalated-card.medium { border-left: 4px solid #f59e0b; }
    </style>
</head>
<body>
    <div class="min-h-screen bg-gray-100">
        <div class="max-w-7xl mx-auto px-4 py-5">
            <div class="flex flex-col lg:flex-row gap-6">
                <aside class="lg:w-72 flex-shrink-0">
                    <div class="bg-white rounded-2xl shadow-sm border border-gray-200/70 p-5 sticky top-6">
                        <div class="text-center mb-5">
                            <div class="w-20 h-20 rounded-2xl flex items-center justify-center mx-auto mb-2 shadow-md gradient-bg">
                                <i class="ri-user-line text-white text-3xl"></i>
                            </div>
                            <h3 id="profileName" class="text-lg font-bold text-gray-800">Loading...</h3>
                            <p id="profileRole" class="text-gray-500 text-sm">Loading...</p>
                            <span class="inline-block mt-1 text-xs bg-green-100 text-green-700 px-2.5 py-0.5 rounded-full font-medium">● Active</span>
                        </div>
                        <nav class="space-y-1 mb-4">
                            <a href="dashboard-supervisor.html" class="sidebar-link"><i class="ri-dashboard-line"></i><span>Dashboard</span></a>
                            <a href="final-approvals.html" class="sidebar-link"><i class="ri-check-double-line"></i><span>Final Approvals</span></a>
                            <a href="compliance-monitoring.html" class="sidebar-link"><i class="ri-shield-line"></i><span>Compliance Monitoring</span></a>
                            <a href="escalated-cases.html" class="sidebar-link active"><i class="ri-alert-line"></i><span>Escalated Cases</span></a>
                            <a href="reports.html" class="sidebar-link"><i class="ri-file-chart-line"></i><span>Reports</span></a>
                            <a href="notifications.html" class="sidebar-link"><i class="ri-notification-3-line"></i><span>Notifications</span><span class="ml-auto bg-red-500 text-white text-[10px] px-2 py-0.5 rounded-full font-semibold">6</span></a>
                        </nav>
                        <button onclick="alert('👋 Signed out')" class="mt-4 w-full bg-red-50 text-red-600 py-2.5 rounded-xl text-sm font-semibold hover:bg-red-100 transition flex items-center justify-center gap-2">
                            <i class="ri-logout-box-line"></i> Sign Out
                        </button>
                    </div>
                </aside>

                <main class="flex-1 space-y-5">
                    <div class="gradient-bg rounded-2xl p-5 text-white shadow-lg flex items-center justify-between">
                        <div>
                            <h2 class="text-2xl font-bold tracking-tight">⚠️ Escalated Cases</h2>
                            <p class="opacity-90 text-sm">Review and resolve escalated cases</p>
                        </div>
                        <div class="relative">
                            <button onclick="document.getElementById('profileDropdown').classList.toggle('open')" class="header-profile-btn">
                                <span class="avatar-sm"><i class="ri-user-line"></i></span>
                                <span class="text-sm font-medium hidden sm:inline">Supervisor</span>
                                <i class="ri-arrow-down-s-line text-sm"></i>
                            </button>
                            <div class="profile-dropdown" id="profileDropdown">
                                <a href="#"><i class="ri-user-settings-line"></i> My Profile</a>
                                <a href="#"><i class="ri-edit-line"></i> Edit Profile</a>
                                <div class="divider"></div>
                                <a href="#" class="danger"><i class="ri-logout-box-line"></i> Sign Out</a>
                            </div>
                        </div>
                    </div>

                    <div class="bg-white rounded-xl border border-gray-200 p-4 shadow-sm" id="escalationSummary">
                        <div class="flex items-center justify-between">
                            <span class="text-sm text-gray-500">Loading escalated cases...</span>
                        </div>
                    </div>

                    <div class="space-y-3" id="escalatedList">
                        <div class="text-sm text-gray-500 text-center py-8">Loading escalated cases...</div>
                    </div>
                </main>
            </div>
        </div>
    </div>
    <script type="module">
        import supabase from '../../js/supabase.js';
        import { loadCurrentUserProfile } from '../../js/profile-loader.js';
        import { checkAuth, getUserProfile, signOut, getCurrentUser, verifyRoleAccess, redirectToDashboard } from '../../js/auth.js';
        import { getEscalatedCases, resolveEscalation } from '../../js/supervisor-service.js';


        const PAGE_KEY = 'escalated-cases';
        let currentRole = null;
        let currentUserId = null;
        let escalationChannel = null;

        document.addEventListener('click', function(e) {
            if (!e.target.closest('.header-profile-btn') && !e.target.closest('.profileDropdown')) {
                document.getElementById('profileDropdown').classList.remove('open');
            }
        });

        async function init() {
            console.log('=== LOADING ESCALATED CASES ===');

            const isAuthenticated = await checkAuth();

        // Load user profile
        await loadCurrentUserProfile();
            if (!isAuthenticated) {
                window.location.href = '../../auth/login.html';
                return;
            }

            const hasAccess = await verifyRoleAccess('supervisor');
            if (!hasAccess) {
                
                if (user) {
                    
                    if (profile && profile.role) {
                        const dashboardUrl = redirectToDashboard(profile.role);
                        window.location.href = dashboardUrl;
                        return;
                    }
                }
                window.location.href = '../../auth/login.html';
                return;
            }

            
            

            if (profile) {
                document.querySelector('h3').textContent = profile.full_name || 'Supervisor';
                document.querySelector('.text-gray-500.text-sm').textContent = profile.role || 'Supervisor';
                currentRole = profile.role || 'supervisor';
                currentUserId = profile.id;
            } else {
                currentRole = 'supervisor';
                currentUserId = user?.id;
            }

            await loadEscalatedCases();

            // Subscribe to Realtime updates for escalated cases
            escalationChannel = supabase
                .channel('escalated-cases')
                .on('postgres_changes', { event: '*', schema: 'public', table: 'applications' }, async (payload) => {
                    console.log('Realtime escalation update:', payload);
                    // Reload the list when changes occur
                    await loadEscalatedCases();
                })
                .subscribe();
        }

        // Cleanup on page unload
        window.addEventListener('beforeunload', () => {
            if (escalationChannel) {
                supabase.removeChannel(escalationChannel);
            }
        });

        async function loadEscalatedCases() {
            console.log('=== LOADING ESCALATED CASES ===');

            try {
                const result = await getEscalatedCases();
                
                if (!result.success) {
                    throw new Error(result.error);
                }

                const escalatedCases = result.data;

                if (!escalatedCases || escalatedCases.length === 0) {
                    document.getElementById('escalatedList').innerHTML = '<div class="text-sm text-gray-500 text-center py-8">No escalated cases</div>';
                    document.getElementById('escalationSummary').innerHTML = '<div class="flex items-center justify-between"><span class="text-sm text-gray-500">0 escalated cases</span></div>';
                    return;
                }

                // Update summary
                document.getElementById('escalationSummary').innerHTML = `
                    <div class="flex items-center justify-between">
                        <span class="text-sm text-gray-500">${escalatedCases.length} escalated case${escalatedCases.length !== 1 ? 's' : ''}</span>
                        <span class="text-xs text-red-600 font-semibold">Requires attention</span>
                    </div>
                `;

                // Render escalated cases
                document.getElementById('escalatedList').innerHTML = escalatedCases.map(app => {
                    const priorityClass = app.ai_validation_results?.risk_level === 'high' ? 'high' : 'medium';
                    const riskScore = app.ai_validation_results?.risk_score || 0;
                    
                    return `
                        <div class="escalated-card ${priorityClass} bg-white">
                            <div class="flex flex-wrap justify-between items-start gap-3">
                                <div class="flex-1">
                                    <div class="flex items-center gap-2 mb-1">
                                        <h4 class="font-bold text-blue-600">${app.application_number || 'N/A'}</h4>
                                        <span class="status-badge status-review">Escalated</span>
                                    </div>
                                    <p class="text-sm text-gray-600">${app.agent_profile?.full_name || 'Unknown Agent'}</p>
                                    <div class="flex items-center gap-4 mt-2 text-xs text-gray-500">
                                        <span>Risk Score: ${riskScore}/100</span>
                                        <span>Escalated: ${new Date(app.created_at).toLocaleDateString()}</span>
                                    </div>
                                </div>
                                <div class="flex gap-2">
                                    <button onclick="resolveEscalationAction('${app.id}', 'approve')" class="bg-green-600 text-white px-3 py-1.5 rounded-lg text-sm font-semibold hover:bg-green-700 transition">Approve</button>
                                    <button onclick="resolveEscalationAction('${app.id}', 'return')" class="bg-yellow-600 text-white px-3 py-1.5 rounded-lg text-sm font-semibold hover:bg-yellow-700 transition">Return</button>
                                    <button onclick="resolveEscalationAction('${app.id}', 'reject')" class="bg-red-600 text-white px-3 py-1.5 rounded-lg text-sm font-semibold hover:bg-red-700 transition">Reject</button>
                                </div>
                            </div>
                        </div>
                    `;
                }).join('');
            } catch (error) {
                console.error('Error loading escalated cases:', error);
                document.getElementById('escalatedList').innerHTML = '<div class="text-sm text-red-500 text-center py-8">Error loading escalated cases</div>';
            }
        }

        async function resolveEscalationAction(applicationId, action) {
            const notes = prompt(`Enter notes for ${action} action:`);
            if (notes === null) return; // User cancelled

            try {
                const result = await resolveEscalation(applicationId, action, notes);
                if (result.success) {
                    alert(`Escalation ${action}ed successfully`);
                    await loadEscalatedCases();
                } else {
                    alert(`Error: ${result.error}`);
                }
            } catch (error) {
                console.error('Error resolving escalation:', error);
                alert('Error resolving escalation');
            }
        }

        window.resolveEscalationAction = resolveEscalationAction;
        document.addEventListener('DOMContentLoaded', init);
    </script>
</body>
</html>
