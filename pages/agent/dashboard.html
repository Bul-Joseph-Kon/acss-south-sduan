<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>SSRA Customs · Agent License Dashboard</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2"></script>
    <link href="../assets/icons/remixicon.css" rel="stylesheet" />
    <style>
        .gradient-bg { background: linear-gradient(135deg, #1e3a5f 0%, #2a5f8f 100%); }
        .sidebar-link { transition: all 0.3s ease; cursor: pointer; display: flex; align-items: center; gap: 0.75rem; padding: 0.6rem 1rem; border-radius: 0.5rem; font-size: 0.9rem; color: #4b5563; }
        .sidebar-link:hover, .sidebar-link.active { background-color: #e8f0fe; color: #1e3a5f; }
        .sidebar-link i { font-size: 1.2rem; width: 1.5rem; text-align: center; }
        .stat-card { transition: all 0.3s ease; cursor: pointer; background: white; border-radius: 0.75rem; padding: 1rem; border: 1px solid #e5e7eb; }
        .stat-card:hover { transform: translateY(-3px); box-shadow: 0 8px 16px rgba(0,0,0,0.06); }
        .stat-number { font-size: 1.5rem; font-weight: 700; }
        .stat-label { font-size: 0.75rem; color: #6b7280; }
        .status-badge { padding: 0.2rem 0.6rem; border-radius: 9999px; font-size: 0.65rem; font-weight: 600; }
        .status-approved { background: #d1fae5; color: #065f46; }
        .status-pending { background: #fef3c7; color: #92400e; }
        .status-review { background: #dbeafe; color: #1e40af; }
        .status-rejected { background: #fee2e2; color: #991b1b; }
        .quick-action-btn { transition: all 0.2s ease; cursor: pointer; padding: 0.5rem 0.75rem; border-radius: 0.5rem; border: 1px solid #e5e7eb; background: white; font-size: 0.8rem; display: flex; align-items: center; gap: 0.5rem; }
        .quick-action-btn:hover { border-color: #1e3a5f; background: #e8f0fe; transform: translateY(-2px); }
        .profile-dropdown { position: absolute; right: 0; top: calc(100% + 0.5rem); background: white; border-radius: 0.75rem; box-shadow: 0 10px 25px rgba(0,0,0,0.1); border: 1px solid #e5e7eb; min-width: 200px; z-index: 50; overflow: hidden; opacity: 0; transform: translateY(-10px); pointer-events: none; transition: all 0.2s ease; }
        .profile-dropdown.open { opacity: 1; transform: translateY(0); pointer-events: auto; }
        .profile-dropdown a { display: flex; align-items: center; gap: 0.75rem; padding: 0.6rem 1rem; font-size: 0.85rem; color: #374151; transition: background 0.15s; cursor: pointer; text-decoration: none; }
        .profile-dropdown a:hover { background: #e8f0fe; color: #1e3a5f; }
        .profile-dropdown .divider { height: 1px; background: #e5e7eb; margin: 0.25rem 0; }
        .profile-dropdown .danger { color: #dc2626; }
        .profile-dropdown .danger:hover { background: #fef2f2; color: #dc2626; }
        .header-profile-btn { cursor: pointer; display: flex; align-items: center; gap: 0.5rem; padding: 0.3rem 0.75rem 0.3rem 0.5rem; border-radius: 9999px; background: rgba(255,255,255,0.2); transition: background 0.2s; border: 1px solid rgba(255,255,255,0.3); }
        .header-profile-btn:hover { background: rgba(255,255,255,0.3); }
        .header-profile-btn .avatar-sm { width: 2rem; height: 2rem; border-radius: 50%; background: white; display: flex; align-items: center; justify-content: center; color: #1e3a5f; }
    </style>
</head>
<body>
    <div class="min-h-screen bg-gray-100">
        <div class="max-w-7xl mx-auto px-4 py-5">
            <div class="flex flex-col lg:flex-row gap-6">
                <!-- Sidebar -->
                <aside class="lg:w-72 flex-shrink-0">
                    <div id="agent-sidebar"></div>
                </aside>

                <!-- Main Content -->
                <main class="flex-1 space-y-5">
                    <div class="gradient-bg rounded-2xl p-5 text-white shadow-lg flex items-center justify-between">
                        <div>
                            <h2 class="text-2xl font-bold tracking-tight">📋 Agent License Dashboard</h2>
                            <p class="opacity-90 text-sm">Manage your clearing agent licenses</p>
                        </div>
                        <div class="relative">
                            <button onclick="document.getElementById('profileDropdown').classList.toggle('open')" class="header-profile-btn">
                                <span class="avatar-sm"><i class="ri-user-line"></i></span>
                                <span class="text-sm font-medium hidden sm:inline">Agent</span>
                                <i class="ri-arrow-down-s-line text-sm"></i>
                            </button>
                            <div class="profile-dropdown" id="profileDropdown">
                                <a href="#"><i class="ri-user-settings-line"></i> My Profile</a>
                                <a href="#"><i class="ri-edit-line"></i> Edit Profile</a>
                                <div class="divider"></div>
                                <a href="#" id="dropdownSignOut" class="danger"><i class="ri-logout-box-line"></i> Sign Out</a>
                            </div>
                        </div>
                    </div>

                    <!-- Stats -->
                    <div class="grid grid-cols-2 md:grid-cols-4 gap-3">
                        <div class="stat-card"><div class="stat-number text-blue-600" id="statTotalLicenses">0</div><div class="stat-label">Total Licenses</div></div>
                        <div class="stat-card"><div class="stat-number text-green-600" id="statActiveLicenses">0</div><div class="stat-label">Active</div></div>
                        <div class="stat-card"><div class="stat-number text-yellow-600" id="statPendingLicenses">0</div><div class="stat-label">Pending</div></div>
                        <div class="stat-card"><div class="stat-number text-red-600" id="statExpiredLicenses">0</div><div class="stat-label">Expired</div></div>
                    </div>

                    <!-- Quick Actions -->
                    <div class="bg-white rounded-xl border border-gray-200 p-4 shadow-sm">
                        <h3 class="font-bold text-sm mb-3 flex items-center"><i class="ri-flashlight-line text-blue-500 mr-2"></i>Quick Actions</h3>
                        <div class="flex flex-wrap gap-2">
                            <a href="new-license.html" class="quick-action-btn"><i class="ri-add-line text-blue-500"></i> New License</a>
                            <a href="renewal.html" class="quick-action-btn"><i class="ri-loop-right-line text-blue-500"></i> Renew License</a>
                            <a href="upgrade.html" class="quick-action-btn"><i class="ri-arrow-up-line text-blue-500"></i> Upgrade</a>
                            <a href="verification.html" class="quick-action-btn"><i class="ri-verified-badge-line text-blue-500"></i> Verify License</a>
                        </div>
                    </div>

                    <!-- Recent Licenses -->
                    <div class="bg-white rounded-xl border border-gray-200 p-5 shadow-sm">
                        <h3 class="font-bold text-lg mb-4">Recent Licenses</h3>
                        <div class="space-y-3" id="licenseList">
                            <div class="text-center py-4 text-gray-500">Loading licenses...</div>
                        </div>
                    </div>
                </main>
            </div>
        </div>
    </div>
    <script>
        document.addEventListener('click', function(e) {
            if (!e.target.closest('.header-profile-btn') && !e.target.closest('.profile-dropdown')) {
                document.getElementById('profileDropdown').classList.remove('open');
            }
        });
    </script>

        <script type="module" src="../../js/agent-sidebar.js"></script>
<!-- Supabase & Shared Authentication Guards -->
    <script type="module">
        import supabase from '../../js/supabase.js';
        import { checkPageAuth } from '../../js/auth-check.js';
        import { signOut } from '../../js/auth.js';
        import { loadCurrentUserProfile } from '../../js/profile-loader.js';
        import { getUserProfile } from '../../js/auth.js';

        let isInitialized = false;
        async function initPage() {
            if (isInitialized) return;
            isInitialized = true;
            console.log('=== INITIALIZING AUTH GUARD ON MOCK PAGE ===');
            const role = 'agent';
            
            // 1. Run auth check
            const hasAccess = await checkPageAuth(role);
            if (!hasAccess) {
                console.log('Access denied, redirecting...');
                return;
            }

            // 2. Load profile data from Supabase
            const { user, profile } = await loadCurrentUserProfile();
            
            // 3. Update sidebar and profile UI
            if (profile) {
                const displayName = profile.full_name || user?.email || 'User';
                const displayRole = role === 'agent' ? 'Clearing Agent' : 'Trader';
                
                const nameEl = document.getElementById(role + 'ProfileName') || document.querySelector('[data-user-name]');
                if (nameEl) nameEl.textContent = displayName;
                
                const roleEl = document.getElementById(role + 'ProfileRole') || document.querySelector('[data-user-role]');
                if (roleEl) roleEl.textContent = displayRole;
                
                const statusEl = document.getElementById(role + 'ProfileStatus');
                if (statusEl) statusEl.textContent = '● ' + (profile.status || 'Active');
                
                const tinEl = document.getElementById(role + 'ProfileTIN');
                if (tinEl && profile.organization) {
                    tinEl.textContent = 'Org: ' + profile.organization;
                }
            }

            // 4. Load live license data
            await loadLicenseData(profile?.id);

            // 5. Setup realtime subscriptions
            setupRealtimeSubscriptions(profile?.id);

            // 6. Bind Logout Button Listeners
            const handleLogout = async (e) => {
                e.preventDefault();
                console.log('Signing out...');
                const result = await signOut();
                if (result.success) {
                    window.location.href = '../../auth/login.html';
                }
            };

            const signOutBtn = document.getElementById('signOutBtn');
            if (signOutBtn) signOutBtn.addEventListener('click', handleLogout);

            const dropdownSignOut = document.getElementById('dropdownSignOut');
            if (dropdownSignOut) dropdownSignOut.addEventListener('click', handleLogout);
        }

        async function loadLicenseData(profileId) {
            try {
                // Fetch agent license applications from Supabase
                const { data: licenses, error } = await supabase
                    .from('applications')
                    .select('*, profiles!applications_user_id_fkey(full_name, organization)')
                    .eq('user_id', profileId)
                    .eq('application_type', 'agent_license')
                    .order('created_at', { ascending: false })
                    .limit(50);

                if (error) throw error;

                // Calculate statistics
                const totalLicenses = licenses?.length || 0;
                const activeLicenses = licenses?.filter(l => l.status === 'approved' || l.status === 'completed').length || 0;
                const pendingLicenses = licenses?.filter(l => l.status === 'submitted' || l.status === 'pending_review').length || 0;
                const expiredLicenses = licenses?.filter(l => l.status === 'rejected' || l.status === 'returned').length || 0;

                document.getElementById('statTotalLicenses').textContent = totalLicenses;
                document.getElementById('statActiveLicenses').textContent = activeLicenses;
                document.getElementById('statPendingLicenses').textContent = pendingLicenses;
                document.getElementById('statExpiredLicenses').textContent = expiredLicenses;

                // Render license list
                const licenseList = document.getElementById('licenseList');
                if (!licenses || licenses.length === 0) {
                    licenseList.innerHTML = '<div class="text-center py-4 text-gray-500">No licenses found</div>';
                    return;
                }

                licenseList.innerHTML = licenses.map(license => {
                    const statusBadge = getLicenseStatusBadge(license.status);
                    const licenseNumber = license.application_number || 'N/A';
                    const clientName = license.profiles?.full_name || license.profiles?.organization || 'Unknown';
                    const licenseType = getLicenseType(license.license_type);
                    const actionLink = getLicenseActionLink(license);

                    return `
                        <div class="flex justify-between items-center border-b pb-3">
                            <div>
                                <span class="font-medium">${licenseNumber}</span>
                                <p class="text-sm text-gray-500">${clientName} · ${licenseType}</p>
                            </div>
                            <span class="status-badge ${statusBadge}">${formatLicenseStatus(license.status)}</span>
                            <a href="${actionLink}" class="text-blue-600 text-sm hover:underline">${getLicenseActionText(license.status)}</a>
                        </div>
                    `;
                }).join('');
            } catch (error) {
                console.error('Error loading license data:', error);
                document.getElementById('licenseList').innerHTML = '<div class="text-center py-4 text-red-500">Error loading licenses</div>';
            }
        }

        function getLicenseStatusBadge(status) {
            const badges = {
                draft: 'status-draft',
                submitted: 'status-pending',
                pending_review: 'status-pending',
                under_inspection: 'status-review',
                approved: 'status-approved',
                completed: 'status-approved',
                rejected: 'status-rejected',
                returned: 'status-rejected'
            };
            return badges[status] || 'status-pending';
        }

        function formatLicenseStatus(status) {
            const labels = {
                draft: 'Draft',
                submitted: 'Submitted',
                pending_review: 'Pending',
                under_inspection: 'Under Review',
                approved: '✓ Active',
                completed: '✓ Active',
                rejected: 'Rejected',
                returned: 'Returned'
            };
            return labels[status] || status;
        }

        function getLicenseType(type) {
            const types = {
                new: 'New License',
                renewal: 'License Renewal',
                upgrade: 'License Upgrade',
                transfer: 'License Transfer'
            };
            return types[type] || 'License Application';
        }

        function getLicenseActionLink(license) {
            if (license.status === 'approved' || license.status === 'completed') {
                return 'download-license.html?id=' + license.id;
            }
            return 'verification.html?id=' + license.id;
        }

        function getLicenseActionText(status) {
            if (status === 'approved' || status === 'completed') {
                return 'Download';
            }
            return 'Verify';
        }

        function setupRealtimeSubscriptions(profileId) {
            // Subscribe to applications table changes
            const appChannel = supabase
                .channel('agent-license-dashboard-apps')
                .on('postgres_changes', { event: '*', schema: 'public', table: 'applications' }, async () => {
                    console.log('Applications changed, reloading license data...');
                    const { data: { user } } = await supabase.auth.getUser();
                    const profile = user ? await getUserProfile(user.id) : null;
                    await loadLicenseData(profile?.id);
                })
                .subscribe();

            // Cleanup on page unload
            window.addEventListener('beforeunload', () => {
                supabase.removeChannel(appChannel);
            });
        }

        document.addEventListener('DOMContentLoaded', initPage);
        if (document.readyState === 'interactive' || document.readyState === 'complete') {
            initPage();
        }
    </script>
</body></html>
