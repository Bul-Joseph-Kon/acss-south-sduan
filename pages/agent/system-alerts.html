<!DOCTYPE html>
<html lang="en">

<head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>SSRA Customs · Agent System Alerts</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2"></script>
    <link href="../assets/icons/remixicon.css" rel="stylesheet" />
    
    <script type="module" src="../../js/agent-sidebar.js"></script>
    <style>
        .gradient-bg {
            background: linear-gradient(135deg, #1e3a5f 0%, #2a5f8f 100%);
        }

        .sidebar-link {
            transition: all 0.3s ease;
            cursor: pointer;
            display: flex;
            align-items: center;
            gap: 0.75rem;
            padding: 0.6rem 1rem;
            border-radius: 0.5rem;
            font-size: 0.9rem;
            color: #4b5563;
        }

        .sidebar-link:hover,
        .sidebar-link.active {
            background-color: #e8f0fe;
            color: #1e3a5f;
        }

        .sidebar-link i {
            font-size: 1.2rem;
            width: 1.5rem;
            text-align: center;
        }

        .notification-item {
            padding: 1rem;
            border-radius: 0.75rem;
            border: 1px solid #e5e7eb;
            background: white;
            transition: all 0.2s ease;
        }

        .notification-item:hover {
            background: #f9fafb;
        }

        .notification-item.unread {
            background: #fef3c7;
            border-color: #f59e0b;
        }

        .notification-item .notif-time {
            font-size: 0.75rem;
            color: #6b7280;
        }

        .profile-dropdown {
            position: absolute;
            right: 0;
            top: calc(100% + 0.5rem);
            background: white;
            border-radius: 0.75rem;
            box-shadow: 0 10px 25px rgba(0, 0, 0, 0.1);
            border: 1px solid #e5e7eb;
            min-width: 200px;
            z-index: 50;
            overflow: hidden;
            opacity: 0;
            transform: translateY(-10px);
            pointer-events: none;
            transition: all 0.2s ease;
        }

        .profile-dropdown.open {
            opacity: 1;
            transform: translateY(0);
            pointer-events: auto;
        }

        .profile-dropdown a {
            display: flex;
            align-items: center;
            gap: 0.75rem;
            padding: 0.6rem 1rem;
            font-size: 0.85rem;
            color: #374151;
            transition: background 0.15s;
            cursor: pointer;
            text-decoration: none;
        }

        .profile-dropdown a:hover {
            background: #e8f0fe;
            color: #1e3a5f;
        }

        .profile-dropdown .divider {
            height: 1px;
            background: #e5e7eb;
            margin: 0.25rem 0;
        }

        .profile-dropdown .danger {
            color: #dc2626;
        }

        .profile-dropdown .danger:hover {
            background: #fef2f2;
            color: #dc2626;
        }

        .header-profile-btn {
            cursor: pointer;
            display: flex;
            align-items: center;
            gap: 0.5rem;
            padding: 0.3rem 0.75rem 0.3rem 0.5rem;
            border-radius: 9999px;
            background: rgba(255, 255, 255, 0.2);
            transition: background 0.2s;
            border: 1px solid rgba(255, 255, 255, 0.3);
        }

        .header-profile-btn:hover {
            background: rgba(255, 255, 255, 0.3);
        }

        .header-profile-btn .avatar-sm {
            width: 2rem;
            height: 2rem;
            border-radius: 50%;
            background: white;
            display: flex;
            align-items: center;
            justify-content: center;
            color: #1e3a5f;
        }
    </style>
</head>

<body>
    <div class="min-h-screen bg-gray-100">
        <div class="max-w-7xl mx-auto px-4 py-5">
            <div class="flex flex-col lg:flex-row gap-6">
                <!-- Sidebar -->
                <aside class="lg:w-72 flex-shrink-0">
                    <div id="agent-sidebar"></div>
                </aside>

                <!-- Main Content -->
                <main class="flex-1 space-y-5">
                    <div class="gradient-bg rounded-2xl p-5 text-white shadow-lg flex items-center justify-between">
                        <div>
                            <h2 class="text-2xl font-bold tracking-tight">🖥️ System Alerts</h2>
                            <p class="opacity-90 text-sm">System announcements, updates, and custom alerts</p>
                        </div>
                        <div class="relative">
                            <button onclick="document.getElementById('profileDropdown').classList.toggle('open')"
                                class="header-profile-btn">
                                <span class="avatar-sm"><i class="ri-user-line"></i></span>
                                <span class="text-sm font-medium hidden sm:inline">Agent</span>
                                <i class="ri-arrow-down-s-line text-sm"></i>
                            </button>
                            <div class="profile-dropdown" id="profileDropdown">
                                <a href="#"><i class="ri-user-settings-line"></i> My Profile</a>
                                <a href="#"><i class="ri-edit-line"></i> Edit Profile</a>
                                <div class="divider"></div>
                                <a href="#" id="dropdownSignOut" class="danger"><i class="ri-logout-box-line"></i> Sign
                                    Out</a>
                            </div>
                        </div>
                    </div>

                    <div
                        class="bg-white rounded-xl border border-gray-200 p-4 shadow-sm flex flex-wrap gap-3 items-center justify-between">
                        <div class="flex flex-wrap gap-2" id="filterGroup">
                            <button class="px-4 py-1.5 rounded-full text-sm bg-blue-600 text-white"
                                onclick="filterAlerts('all')">All</button>
                            <button class="px-4 py-1.5 rounded-full text-sm border hover:bg-gray-50"
                                onclick="filterAlerts('unread')">Unread</button>
                            <button class="px-4 py-1.5 rounded-full text-sm border hover:bg-gray-50"
                                onclick="filterAlerts('read')">Read</button>
                        </div>
                        <button onclick="markAllAsRead()" class="text-sm text-blue-600 hover:underline">Mark all as
                            read</button>
                    </div>

                    <!-- Alerts List -->
                    <div class="space-y-3" id="alertsList">
                        <div class="text-center py-8 text-gray-500">Loading system alerts...</div>
                    </div>

                    <div class="bg-yellow-50 rounded-xl border border-yellow-200 p-5">
                        <h3 class="font-bold text-yellow-800 mb-2"><i class="ri-information-line mr-2"></i>System Status
                        </h3>
                        <div class="grid md:grid-cols-3 gap-3 text-sm">
                            <div class="flex items-center gap-2"><span
                                    class="w-2 h-2 rounded-full bg-green-500"></span><span
                                    class="text-green-700 font-semibold">All Systems Operational</span></div>
                        </div>
                    </div>
                </main>
            </div>
        </div>
    </div>
    <script>
        document.addEventListener('click', function (e) {
            if (!e.target.closest('.header-profile-btn') && !e.target.closest('.profile-dropdown')) {
                document.getElementById('profileDropdown').classList.remove('open');
            }
        });
    </script>
    <script type="module">
        import supabase from '../../js/supabase.js';
        import { checkPageAuth } from '../../js/auth-check.js';
        import { signOut } from '../../js/auth.js';
        import { loadCurrentUserProfile } from '../../js/profile-loader.js';

        let currentUserId = null;
        let realtimeChannel = null;
        let cachedAlerts = [];
        let activeFilter = 'all';

        async function initPage() {
            const role = 'agent';
            const hasAccess = await checkPageAuth(role);
            if (!hasAccess) return;

            const { user, profile } = await loadCurrentUserProfile();
            if (profile) {
                currentUserId = profile.user_id; // Match user_id references in notifications table
            }

            await loadAlerts();
            setupRealtimeSubscriptions();

            window.filterAlerts = (filter) => {
                activeFilter = filter;
                const buttons = document.querySelectorAll('#filterGroup button');
                buttons.forEach(btn => {
                    btn.classList.remove('bg-blue-600', 'text-white');
                    btn.classList.add('border', 'hover:bg-gray-50');
                });
                const clickedBtn = event.target;
                clickedBtn.classList.remove('border', 'hover:bg-gray-50');
                clickedBtn.classList.add('bg-blue-600', 'text-white');
                renderAlerts();
            };

            window.markAsRead = async (id) => {
                try {
                    const { error } = await supabase
                        .from('notifications')
                        .update({ read: true, read_at: new Date().toISOString() })
                        .eq('id', id);
                    if (error) throw error;
                    await loadAlerts();
                } catch (err) {
                    console.error('Error marking as read:', err);
                }
            };

            window.deleteAlert = async (id) => {
                try {
                    const { error } = await supabase
                        .from('notifications')
                        .delete()
                        .eq('id', id);
                    if (error) throw error;
                    await loadAlerts();
                } catch (err) {
                    console.error('Error deleting alert:', err);
                }
            };

            window.markAllAsRead = async () => {
                try {
                    const { error } = await supabase
                        .from('notifications')
                        .update({ read: true, read_at: new Date().toISOString() })
                        .eq('user_id', currentUserId)
                        .eq('read', false);
                    if (error) throw error;
                    await loadAlerts();
                    alert('All alerts marked as read');
                } catch (err) {
                    console.error('Error marking all as read:', err);
                }
            };

            document.getElementById('dropdownSignOut')?.addEventListener('click', async (e) => {
                e.preventDefault();
                const result = await signOut();
                if (result.success) {
                    window.location.href = '../../auth/login.html';
                }
            });
        }

        async function loadAlerts() {
            try {
                const { data: notifications, error } = await supabase
                    .from('notifications')
                    .select('*')
                    .eq('user_id', currentUserId)
                    .order('created_at', { ascending: false });

                if (error) throw error;

                cachedAlerts = notifications || [];
                renderAlerts();
            } catch (error) {
                console.error('Error loading notifications:', error);
                document.getElementById('alertsList').innerHTML = '<div class="text-center py-8 text-red-500 bg-white rounded-xl border border-gray-200">Error loading system alerts</div>';
            }
        }

        function renderAlerts() {
            let filtered = cachedAlerts;
            if (activeFilter === 'unread') {
                filtered = cachedAlerts.filter(a => !a.read);
            } else if (activeFilter === 'read') {
                filtered = cachedAlerts.filter(a => a.read);
            }

            const listContainer = document.getElementById('alertsList');
            if (filtered.length === 0) {
                listContainer.innerHTML = '<div class="text-center py-8 text-gray-500 bg-white rounded-xl border border-gray-200">No alerts found</div>';
                return;
            }

            listContainer.innerHTML = filtered.map(alert => {
                const createdDate = alert.created_at ? new Date(alert.created_at).toLocaleString() : 'N/A';
                const severityClass = alert.type === 'error' ? 'bg-red-100 text-red-600' : (alert.type === 'warning' ? 'bg-yellow-100 text-yellow-600' : 'bg-blue-100 text-blue-600');
                const unreadClass = alert.read ? '' : 'unread';

                return `
                    <div class="notification-item ${unreadClass}">
                        <div class="flex items-start gap-3">
                            <div class="w-10 h-10 rounded-full ${severityClass} flex items-center justify-center flex-shrink-0">
                                <i class="ri-notification-line text-xl"></i>
                            </div>
                            <div class="flex-1">
                                <div class="flex justify-between items-start">
                                    <h4 class="font-semibold text-sm">${alert.title || 'Notification'}</h4>
                                    <div class="flex gap-2">
                                        ${!alert.read ? `<button onclick="markAsRead('${alert.id}')" class="text-xs text-blue-600 hover:underline">Mark read</button>` : ''}
                                        <button onclick="deleteAlert('${alert.id}')" class="text-xs text-red-600 hover:underline">Delete</button>
                                    </div>
                                </div>
                                <p class="text-sm text-gray-600 mt-1">${alert.message}</p>
                                <span class="notif-time mt-2 block"><i class="ri-time-line mr-1"></i>${createdDate}</span>
                            </div>
                        </div>
                    </div>
                `;
            }).join('');
        }

        function setupRealtimeSubscriptions() {
            realtimeChannel = supabase
                .channel('agent-system-alerts')
                .on('postgres_changes', { event: '*', schema: 'public', table: 'notifications' }, async () => {
                    await loadAlerts();
                })
                .subscribe();

            window.addEventListener('beforeunload', () => {
                if (realtimeChannel) {
                    supabase.removeChannel(realtimeChannel);
                }
            });
        }

        document.addEventListener('DOMContentLoaded', initPage);
    </script>
</body>

</html>
