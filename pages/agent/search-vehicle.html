<!DOCTYPE html>
<html lang="en">

<head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>SSRA Customs · Agent Vehicle Query</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <link href="../assets/icons/remixicon.css" rel="stylesheet" />
    
    <script type="module" src="../../js/agent-sidebar.js"></script>
    <style>
        .gradient-bg {
            background: linear-gradient(135deg, #1e3a5f 0%, #2a5f8f 100%);
        }

        .sidebar-link {
            transition: all 0.3s ease;
            cursor: pointer;
            display: flex;
            align-items: center;
            gap: 0.75rem;
            padding: 0.6rem 1rem;
            border-radius: 0.5rem;
            font-size: 0.9rem;
            color: #4b5563;
        }

        .sidebar-link:hover,
        .sidebar-link.active {
            background-color: #e8f0fe;
            color: #1e3a5f;
        }

        .sidebar-link i {
            font-size: 1.2rem;
            width: 1.5rem;
            text-align: center;
        }

        .form-group {
            margin-bottom: 1rem;
        }

        .form-group label {
            display: block;
            font-size: 0.8rem;
            font-weight: 500;
            color: #374151;
            margin-bottom: 0.2rem;
        }

        .form-group .form-input {
            width: 100%;
            padding: 0.4rem 0.6rem;
            border-radius: 0.4rem;
            border: 1px solid #d1d5db;
            font-size: 0.85rem;
            transition: border-color 0.2s;
        }

        .form-group .form-input:focus {
            outline: none;
            border-color: #1e3a5f;
            box-shadow: 0 0 0 3px rgba(30, 58, 95, 0.1);
        }

        .profile-dropdown {
            position: absolute;
            right: 0;
            top: calc(100% + 0.5rem);
            background: white;
            border-radius: 0.75rem;
            box-shadow: 0 10px 25px rgba(0, 0, 0, 0.1);
            border: 1px solid #e5e7eb;
            min-width: 200px;
            z-index: 50;
            overflow: hidden;
            opacity: 0;
            transform: translateY(-10px);
            pointer-events: none;
            transition: all 0.2s ease;
        }

        .profile-dropdown.open {
            opacity: 1;
            transform: translateY(0);
            pointer-events: auto;
        }

        .profile-dropdown a {
            display: flex;
            align-items: center;
            gap: 0.75rem;
            padding: 0.6rem 1rem;
            font-size: 0.85rem;
            color: #374151;
            transition: background 0.15s;
            cursor: pointer;
            text-decoration: none;
        }

        .profile-dropdown a:hover {
            background: #e8f0fe;
            color: #1e3a5f;
        }

        .profile-dropdown .divider {
            height: 1px;
            background: #e5e7eb;
            margin: 0.25rem 0;
        }

        .profile-dropdown .danger {
            color: #dc2626;
        }

        .profile-dropdown .danger:hover {
            background: #fef2f2;
            color: #dc2626;
        }

        .header-profile-btn {
            cursor: pointer;
            display: flex;
            align-items: center;
            gap: 0.5rem;
            padding: 0.3rem 0.75rem 0.3rem 0.5rem;
            border-radius: 9999px;
            background: rgba(255, 255, 255, 0.2);
            transition: background 0.2s;
            border: 1px solid rgba(255, 255, 255, 0.3);
        }

        .header-profile-btn:hover {
            background: rgba(255, 255, 255, 0.3);
        }

        .header-profile-btn .avatar-sm {
            width: 2rem;
            height: 2rem;
            border-radius: 50%;
            background: white;
            display: flex;
            align-items: center;
            justify-content: center;
            color: #1e3a5f;
        }

        .search-tip {
            background: #e8f0fe;
            border: 1px solid #93c5fd;
            border-radius: 0.5rem;
            padding: 0.75rem 1rem;
        }
    </style>
</head>

<body>
    <div class="min-h-screen bg-gray-100">
        <div class="max-w-7xl mx-auto px-4 py-5">
            <div class="flex flex-col lg:flex-row gap-6">
                <!-- Sidebar -->
                <aside class="lg:w-72 flex-shrink-0">
                    <div id="agent-sidebar"></div>
                </aside>

                <!-- Main Content -->
                <main class="flex-1 space-y-5">
                    <div class="gradient-bg rounded-2xl p-5 text-white shadow-lg flex items-center justify-between">
                        <div>
                            <h2 class="text-2xl font-bold tracking-tight">🚗 Vehicle Registration Query</h2>
                            <p class="opacity-90 text-sm">Search for vehicle registration and customs information</p>
                        </div>
                        <div class="relative">
                            <button onclick="document.getElementById('profileDropdown').classList.toggle('open')"
                                class="header-profile-btn">
                                <span class="avatar-sm"><i class="ri-user-line"></i></span>
                                <span class="text-sm font-medium hidden sm:inline">Agent</span>
                                <i class="ri-arrow-down-s-line text-sm"></i>
                            </button>
                            <div class="profile-dropdown" id="profileDropdown">
                                <a href="#"><i class="ri-user-settings-line"></i> My Profile</a>
                                <a href="#"><i class="ri-edit-line"></i> Edit Profile</a>
                                <div class="divider"></div>
                                <a href="#" id="dropdownSignOut" class="danger"><i class="ri-logout-box-line"></i> Sign
                                    Out</a>
                            </div>
                        </div>
                    </div>

                    <!-- Search Input Form -->
                    <div class="bg-white rounded-xl border border-gray-200 p-5 shadow-sm">
                        <h3 class="font-bold text-lg mb-4">Query Vehicle</h3>
                        <div class="grid md:grid-cols-2 gap-4">
                            <div class="form-group">
                                <label>Vehicle Plate Number <span class="text-red-500">*</span></label>
                                <input type="text" id="vehicleNumber" class="form-input" placeholder="e.g. SSD 777X" />
                            </div>
                            <div class="form-group">
                                <label>Owner Name <span class="text-red-500">*</span></label>
                                <input type="text" id="ownerName" class="form-input" placeholder="e.g. Deng Emmanuel" />
                            </div>
                            <div class="form-group">
                                <label>Registration Status <span class="text-red-500">*</span></label>
                                <select id="regStatus" class="form-input">
                                    <option value="Registered">Registered</option>
                                    <option value="Pending Registration">Pending Registration</option>
                                    <option value="Temporary Permit">Temporary Permit</option>
                                </select>
                            </div>
                            <div class="form-group">
                                <label>Customs Duty Status <span class="text-red-500">*</span></label>
                                <select id="customsStatus" class="form-input">
                                    <option value="Paid">Cleared / Paid</option>
                                    <option value="Exempt">Duty Exempt</option>
                                    <option value="Unpaid">Unpaid / Processing</option>
                                </select>
                            </div>
                        </div>

                        <div class="search-tip mt-4 mb-4">
                            <p class="text-sm text-blue-800"><i class="ri-information-line mr-2"></i>Performing a query
                                registers it to the database for validation and auditing purposes.</p>
                        </div>

                        <button id="submitQueryBtn"
                            class="bg-blue-600 hover:bg-blue-700 text-white px-6 py-2.5 rounded-lg text-sm font-semibold transition flex items-center gap-2">
                            <i class="ri-search-line"></i> Submit Vehicle Query
                        </button>
                    </div>

                    <!-- Vehicle Query List -->
                    <div class="bg-white rounded-xl border border-gray-200 p-5 shadow-sm">
                        <h3 class="font-bold text-sm mb-3 flex items-center"><i
                                class="ri-time-line text-blue-500 mr-2"></i>Recent Vehicle Queries</h3>
                        <div class="space-y-3" id="vehicleQueryList">
                            <div class="text-center py-4 text-gray-500">Loading queries...</div>
                        </div>
                    </div>
                </main>
            </div>
        </div>
    </div>
    <script>
        document.addEventListener('click', function (e) {
            if (!e.target.closest('.header-profile-btn') && !e.target.closest('.profile-dropdown')) {
                document.getElementById('profileDropdown').classList.remove('open');
            }
        });
    </script>
    <script type="module">
        import supabase from '../../js/supabase.js';
        import { checkPageAuth } from '../../js/auth-check.js';
        import { signOut } from '../../js/auth.js';
        import { loadCurrentUserProfile } from '../../js/profile-loader.js';

        let currentAgentId = null;
        let realtimeChannel = null;

        async function initPage() {
            const role = 'agent';
            const hasAccess = await checkPageAuth(role);
            if (!hasAccess) return;

            const { user, profile } = await loadCurrentUserProfile();
            if (profile) {
                currentAgentId = profile.id;
            }

            await loadVehicleQueries();
            setupRealtimeSubscriptions();

            document.getElementById('submitQueryBtn').addEventListener('click', submitVehicleQuery);

            document.getElementById('dropdownSignOut')?.addEventListener('click', async (e) => {
                e.preventDefault();
                const result = await signOut();
                if (result.success) {
                    window.location.href = '../../auth/login.html';
                }
            });
        }

        async function submitVehicleQuery() {
            const regNo = document.getElementById('vehicleNumber').value.trim();
            const owner = document.getElementById('ownerName').value.trim();
            const regStatus = document.getElementById('regStatus').value;
            const customsStatus = document.getElementById('customsStatus').value;

            if (!regNo || !owner) {
                alert('Please enter vehicle registration plate and owner name.');
                return;
            }

            try {
                // Generate a unique application number
                const sequenceNum = Math.floor(100000 + Math.random() * 900000);
                const appNumber = `CVET-${sequenceNum}`;

                const { data, error } = await supabase
                    .from('applications')
                    .insert([{
                        application_number: appNumber,
                        agent_id: currentAgentId,
                        application_type: 'vehicle_query',
                        status: 'submitted',
                        vehicle_data: {
                            registration_number: regNo,
                            owner_name: owner,
                            registration_status: regStatus,
                            customs_status: customsStatus
                        }
                    }]);

                if (error) throw error;

                // Clear input
                document.getElementById('vehicleNumber').value = '';
                document.getElementById('ownerName').value = '';
                await loadVehicleQueries();
            } catch (error) {
                console.error('Error submitting vehicle query:', error);
                alert(`Error submitting vehicle query: ${error.message}`);
            }
        }

        async function loadVehicleQueries() {
            try {
                const { data: applications, error } = await supabase
                    .from('applications')
                    .select('*')
                    .eq('agent_id', currentAgentId)
                    .eq('application_type', 'vehicle_query')
                    .order('created_at', { ascending: false });

                if (error) throw error;

                const listContainer = document.getElementById('vehicleQueryList');
                if (!applications || applications.length === 0) {
                    listContainer.innerHTML = '<div class="text-center py-4 text-gray-500">No vehicle query records found</div>';
                    return;
                }

                listContainer.innerHTML = applications.map(app => {
                    const veh = app.vehicle_data || {};
                    const lastUpdated = app.updated_at ? new Date(app.updated_at).toLocaleString() : 'N/A';
                    return `
                        <div class="flex justify-between items-center border-b pb-2 text-sm">
                            <div>
                                <span class="font-medium text-blue-600">${veh.registration_number || 'Unknown Vehicle'}</span>
                                <p class="text-xs text-gray-500">Owner: ${veh.owner_name || 'N/A'} · Reg: ${veh.registration_status || 'N/A'}</p>
                            </div>
                            <div class="text-right">
                                <span class="px-2 py-0.5 rounded text-[11px] font-semibold ${veh.customs_status === 'Paid' ? 'bg-green-100 text-green-800' : (veh.customs_status === 'Exempt' ? 'bg-blue-100 text-blue-800' : 'bg-yellow-100 text-yellow-800')}">${veh.customs_status || 'Unknown'}</span>
                                <p class="text-[10px] text-gray-400 mt-1">Updated: ${lastUpdated}</p>
                            </div>
                        </div>
                    `;
                }).join('');
            } catch (error) {
                console.error('Error loading vehicle queries:', error);
                document.getElementById('vehicleQueryList').innerHTML = '<div class="text-center py-4 text-red-500">Error loading vehicle queries</div>';
            }
        }

        function setupRealtimeSubscriptions() {
            realtimeChannel = supabase
                .channel('agent-vehicle-queries')
                .on('postgres_changes', { event: '*', schema: 'public', table: 'applications' }, async () => {
                    await loadVehicleQueries();
                })
                .subscribe();

            window.addEventListener('beforeunload', () => {
                if (realtimeChannel) {
                    supabase.removeChannel(realtimeChannel);
                }
            });
        }

        document.addEventListener('DOMContentLoaded', initPage);
    </script>
</body>

</html>
