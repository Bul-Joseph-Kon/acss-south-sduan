<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>SSRA Customs · Agent Shipment Info</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <link href="../assets/icons/remixicon.css" rel="stylesheet" />
    <style>
        .gradient-bg { background: linear-gradient(135deg, #1e3a5f 0%, #2a5f8f 100%); }
        .sidebar-link { transition: all 0.3s ease; cursor: pointer; display: flex; align-items: center; gap: 0.75rem; padding: 0.6rem 1rem; border-radius: 0.5rem; font-size: 0.9rem; color: #4b5563; }
        .sidebar-link:hover, .sidebar-link.active { background-color: #e8f0fe; color: #1e3a5f; }
        .sidebar-link i { font-size: 1.2rem; width: 1.5rem; text-align: center; }
        .form-group { margin-bottom: 1rem; }
        .form-group label { display: block; font-size: 0.8rem; font-weight: 500; color: #374151; margin-bottom: 0.2rem; }
        .form-group .form-input { width: 100%; padding: 0.4rem 0.6rem; border-radius: 0.4rem; border: 1px solid #d1d5db; font-size: 0.85rem; transition: border-color 0.2s; }
        .form-group .form-input:focus { outline: none; border-color: #1e3a5f; box-shadow: 0 0 0 3px rgba(30,58,95,0.1); }
        .profile-dropdown { position: absolute; right: 0; top: calc(100% + 0.5rem); background: white; border-radius: 0.75rem; box-shadow: 0 10px 25px rgba(0,0,0,0.1); border: 1px solid #e5e7eb; min-width: 200px; z-index: 50; overflow: hidden; opacity: 0; transform: translateY(-10px); pointer-events: none; transition: all 0.2s ease; }
        .profile-dropdown.open { opacity: 1; transform: translateY(0); pointer-events: auto; }
        .profile-dropdown a { display: flex; align-items: center; gap: 0.75rem; padding: 0.6rem 1rem; font-size: 0.85rem; color: #374151; transition: background 0.15s; cursor: pointer; text-decoration: none; }
        .profile-dropdown a:hover { background: #e8f0fe; color: #1e3a5f; }
        .profile-dropdown .divider { height: 1px; background: #e5e7eb; margin: 0.25rem 0; }
        .profile-dropdown .danger { color: #dc2626; }
        .profile-dropdown .danger:hover { background: #fef2f2; color: #dc2626; }
        .header-profile-btn { cursor: pointer; display: flex; align-items: center; gap: 0.5rem; padding: 0.3rem 0.75rem 0.3rem 0.5rem; border-radius: 9999px; background: rgba(255,255,255,0.2); transition: background 0.2s; border: 1px solid rgba(255,255,255,0.3); }
        .header-profile-btn:hover { background: rgba(255,255,255,0.3); }
        .header-profile-btn .avatar-sm { width: 2rem; height: 2rem; border-radius: 50%; background: white; display: flex; align-items: center; justify-content: center; color: #1e3a5f; }
    </style>
</head>
<body>
    <div class="min-h-screen bg-gray-100">
        <div class="max-w-7xl mx-auto px-4 py-5">
            <div class="flex flex-col lg:flex-row gap-6">
                <aside class="lg:w-72 flex-shrink-0">
                    <div id="agent-sidebar"></div>
                </aside>

                <main class="flex-1 space-y-5">
                    <div class="gradient-bg rounded-2xl p-5 text-white shadow-lg flex items-center justify-between">
                        <div>
                            <h2 class="text-2xl font-bold tracking-tight">🚢 Step 2: Shipment Information</h2>
                            <p class="opacity-90 text-sm">Enter consignment, manifest, and transport details</p>
                        </div>
                        <div class="relative">
                            <button onclick="document.getElementById('profileDropdown').classList.toggle('open')" class="header-profile-btn">
                                <span class="avatar-sm"><i class="ri-user-line"></i></span>
                                <span class="text-sm font-medium hidden sm:inline">Agent</span>
                                <i class="ri-arrow-down-s-line text-sm"></i>
                            </button>
                            <div class="profile-dropdown" id="profileDropdown">
                                <a href="#"><i class="ri-user-settings-line"></i> My Profile</a>
                                <a href="#"><i class="ri-edit-line"></i> Edit Profile</a>
                                <div class="divider"></div>
                                <a href="#" id="dropdownSignOut" class="danger"><i class="ri-logout-box-line"></i> Sign Out</a>
                            </div>
                        </div>
                    </div>

                    <div class="bg-white rounded-xl border border-gray-200 p-4 shadow-sm">
                        <div class="flex items-center justify-between text-sm text-gray-500 mb-2">
                            <span>Step 2 of 8</span>
                            <span>25% Complete</span>
                        </div>
                        <div class="w-full bg-gray-200 rounded-full h-2">
                            <div class="bg-blue-600 h-2 rounded-full" style="width:25%"></div>
                        </div>
                    </div>

                    <div class="bg-white rounded-xl border border-gray-200 p-5 shadow-sm">
                        <h3 class="font-bold text-lg mb-4">Shipment Information</h3>
                        <div class="grid md:grid-cols-2 gap-4">
                            <div class="form-group">
                                <label>Consignment Number <span class="text-red-500">*</span></label>
                                <input type="text" class="form-input" placeholder="Enter consignment number" />
                            </div>
                            <div class="form-group">
                                <label>Manifest Number <span class="text-red-500">*</span></label>
                                <input type="text" class="form-input" placeholder="Enter manifest number" />
                            </div>
                            <div class="form-group">
                                <label>Port of Entry <span class="text-red-500">*</span></label>
                                <select class="form-input">
                                    <option>Nimule</option>
                                    <option selected>Juba</option>
                                    <option>Kaya</option>
                                </select>
                            </div>
                            <div class="form-group">
                                <label>Country of Origin <span class="text-red-500">*</span></label>
                                <input type="text" class="form-input" placeholder="Enter country of origin" />
                            </div>
                            <div class="form-group">
                                <label>Destination <span class="text-red-500">*</span></label>
                                <input type="text" class="form-input" placeholder="Enter destination" />
                            </div>
                            <div class="form-group">
                                <label>Transport Mode <span class="text-red-500">*</span></label>
                                <select class="form-input">
                                    <option>Road</option>
                                    <option selected>Air</option>
                                    <option>Rail</option>
                                    <option>Sea</option>
                                </select>
                            </div>
                            <div class="form-group">
                                <label>Expected Arrival Date <span class="text-red-500">*</span></label>
                                <input type="date" class="form-input" />
                            </div>
                            <div class="form-group">
                                <label>Place of Loading</label>
                                <input type="text" class="form-input" placeholder="Enter place of loading" />
                            </div>
                            <div class="form-group">
                                <label>Shipping Line</label>
                                <input type="text" class="form-input" placeholder="Enter shipping line" />
                            </div>
                            <div class="form-group">
                                <label>Vessel/Flight Number</label>
                                <input type="text" class="form-input" placeholder="Enter vessel or flight number" />
                            </div>
                        </div>

                        <div class="flex justify-between mt-4 pt-4 border-t border-gray-200">
                            <a href="declarant-information.html" class="bg-gray-100 hover:bg-gray-200 text-gray-700 px-6 py-2 rounded-lg text-sm font-semibold transition flex items-center gap-1">
                                <i class="ri-arrow-left-line"></i> Previous
                            </a>
                            <button id="saveContinueBtn" class="bg-blue-600 hover:bg-blue-700 text-white px-6 py-2 rounded-lg text-sm font-semibold transition flex items-center gap-1">
                                Save & Continue <i class="ri-arrow-right-line"></i>
                            </button>
                        </div>
                    </div>
                </main>
            </div>
        </div>
    </div>
    <script>
        document.addEventListener('click', function(e) {
            if (!e.target.closest('.header-profile-btn') && !e.target.closest('.profile-dropdown')) {
                document.getElementById('profileDropdown').classList.remove('open');
            }
        });
    </script>

        <script type="module" src="../../js/agent-sidebar.js"></script>
<!-- Supabase & Shared Authentication Guards -->
    <script type="module">
        import supabase from '../../js/supabase.js';
        import { checkPageAuth } from '../../js/auth-check.js';
        import { signOut } from '../../js/auth.js';
        import { loadCurrentUserProfile } from '../../js/profile-loader.js';
        import { 
            saveDraft, 
            loadDraft,
            getCurrentApplication,
            getDraftData 
        } from '../../js/agent-declaration-service.js';

        async function initPage() {
            console.log('=== INITIALIZING AUTH GUARD ON MOCK PAGE ===');
            const role = 'agent';
            
            // 1. Run auth check
            const hasAccess = await checkPageAuth(role);
            if (!hasAccess) {
                console.log('Access denied, redirecting...');
                return;
            }

            // 2. Load profile data from Supabase
            const { user, profile } = await loadCurrentUserProfile();
            
            // 3. Update sidebar and profile UI
            if (profile) {
                const displayName = profile.full_name || user?.email || 'User';
                const displayRole = role === 'agent' ? 'Clearing Agent' : 'Trader';
                
                const nameEl = document.getElementById(role + 'ProfileName') || document.querySelector('[data-user-name]');
                if (nameEl) nameEl.textContent = displayName;
                
                const roleEl = document.getElementById(role + 'ProfileRole') || document.querySelector('[data-user-role]');
                if (roleEl) roleEl.textContent = displayRole;
                
                const statusEl = document.getElementById(role + 'ProfileStatus');
                if (statusEl) statusEl.textContent = '● ' + (profile.status || 'Active');
                
                const tinEl = document.getElementById(role + 'ProfileTIN');
                if (tinEl && profile.organization) {
                    tinEl.textContent = 'Org: ' + profile.organization;
                }
            }

            // 4. Bind Logout Button Listeners
            const handleLogout = async (e) => {
                e.preventDefault();
                console.log('Signing out...');
                const result = await signOut();
                if (result.success) {
                    window.location.href = '../../auth/login.html';
                }
            };

            const signOutBtn = document.getElementById('signOutBtn');
            if (signOutBtn) signOutBtn.addEventListener('click', handleLogout);

            const dropdownSignOut = document.getElementById('dropdownSignOut');
            if (dropdownSignOut) dropdownSignOut.addEventListener('click', handleLogout);
        }

        document.addEventListener('DOMContentLoaded', initPage);
        if (document.readyState === 'interactive' || document.readyState === 'complete') {
            initPage();
        }

        // ================================================================
        // FORM HANDLING - SHIPMENT INFORMATION
        // ================================================================

        const urlParams = new URLSearchParams(window.location.search);
        const applicationId = urlParams.get('application_id');

        if (applicationId) {
            loadExistingDraft(applicationId);
        }

        async function loadExistingDraft(appId) {
            try {
                const result = await loadDraft(appId);
                if (result.success && result.data) {
                    const draft = getDraftData();
                    if (draft.shipment) {
                        const fields = draft.shipment;
                        document.querySelector('input[placeholder="Enter consignment number"]').value = fields.consignment_number || '';
                        document.querySelector('input[placeholder="Enter manifest number"]').value = fields.manifest_number || '';
                        document.querySelector('select').value = fields.port_of_entry || 'Juba';
                        document.querySelector('input[placeholder="Enter country of origin"]').value = fields.country_of_origin || '';
                        document.querySelector('input[placeholder="Enter destination"]').value = fields.destination || '';
                        document.querySelectorAll('select')[1].value = fields.transport_mode || 'Air';
                        document.querySelector('input[type="date"]').value = fields.expected_arrival_date || '';
                        document.querySelectorAll('input[type="text"]')[4].value = fields.place_of_loading || '';
                        document.querySelectorAll('input[type="text"]')[5].value = fields.shipping_line || '';
                        document.querySelectorAll('input[type="text"]')[6].value = fields.vessel_flight_number || '';
                    }
                }
            } catch (error) {
                console.error('Error loading draft:', error);
            }
        }

        document.getElementById('saveContinueBtn').addEventListener('click', async (e) => {
            e.preventDefault();
            
            if (!applicationId) {
                alert('No application ID found. Please start from the beginning.');
                window.location.href = 'declarant-information.html';
                return;
            }

            const shipmentData = {
                consignment_number: document.querySelector('input[placeholder="Enter consignment number"]').value,
                manifest_number: document.querySelector('input[placeholder="Enter manifest number"]').value,
                port_of_entry: document.querySelector('select').value,
                country_of_origin: document.querySelector('input[placeholder="Enter country of origin"]').value,
                destination: document.querySelector('input[placeholder="Enter destination"]').value,
                transport_mode: document.querySelectorAll('select')[1].value,
                expected_arrival_date: document.querySelector('input[type="date"]').value,
                place_of_loading: document.querySelectorAll('input[type="text"]')[4].value,
                shipping_line: document.querySelectorAll('input[type="text"]')[5].value,
                vessel_flight_number: document.querySelectorAll('input[type="text"]')[6].value
            };

            const required = ['consignment_number', 'manifest_number', 'port_of_entry', 'country_of_origin', 'destination', 'transport_mode', 'expected_arrival_date'];
            const missing = required.filter(field => !shipmentData[field]);
            
            if (missing.length > 0) {
                alert('Please fill in all required fields');
                return;
            }

            const result = await saveDraft('shipment', shipmentData);
            
            if (result.success) {
                window.location.href = `goods-information.html?application_id=${applicationId}`;
            } else {
                alert('Error saving draft: ' + result.error);
            }
        });
    </script>
</body></html>
