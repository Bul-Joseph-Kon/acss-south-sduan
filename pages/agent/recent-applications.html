<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>SSRA Customs · Recent Applications</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <link href="https://cdn.jsdelivr.net/npm/remixicon@4.2.0/fonts/remixicon.css" rel="stylesheet" />
    <style>
        .gradient-bg { background: linear-gradient(135deg, #1e3a5f 0%, #2a5f8f 100%); }
        .sidebar-link { transition: all 0.3s ease; cursor: pointer; display: flex; align-items: center; gap: 0.75rem; padding: 0.6rem 1rem; border-radius: 0.5rem; font-size: 0.9rem; color: #4b5563; }
        .sidebar-link:hover, .sidebar-link.active { background-color: #e8f0fe; color: #1e3a5f; }
        .sidebar-link i { font-size: 1.2rem; width: 1.5rem; text-align: center; }
        .status-badge { padding: 0.2rem 0.6rem; border-radius: 9999px; font-size: 0.65rem; font-weight: 600; }
        .status-approved { background: #d1fae5; color: #065f46; }
        .status-pending { background: #fef3c7; color: #92400e; }
        .status-review { background: #dbeafe; color: #1e40af; }
        .status-rejected { background: #fee2e2; color: #991b1b; }
        .status-draft { background: #f3f4f6; color: #4b5563; }
        .status-completed { background: #d1fae5; color: #065f46; }
        .profile-dropdown { position: absolute; right: 0; top: calc(100% + 0.5rem); background: white; border-radius: 0.75rem; box-shadow: 0 10px 25px rgba(0,0,0,0.1); border: 1px solid #e5e7eb; min-width: 200px; z-index: 50; overflow: hidden; opacity: 0; transform: translateY(-10px); pointer-events: none; transition: all 0.2s ease; }
        .profile-dropdown.open { opacity: 1; transform: translateY(0); pointer-events: auto; }
        .profile-dropdown a { display: flex; align-items: center; gap: 0.75rem; padding: 0.6rem 1rem; font-size: 0.85rem; color: #374151; transition: background 0.15s; cursor: pointer; text-decoration: none; }
        .profile-dropdown a:hover { background: #e8f0fe; color: #1e3a5f; }
        .profile-dropdown .divider { height: 1px; background: #e5e7eb; margin: 0.25rem 0; }
        .profile-dropdown .danger { color: #dc2626; }
        .profile-dropdown .danger:hover { background: #fef2f2; color: #dc2626; }
        .header-profile-btn { cursor: pointer; display: flex; align-items: center; gap: 0.5rem; padding: 0.3rem 0.75rem 0.3rem 0.5rem; border-radius: 9999px; background: rgba(255,255,255,0.2); transition: background 0.2s; border: 1px solid rgba(255,255,255,0.3); }
        .header-profile-btn:hover { background: rgba(255,255,255,0.3); }
        .header-profile-btn .avatar-sm { width: 2rem; height: 2rem; border-radius: 50%; background: white; display: flex; align-items: center; justify-content: center; color: #1e3a5f; }
    </style>
</head>
<body>
    <div class="min-h-screen bg-gray-100">
        <div class="max-w-7xl mx-auto px-4 py-5">
            <div class="flex flex-col lg:flex-row gap-6">
                <aside class="lg:w-72 flex-shrink-0">
                    <div id="agent-sidebar"></div>
                </aside>

                <main class="flex-1 space-y-5">
                    <div class="gradient-bg rounded-2xl p-5 text-white shadow-lg flex items-center justify-between">
                        <div>
                            <h2 class="text-2xl font-bold tracking-tight">📋 Recent Applications</h2>
                            <p class="opacity-90 text-sm">View all your recent client applications</p>
                        </div>
                        <div class="relative">
                            <button onclick="document.getElementById('profileDropdown').classList.toggle('open')" class="header-profile-btn">
                                <span class="avatar-sm"><i class="ri-user-line"></i></span>
                                <span class="text-sm font-medium hidden sm:inline">Agent</span>
                                <i class="ri-arrow-down-s-line text-sm"></i>
                            </button>
                            <div class="profile-dropdown" id="profileDropdown">
                                <a href="#"><i class="ri-user-settings-line"></i> My Profile</a>
                                <a href="#"><i class="ri-edit-line"></i> Edit Profile</a>
                                <div class="divider"></div>
                                <a href="#" id="dropdownSignOut" class="danger"><i class="ri-logout-box-line"></i> Sign Out</a>
                            </div>
                        </div>
                    </div>

                    <!-- Filter -->
                    <div class="bg-white rounded-xl border border-gray-200 p-4 shadow-sm">
                        <div class="flex flex-wrap gap-3">
                            <select class="border rounded-lg px-3 py-2 text-sm focus:ring-2 focus:ring-blue-400 outline-none">
                                <option>All Services</option>
                                <option>CVET</option>
                                <option>Direct Assessment</option>
                                <option>Agent License</option>
                                <option>Vehicle Query</option>
                            </select>
                            <select class="border rounded-lg px-3 py-2 text-sm focus:ring-2 focus:ring-blue-400 outline-none">
                                <option>All Status</option>
                                <option>Draft</option>
                                <option>Pending</option>
                                <option>Under Review</option>
                                <option>Approved</option>
                                <option>Rejected</option>
                                <option>Completed</option>
                            </select>
                            <input type="date" class="border rounded-lg px-3 py-2 text-sm focus:ring-2 focus:ring-blue-400 outline-none" />
                            <input type="date" class="border rounded-lg px-3 py-2 text-sm focus:ring-2 focus:ring-blue-400 outline-none" />
                            <button class="bg-blue-600 text-white px-4 py-2 rounded-lg text-sm font-semibold hover:bg-blue-700 transition">Filter</button>
                            <button class="border border-gray-300 px-4 py-2 rounded-lg text-sm hover:bg-gray-50 transition">Clear</button>
                        </div>
                    </div>

                    <!-- Applications Table -->
                    <div class="bg-white rounded-xl border border-gray-200 p-5 shadow-sm overflow-x-auto">
                        <table class="w-full text-sm">
                            <thead class="border-b">
                                <tr class="text-left text-gray-500">
                                    <th class="py-2 px-3">Ref No</th>
                                    <th class="py-2 px-3">Service</th>
                                    <th class="py-2 px-3">Client</th>
                                    <th class="py-2 px-3">Goods/Vehicle</th>
                                    <th class="py-2 px-3">Value</th>
                                    <th class="py-2 px-3">Status</th>
                                    <th class="py-2 px-3">Date</th>
                                    <th class="py-2 px-3">Action</th>
                                </tr>
                            </thead>
                            <tbody id="applicationsTableBody">
                                <tr>
                                    <td colspan="8" class="py-4 text-center text-gray-500">Loading applications...</td>
                                </tr>
                            </tbody>
                        </table>
                    </div>

                    <!-- Pagination -->
                    <div class="flex justify-between items-center bg-white rounded-xl border border-gray-200 p-4 shadow-sm">
                        <span class="text-sm text-gray-500">Showing 1-5 of 28 applications</span>
                        <div class="flex gap-2">
                            <button class="px-3 py-1 border rounded-lg text-sm hover:bg-gray-50">Previous</button>
                            <button class="px-3 py-1 border rounded-lg text-sm bg-blue-600 text-white">1</button>
                            <button class="px-3 py-1 border rounded-lg text-sm hover:bg-gray-50">2</button>
                            <button class="px-3 py-1 border rounded-lg text-sm hover:bg-gray-50">3</button>
                            <button class="px-3 py-1 border rounded-lg text-sm hover:bg-gray-50">Next</button>
                        </div>
                    </div>
                </main>
            </div>
        </div>
    </div>
    <script>
        document.addEventListener('click', function(e) {
            if (!e.target.closest('.header-profile-btn') && !e.target.closest('.profile-dropdown')) {
                document.getElementById('profileDropdown').classList.remove('open');
            }
        });
    </script>

        <script type="module" src="../../js/agent-sidebar.js"></script>
<!-- Supabase & Shared Authentication Guards -->
    <script type="module">
        import supabase from '../../js/supabase.js';
        import { checkPageAuth } from '../../js/auth-check.js';
        import { signOut } from '../../js/auth.js';
        import { loadCurrentUserProfile } from '../../js/profile-loader.js';

        async function initPage() {
            console.log('=== INITIALIZING AUTH GUARD ON MOCK PAGE ===');
            const role = 'agent';
            
            // 1. Run auth check
            const hasAccess = await checkPageAuth(role);
            if (!hasAccess) {
                console.log('Access denied, redirecting...');
                return;
            }

            // 2. Load profile data from Supabase
            const { user, profile } = await loadCurrentUserProfile();
            
            // 3. Update sidebar and profile UI
            if (profile) {
                const displayName = profile.full_name || user?.email || 'User';
                const displayRole = role === 'agent' ? 'Clearing Agent' : 'Trader';
                
                const nameEl = document.getElementById(role + 'ProfileName') || document.querySelector('[data-user-name]');
                if (nameEl) nameEl.textContent = displayName;
                
                const roleEl = document.getElementById(role + 'ProfileRole') || document.querySelector('[data-user-role]');
                if (roleEl) roleEl.textContent = displayRole;
                
                const statusEl = document.getElementById(role + 'ProfileStatus');
                if (statusEl) statusEl.textContent = '● ' + (profile.status || 'Active');
                
                const tinEl = document.getElementById(role + 'ProfileTIN');
                if (tinEl && profile.organization) {
                    tinEl.textContent = 'Org: ' + profile.organization;
                }
            }

            // 4. Load live applications data
            await loadApplications(profile?.id);

            // 5. Setup realtime subscriptions
            setupRealtimeSubscriptions(profile?.id);

            // 6. Bind Logout Button Listeners
            const handleLogout = async (e) => {
                e.preventDefault();
                console.log('Signing out...');
                const result = await signOut();
                if (result.success) {
                    window.location.href = '../../auth/login.html';
                }
            };

            const signOutBtn = document.getElementById('signOutBtn');
            if (signOutBtn) signOutBtn.addEventListener('click', handleLogout);

            const dropdownSignOut = document.getElementById('dropdownSignOut');
            if (dropdownSignOut) dropdownSignOut.addEventListener('click', handleLogout);
        }

        async function loadApplications(profileId) {
            try {
                const { data: applications, error } = await supabase
                    .from('applications')
                    .select('*, profiles!applications_user_id_fkey(full_name, organization)')
                    .eq('user_id', profileId)
                    .order('created_at', { ascending: false })
                    .limit(50);

                if (error) throw error;

                const tbody = document.getElementById('applicationsTableBody');
                if (!applications || applications.length === 0) {
                    tbody.innerHTML = '<tr><td colspan="8" class="py-4 text-center text-gray-500">No applications found</td></tr>';
                    return;
                }

                tbody.innerHTML = applications.map(app => {
                    const statusClass = getStatusBadgeClass(app.status);
                    const statusText = formatStatus(app.status);
                    const dateStr = app.created_at ? new Date(app.created_at).toLocaleDateString('en-US', { month: 'short', day: 'numeric', year: 'numeric' }) : 'N/A';
                    const valueStr = app.declared_value ? `$${app.declared_value.toLocaleString()}` : '-';
                    const clientName = app.profiles?.full_name || app.profiles?.organization || 'Unknown';
                    const goodsVehicle = app.goods_data?.description || app.vehicle_data?.description || 'N/A';

                    return `
                        <tr class="border-b hover:bg-gray-50">
                            <td class="py-2 px-3 font-mono text-blue-600">${app.application_number || 'N/A'}</td>
                            <td class="py-2 px-3">${app.application_type || 'Unknown'}</td>
                            <td class="py-2 px-3">${clientName}</td>
                            <td class="py-2 px-3">${goodsVehicle}</td>
                            <td class="py-2 px-3">${valueStr}</td>
                            <td class="py-2 px-3"><span class="status-badge ${statusClass}">${statusText}</span></td>
                            <td class="py-2 px-3">${dateStr}</td>
                            <td class="py-2 px-3"><a href="tracking.html?id=${app.id}" class="text-blue-600 hover:underline">View</a></td>
                        </tr>
                    `;
                }).join('');

                // Update pagination info
                const paginationText = document.querySelector('.flex.justify-between.items-center span');
                if (paginationText) {
                    paginationText.textContent = `Showing 1-${applications.length} of ${applications.length} applications`;
                }
            } catch (error) {
                console.error('Error loading applications:', error);
                document.getElementById('applicationsTableBody').innerHTML = '<tr><td colspan="8" class="py-4 text-center text-red-500">Error loading applications</td></tr>';
            }
        }

        function getStatusBadgeClass(status) {
            const classes = {
                draft: 'status-draft',
                submitted: 'status-pending',
                pending_review: 'status-review',
                under_inspection: 'status-inspection',
                approved: 'status-approved',
                rejected: 'status-rejected',
                paid: 'status-approved',
                completed: 'status-completed',
                returned: 'status-rejected'
            };
            return classes[status] || 'status-draft';
        }

        function formatStatus(status) {
            const labels = {
                draft: 'Draft',
                submitted: 'Submitted',
                pending_review: 'Review',
                under_inspection: 'Inspection',
                approved: 'Approved',
                rejected: 'Rejected',
                paid: 'Paid',
                completed: 'Completed',
                returned: 'Returned'
            };
            return labels[status] || status;
        }

        function setupRealtimeSubscriptions(profileId) {
            // Subscribe to applications table changes
            const appChannel = supabase
                .channel('recent-applications-apps')
                .on('postgres_changes', { event: '*', schema: 'public', table: 'applications' }, async () => {
                    console.log('Applications changed, reloading...');
                    const { data: { user } } = await supabase.auth.getUser();
                    const profile = user ? await getUserProfile(user.id) : null;
                    await loadApplications(profile?.id);
                })
                .subscribe();

            // Cleanup on page unload
            window.addEventListener('beforeunload', () => {
                supabase.removeChannel(appChannel);
            });
        }

        document.addEventListener('DOMContentLoaded', initPage);
        if (document.readyState === 'interactive' || document.readyState === 'complete') {
            initPage();
        }
    </script>
</body></html>
