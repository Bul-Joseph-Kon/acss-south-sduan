<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>SSRA Customs · Agent Goods Info</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2"></script>
    <link href="../assets/icons/remixicon.css" rel="stylesheet" />
    <style>
        .gradient-bg { background: linear-gradient(135deg, #1e3a5f 0%, #2a5f8f 100%); }
        .sidebar-link { transition: all 0.3s ease; cursor: pointer; display: flex; align-items: center; gap: 0.75rem; padding: 0.6rem 1rem; border-radius: 0.5rem; font-size: 0.9rem; color: #4b5563; }
        .sidebar-link:hover, .sidebar-link.active { background-color: #e8f0fe; color: #1e3a5f; }
        .sidebar-link i { font-size: 1.2rem; width: 1.5rem; text-align: center; }
        .form-group { margin-bottom: 1rem; }
        .form-group label { display: block; font-size: 0.8rem; font-weight: 500; color: #374151; margin-bottom: 0.2rem; }
        .form-group .form-input { width: 100%; padding: 0.4rem 0.6rem; border-radius: 0.4rem; border: 1px solid #d1d5db; font-size: 0.85rem; transition: border-color 0.2s; }
        .form-group .form-input:focus { outline: none; border-color: #1e3a5f; box-shadow: 0 0 0 3px rgba(30,58,95,0.1); }
        .ai-badge-sm { font-size: 0.5rem; font-weight: 700; background: linear-gradient(135deg, #1e3a5f, #2a5f8f); color: white; padding: 0.05rem 0.35rem; border-radius: 9999px; text-transform: uppercase; letter-spacing: 0.3px; display: inline-block; }
        .form-input.ai-highlight { border-color: #1e3a5f; background: #e8f0fe; }
        .profile-dropdown { position: absolute; right: 0; top: calc(100% + 0.5rem); background: white; border-radius: 0.75rem; box-shadow: 0 10px 25px rgba(0,0,0,0.1); border: 1px solid #e5e7eb; min-width: 200px; z-index: 50; overflow: hidden; opacity: 0; transform: translateY(-10px); pointer-events: none; transition: all 0.2s ease; }
        .profile-dropdown.open { opacity: 1; transform: translateY(0); pointer-events: auto; }
        .profile-dropdown a { display: flex; align-items: center; gap: 0.75rem; padding: 0.6rem 1rem; font-size: 0.85rem; color: #374151; transition: background 0.15s; cursor: pointer; text-decoration: none; }
        .profile-dropdown a:hover { background: #e8f0fe; color: #1e3a5f; }
        .profile-dropdown .divider { height: 1px; background: #e5e7eb; margin: 0.25rem 0; }
        .profile-dropdown .danger { color: #dc2626; }
        .profile-dropdown .danger:hover { background: #fef2f2; color: #dc2626; }
        .header-profile-btn { cursor: pointer; display: flex; align-items: center; gap: 0.5rem; padding: 0.3rem 0.75rem 0.3rem 0.5rem; border-radius: 9999px; background: rgba(255,255,255,0.2); transition: background 0.2s; border: 1px solid rgba(255,255,255,0.3); }
        .header-profile-btn:hover { background: rgba(255,255,255,0.3); }
        .header-profile-btn .avatar-sm { width: 2rem; height: 2rem; border-radius: 50%; background: white; display: flex; align-items: center; justify-content: center; color: #1e3a5f; }
    </style>
</head>
<body>
    <div class="min-h-screen bg-gray-100">
        <div class="max-w-7xl mx-auto px-4 py-5">
            <div class="flex flex-col lg:flex-row gap-6">
                <aside class="lg:w-72 flex-shrink-0">
                    <div id="agent-sidebar"></div>
                </aside>

                <main class="flex-1 space-y-5">
                    <div class="gradient-bg rounded-2xl p-5 text-white shadow-lg flex items-center justify-between">
                        <div>
                            <h2 class="text-2xl font-bold tracking-tight">📦 Step 3: Goods Information</h2>
                            <p class="opacity-90 text-sm">Enter goods description, HS Code, quantity, and weight</p>
                        </div>
                        <div class="relative">
                            <button onclick="document.getElementById('profileDropdown').classList.toggle('open')" class="header-profile-btn">
                                <span class="avatar-sm"><i class="ri-user-line"></i></span>
                                <span class="text-sm font-medium hidden sm:inline">Agent</span>
                                <i class="ri-arrow-down-s-line text-sm"></i>
                            </button>
                            <div class="profile-dropdown" id="profileDropdown">
                                <a href="#"><i class="ri-user-settings-line"></i> My Profile</a>
                                <a href="#"><i class="ri-edit-line"></i> Edit Profile</a>
                                <div class="divider"></div>
                                <a href="#" id="dropdownSignOut" class="danger"><i class="ri-logout-box-line"></i> Sign Out</a>
                            </div>
                        </div>
                    </div>

                    <div class="bg-white rounded-xl border border-gray-200 p-4 shadow-sm">
                        <div class="flex items-center justify-between text-sm text-gray-500 mb-2">
                            <span>Step 3 of 8</span>
                            <span>37% Complete</span>
                        </div>
                        <div class="w-full bg-gray-200 rounded-full h-2">
                            <div class="bg-blue-600 h-2 rounded-full" style="width:37%"></div>
                        </div>
                    </div>

                    <div class="bg-white rounded-xl border border-gray-200 p-5 shadow-sm">
                        <h3 class="font-bold text-lg mb-4">Goods Information</h3>
                        <div class="grid md:grid-cols-2 gap-4">
                            <div class="form-group">
                                <label>Goods Description <span class="text-red-500">*</span></label>
                                <input type="text" class="form-input" placeholder="Enter goods description" />
                            </div>
                            <div class="form-group">
                                <label>HS Code <span class="text-red-500">*</span> <span class="ai-badge-sm">AI Recommend</span></label>
                                <input type="text" class="form-input ai-highlight" placeholder="Enter HS Code" />
                            </div>
                            <div class="form-group">
                                <label>Quantity <span class="text-red-500">*</span></label>
                                <input type="number" class="form-input" placeholder="Enter quantity" />
                            </div>
                            <div class="form-group">
                                <label>Unit of Measurement <span class="text-red-500">*</span></label>
                                <select class="form-input">
                                    <option>Units</option>
                                    <option selected>Kg</option>
                                    <option>Liters</option>
                                    <option>Meters</option>
                                </select>
                            </div>
                            <div class="form-group">
                                <label>Gross Weight (kg) <span class="text-red-500">*</span></label>
                                <input type="number" class="form-input" placeholder="Enter gross weight" />
                            </div>
                            <div class="form-group">
                                <label>Net Weight (kg) <span class="text-red-500">*</span></label>
                                <input type="number" class="form-input" placeholder="Enter net weight" />
                            </div>
                            <div class="form-group">
                                <label>Unit Value (SSP) <span class="text-red-500">*</span></label>
                                <input type="number" class="form-input" placeholder="Enter unit value in SSP" />
                            </div>
                            <div class="form-group">
                                <label>Customs Value (SSP) <span class="ai-badge-sm">AI Estimate</span></label>
                                <input type="text" class="form-input ai-highlight" placeholder="Customs value" />
                            </div>
                            <div class="form-group">
                                <label>CIF Value (SSP) <span class="ai-badge-sm">AI Estimate</span></label>
                                <input type="text" class="form-input ai-highlight" placeholder="CIF value" />
                            </div>
                            <div class="form-group">
                                <label>Currency <span class="text-red-500">*</span></label>
                                <select class="form-input">
                                    <option selected>SSP (South Sudanese Pound)</option>
                                    <option>USD (US Dollar)</option>
                                    <option>EUR (Euro)</option>
                                    <option>GBP (British Pound)</option>
                                </select>
                            </div>
                        </div>

                        <div class="flex justify-between mt-4 pt-4 border-t border-gray-200">
                            <a href="shipment-information.html" class="bg-gray-100 hover:bg-gray-200 text-gray-700 px-6 py-2 rounded-lg text-sm font-semibold transition flex items-center gap-1">
                                <i class="ri-arrow-left-line"></i> Previous
                            </a>
                            <button id="saveContinueBtn" class="bg-blue-600 hover:bg-blue-700 text-white px-6 py-2 rounded-lg text-sm font-semibold transition flex items-center gap-1">
                                Save & Continue <i class="ri-arrow-right-line"></i>
                            </button>
                        </div>
                    </div>
                </main>
            </div>
        </div>
    </div>
    <script>
        document.addEventListener('click', function(e) {
            if (!e.target.closest('.header-profile-btn') && !e.target.closest('.profile-dropdown')) {
                document.getElementById('profileDropdown').classList.remove('open');
            }
        });
    </script>

        <script type="module" src="../../js/agent-sidebar.js"></script>
<!-- Supabase & Shared Authentication Guards -->
    <script type="module">
        import supabase from '../../js/supabase.js';
        import { checkPageAuth } from '../../js/auth-check.js';
        import { signOut } from '../../js/auth.js';
        import { loadCurrentUserProfile } from '../../js/profile-loader.js';
        import { 
            saveDraft, 
            loadDraft,
            getCurrentApplication,
            getDraftData 
        } from '../../js/agent-declaration-service.js';

        async function initPage() {
            console.log('=== INITIALIZING AUTH GUARD ON MOCK PAGE ===');
            const role = 'agent';
            
            // 1. Run auth check
            const hasAccess = await checkPageAuth(role);
            if (!hasAccess) {
                console.log('Access denied, redirecting...');
                return;
            }

            // 2. Load profile data from Supabase
            const { user, profile } = await loadCurrentUserProfile();
            
            // 3. Update sidebar and profile UI
            if (profile) {
                const displayName = profile.full_name || user?.email || 'User';
                const displayRole = role === 'agent' ? 'Clearing Agent' : 'Trader';
                
                const nameEl = document.getElementById(role + 'ProfileName') || document.querySelector('[data-user-name]');
                if (nameEl) nameEl.textContent = displayName;
                
                const roleEl = document.getElementById(role + 'ProfileRole') || document.querySelector('[data-user-role]');
                if (roleEl) roleEl.textContent = displayRole;
                
                const statusEl = document.getElementById(role + 'ProfileStatus');
                if (statusEl) statusEl.textContent = '● ' + (profile.status || 'Active');
                
                const tinEl = document.getElementById(role + 'ProfileTIN');
                if (tinEl && profile.organization) {
                    tinEl.textContent = 'Org: ' + profile.organization;
                }
            }

            // 4. Bind Logout Button Listeners
            const handleLogout = async (e) => {
                e.preventDefault();
                console.log('Signing out...');
                const result = await signOut();
                if (result.success) {
                    window.location.href = '../../auth/login.html';
                }
            };

            const signOutBtn = document.getElementById('signOutBtn');
            if (signOutBtn) signOutBtn.addEventListener('click', handleLogout);

            const dropdownSignOut = document.getElementById('dropdownSignOut');
            if (dropdownSignOut) dropdownSignOut.addEventListener('click', handleLogout);
        }

        document.addEventListener('DOMContentLoaded', initPage);
        if (document.readyState === 'interactive' || document.readyState === 'complete') {
            initPage();
        }

        // ================================================================
        // FORM HANDLING - GOODS INFORMATION
        // ================================================================

        const urlParams = new URLSearchParams(window.location.search);
        const applicationId = urlParams.get('application_id');

        if (applicationId) {
            loadExistingDraft(applicationId);
        }

        async function loadExistingDraft(appId) {
            try {
                const result = await loadDraft(appId);
                if (result.success && result.data) {
                    const draft = getDraftData();
                    if (draft.goods) {
                        const fields = draft.goods;
                        document.querySelector('input[placeholder="Enter goods description"]').value = fields.goods_description || '';
                        document.querySelector('input[placeholder="Enter HS Code"]').value = fields.hs_code || '';
                        document.querySelector('input[type="number"]').value = fields.quantity || '';
                        document.querySelector('select').value = fields.unit_of_measurement || 'Kg';
                        document.querySelectorAll('input[type="number"]')[1].value = fields.gross_weight || '';
                        document.querySelectorAll('input[type="number"]')[2].value = fields.net_weight || '';
                        document.querySelectorAll('input[type="number"]')[3].value = fields.unit_value || '';
                        document.querySelectorAll('input[type="text"]')[0].value = fields.customs_value || '';
                        document.querySelectorAll('input[type="text"]')[1].value = fields.cif_value || '';
                        document.querySelectorAll('select')[1].value = fields.currency || 'SSP (South Sudanese Pound)';
                    }
                }
            } catch (error) {
                console.error('Error loading draft:', error);
            }
        }

        document.getElementById('saveContinueBtn').addEventListener('click', async (e) => {
            e.preventDefault();
            
            if (!applicationId) {
                alert('No application ID found. Please start from the beginning.');
                window.location.href = 'declarant-information.html';
                return;
            }

            const goodsData = {
                goods_description: document.querySelector('input[placeholder="Enter goods description"]').value,
                hs_code: document.querySelector('input[placeholder="Enter HS Code"]').value,
                quantity: document.querySelector('input[type="number"]').value,
                unit_of_measurement: document.querySelector('select').value,
                gross_weight: document.querySelectorAll('input[type="number"]')[1].value,
                net_weight: document.querySelectorAll('input[type="number"]')[2].value,
                unit_value: document.querySelectorAll('input[type="number"]')[3].value,
                customs_value: document.querySelectorAll('input[type="text"]')[0].value,
                cif_value: document.querySelectorAll('input[type="text"]')[1].value,
                currency: document.querySelectorAll('select')[1].value
            };

            const required = ['goods_description', 'hs_code', 'quantity', 'unit_of_measurement', 'gross_weight', 'net_weight', 'unit_value', 'currency'];
            const missing = required.filter(field => !goodsData[field]);
            
            if (missing.length > 0) {
                alert('Please fill in all required fields');
                return;
            }

            const result = await saveDraft('goods', goodsData);
            
            if (result.success) {
                window.location.href = `documents.html?application_id=${applicationId}`;
            } else {
                alert('Error saving draft: ' + result.error);
            }
        });
    </script>
</body></html>
