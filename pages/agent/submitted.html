<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>SSRA Customs · Agent Submitted Notifications</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <link href="https://cdn.jsdelivr.net/npm/remixicon@4.2.0/fonts/remixicon.css" rel="stylesheet" />
    <style>
        .gradient-bg { background: linear-gradient(135deg, #1e3a5f 0%, #2a5f8f 100%); }
        .sidebar-link { transition: all 0.3s ease; cursor: pointer; display: flex; align-items: center; gap: 0.75rem; padding: 0.6rem 1rem; border-radius: 0.5rem; font-size: 0.9rem; color: #4b5563; }
        .sidebar-link:hover, .sidebar-link.active { background-color: #e8f0fe; color: #1e3a5f; }
        .sidebar-link i { font-size: 1.2rem; width: 1.5rem; text-align: center; }
        .notification-item { padding: 1rem; border-radius: 0.75rem; border: 1px solid #e5e7eb; transition: all 0.2s ease; }
        .notification-item:hover { background: #f9fafb; }
        .notification-item.unread { background: #e8f0fe; border-color: #1e3a5f; }
        .notification-item .notif-time { font-size: 0.75rem; color: #6b7280; }
        .profile-dropdown { position: absolute; right: 0; top: calc(100% + 0.5rem); background: white; border-radius: 0.75rem; box-shadow: 0 10px 25px rgba(0,0,0,0.1); border: 1px solid #e5e7eb; min-width: 200px; z-index: 50; overflow: hidden; opacity: 0; transform: translateY(-10px); pointer-events: none; transition: all 0.2s ease; }
        .profile-dropdown.open { opacity: 1; transform: translateY(0); pointer-events: auto; }
        .profile-dropdown a { display: flex; align-items: center; gap: 0.75rem; padding: 0.6rem 1rem; font-size: 0.85rem; color: #374151; transition: background 0.15s; cursor: pointer; text-decoration: none; }
        .profile-dropdown a:hover { background: #e8f0fe; color: #1e3a5f; }
        .profile-dropdown .divider { height: 1px; background: #e5e7eb; margin: 0.25rem 0; }
        .profile-dropdown .danger { color: #dc2626; }
        .profile-dropdown .danger:hover { background: #fef2f2; color: #dc2626; }
        .header-profile-btn { cursor: pointer; display: flex; align-items: center; gap: 0.5rem; padding: 0.3rem 0.75rem 0.3rem 0.5rem; border-radius: 9999px; background: rgba(255,255,255,0.2); transition: background 0.2s; border: 1px solid rgba(255,255,255,0.3); }
        .header-profile-btn:hover { background: rgba(255,255,255,0.3); }
        .header-profile-btn .avatar-sm { width: 2rem; height: 2rem; border-radius: 50%; background: white; display: flex; align-items: center; justify-content: center; color: #1e3a5f; }
    </style>
</head>
<body>
    <div class="min-h-screen bg-gray-100">
        <div class="max-w-7xl mx-auto px-4 py-5">
            <div class="flex flex-col lg:flex-row gap-6">
                <aside class="lg:w-72 flex-shrink-0">
                    <div id="agent-sidebar"></div>
                </aside>

                <main class="flex-1 space-y-5">
                    <div class="gradient-bg rounded-2xl p-5 text-white shadow-lg flex items-center justify-between">
                        <div>
                            <h2 class="text-2xl font-bold tracking-tight">📤 Submitted Notifications</h2>
                            <p class="opacity-90 text-sm">Notifications for submitted applications</p>
                        </div>
                        <div class="relative">
                            <button onclick="document.getElementById('profileDropdown').classList.toggle('open')" class="header-profile-btn">
                                <span class="avatar-sm"><i class="ri-user-line"></i></span>
                                <span class="text-sm font-medium hidden sm:inline">Agent</span>
                                <i class="ri-arrow-down-s-line text-sm"></i>
                            </button>
                            <div class="profile-dropdown" id="profileDropdown">
                                <a href="#"><i class="ri-user-settings-line"></i> My Profile</a>
                                <a href="#"><i class="ri-edit-line"></i> Edit Profile</a>
                                <div class="divider"></div>
                                <a href="#" id="dropdownSignOut" class="danger"><i class="ri-logout-box-line"></i> Sign Out</a>
                            </div>
                        </div>
                    </div>

                    <div class="bg-white rounded-xl border border-gray-200 p-4 shadow-sm flex flex-wrap gap-3 items-center justify-between">
                        <div class="flex flex-wrap gap-2">
                            <button class="px-4 py-1.5 rounded-full text-sm bg-blue-600 text-white">All</button>
                            <button class="px-4 py-1.5 rounded-full text-sm border hover:bg-gray-50">Unread</button>
                            <button class="px-4 py-1.5 rounded-full text-sm border hover:bg-gray-50">Read</button>
                        </div>
                        <button onclick="document.querySelectorAll('.notification-item.unread').forEach(el=>el.classList.remove('unread')); alert('✅ All notifications marked as read')" class="text-sm text-blue-600 hover:underline">Mark all as read</button>
                    </div>

                    <div class="space-y-3" id="submittedList">
                        <div class="text-center py-4 text-gray-500">Loading submitted applications...</div>
                    </div>
                </main>
            </div>
        </div>
    </div>
    <script>
        document.addEventListener('click', function(e) {
            if (!e.target.closest('.header-profile-btn') && !e.target.closest('.profile-dropdown')) {
                document.getElementById('profileDropdown').classList.remove('open');
            }
        });
    </script>

        <script type="module" src="../../js/agent-sidebar.js"></script>
<!-- Supabase & Shared Authentication Guards -->
    <script type="module">
        import supabase from '../../js/supabase.js';
        import { checkPageAuth } from '../../js/auth-check.js';
        import { signOut } from '../../js/auth.js';
        import { loadCurrentUserProfile } from '../../js/profile-loader.js';

        let isInitialized = false;
        async function initPage() {
            if (isInitialized) return;
            isInitialized = true;
            console.log('=== INITIALIZING AUTH GUARD ON MOCK PAGE ===');
            const role = 'agent';
            
            // 1. Run auth check
            const hasAccess = await checkPageAuth(role);
            if (!hasAccess) {
                console.log('Access denied, redirecting...');
                return;
            }

            // 2. Load profile data from Supabase
            const { user, profile } = await loadCurrentUserProfile();
            
            // 3. Update sidebar and profile UI
            if (profile) {
                const displayName = profile.full_name || user?.email || 'User';
                const displayRole = role === 'agent' ? 'Clearing Agent' : 'Trader';
                
                const nameEl = document.getElementById(role + 'ProfileName') || document.querySelector('[data-user-name]');
                if (nameEl) nameEl.textContent = displayName;
                
                const roleEl = document.getElementById(role + 'ProfileRole') || document.querySelector('[data-user-role]');
                if (roleEl) roleEl.textContent = displayRole;
                
                const statusEl = document.getElementById(role + 'ProfileStatus');
                if (statusEl) statusEl.textContent = '● ' + (profile.status || 'Active');
                
                const tinEl = document.getElementById(role + 'ProfileTIN');
                if (tinEl && profile.organization) {
                    tinEl.textContent = 'Org: ' + profile.organization;
                }
            }

            // 4. Load live submitted applications data
            await loadSubmittedApplications(profile?.id);

            // 5. Setup realtime subscriptions
            setupRealtimeSubscriptions(profile?.id);

            // 6. Bind Logout Button Listeners
            const handleLogout = async (e) => {
                e.preventDefault();
                console.log('Signing out...');
                const result = await signOut();
                if (result.success) {
                    window.location.href = '../../auth/login.html';
                }
            };

            const signOutBtn = document.getElementById('signOutBtn');
            if (signOutBtn) signOutBtn.addEventListener('click', handleLogout);

            const dropdownSignOut = document.getElementById('dropdownSignOut');
            if (dropdownSignOut) dropdownSignOut.addEventListener('click', handleLogout);
        }

        async function loadSubmittedApplications(profileId) {
            try {
                const { data: applications, error } = await supabase
                    .from('applications')
                    .select('*, profiles!applications_user_id_fkey(full_name, organization)')
                    .eq('agent_id', profileId)
                    .eq('status', 'submitted')
                    .order('created_at', { ascending: false })
                    .limit(50);

                if (error) throw error;

                const submittedList = document.getElementById('submittedList');
                if (!applications || applications.length === 0) {
                    submittedList.innerHTML = '<div class="text-center py-4 text-gray-500">No submitted applications found</div>';
                    return;
                }

                submittedList.innerHTML = applications.map(app => {
                    const clientName = app.profiles?.full_name || app.profiles?.organization || 'Unknown';
                    const iconClass = getApplicationIcon(app.application_type);
                    const iconBgClass = getApplicationIconBg(app.application_type);
                    const timeStr = formatTimeAgo(app.created_at);
                    const viewLink = getApplicationViewLink(app);

                    return `
                        <div class="notification-item">
                            <div class="flex items-start gap-3">
                                <div class="w-10 h-10 rounded-full ${iconBgClass} flex items-center justify-center flex-shrink-0">
                                    <i class="${iconClass} text-xl"></i>
                                </div>
                                <div class="flex-1">
                                    <h4 class="font-semibold text-sm">${app.application_type || 'Application'} Submitted</h4>
                                    <p class="text-sm text-gray-600 mt-1">${app.application_number || 'N/A'} submitted for client ${clientName}.</p>
                                    <div class="flex items-center gap-4 mt-2">
                                        <span class="notif-time"><i class="ri-time-line mr-1"></i>${timeStr}</span>
                                        <a href="${viewLink}" class="text-blue-600 text-sm hover:underline">View Application</a>
                                    </div>
                                </div>
                            </div>
                        </div>
                    `;
                }).join('');
            } catch (error) {
                console.error('Error loading submitted applications:', error);
                document.getElementById('submittedList').innerHTML = '<div class="text-center py-4 text-red-500">Error loading submitted applications</div>';
            }
        }

        function getApplicationIcon(type) {
            const icons = {
                cvet: 'ri-file-text-line text-blue-600',
                direct_assessment: 'ri-file-search-line text-emerald-600',
                agent_license: 'ri-id-card-line text-purple-600',
                vehicle_query: 'ri-car-line text-orange-600'
            };
            return icons[type] || 'ri-file-line text-gray-600';
        }

        function getApplicationIconBg(type) {
            const bgs = {
                cvet: 'bg-blue-100',
                direct_assessment: 'bg-emerald-100',
                agent_license: 'bg-purple-100',
                vehicle_query: 'bg-orange-100'
            };
            return bgs[type] || 'bg-gray-100';
        }

        function formatTimeAgo(dateString) {
            const date = new Date(dateString);
            const now = new Date();
            const seconds = Math.floor((now - date) / 1000);

            if (seconds < 60) return 'Just now';
            if (seconds < 3600) return `${Math.floor(seconds / 60)} minutes ago`;
            if (seconds < 86400) return `${Math.floor(seconds / 3600)} hours ago`;
            if (seconds < 604800) return `${Math.floor(seconds / 86400)} days ago`;
            return date.toLocaleDateString();
        }

        function getApplicationViewLink(app) {
            const links = {
                cvet: 'tracking.html',
                direct_assessment: 'create-assessment.html',
                agent_license: 'verification.html',
                vehicle_query: 'search-vehicle.html'
            };
            return `${links[app.application_type] || 'tracking.html'}?id=${app.id}`;
        }

        function setupRealtimeSubscriptions(profileId) {
            // Subscribe to applications table changes
            const appChannel = supabase
                .channel('submitted-applications-apps')
                .on('postgres_changes', { event: '*', schema: 'public', table: 'applications' }, async () => {
                    console.log('Applications changed, reloading submitted...');
                    const { data: { user } } = await supabase.auth.getUser();
                    const profile = user ? await getUserProfile(user.id) : null;
                    await loadSubmittedApplications(profile?.id);
                })
                .subscribe();

            // Cleanup on page unload
            window.addEventListener('beforeunload', () => {
                supabase.removeChannel(appChannel);
            });
        }

        document.addEventListener('DOMContentLoaded', initPage);
        if (document.readyState === 'interactive' || document.readyState === 'complete') {
            initPage();
        }
    </script>
</body></html>
