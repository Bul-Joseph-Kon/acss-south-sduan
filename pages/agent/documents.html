<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>SSRA Customs · Agent Documents</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2"></script>
    <link href="../assets/icons/remixicon.css" rel="stylesheet" />
    <style>
        .gradient-bg { background: linear-gradient(135deg, #1e3a5f 0%, #2a5f8f 100%); }
        .sidebar-link { transition: all 0.3s ease; cursor: pointer; display: flex; align-items: center; gap: 0.75rem; padding: 0.6rem 1rem; border-radius: 0.5rem; font-size: 0.9rem; color: #4b5563; }
        .sidebar-link:hover, .sidebar-link.active { background-color: #e8f0fe; color: #1e3a5f; }
        .sidebar-link i { font-size: 1.2rem; width: 1.5rem; text-align: center; }
        .doc-upload-box { border: 2px dashed #d1d5db; border-radius: 0.5rem; padding: 1.5rem; text-align: center; transition: all 0.2s ease; cursor: pointer; }
        .doc-upload-box:hover { border-color: #1e3a5f; background: #e8f0fe; }
        .doc-upload-box .doc-icon { font-size: 2.5rem; color: #d1d5db; }
        .doc-upload-box.uploaded { border-color: #1e3a5f; background: #d1fae5; }
        .doc-upload-box.uploaded .doc-icon { color: #1e3a5f; }
        .profile-dropdown { position: absolute; right: 0; top: calc(100% + 0.5rem); background: white; border-radius: 0.75rem; box-shadow: 0 10px 25px rgba(0,0,0,0.1); border: 1px solid #e5e7eb; min-width: 200px; z-index: 50; overflow: hidden; opacity: 0; transform: translateY(-10px); pointer-events: none; transition: all 0.2s ease; }
        .profile-dropdown.open { opacity: 1; transform: translateY(0); pointer-events: auto; }
        .profile-dropdown a { display: flex; align-items: center; gap: 0.75rem; padding: 0.6rem 1rem; font-size: 0.85rem; color: #374151; transition: background 0.15s; cursor: pointer; text-decoration: none; }
        .profile-dropdown a:hover { background: #e8f0fe; color: #1e3a5f; }
        .profile-dropdown .divider { height: 1px; background: #e5e7eb; margin: 0.25rem 0; }
        .profile-dropdown .danger { color: #dc2626; }
        .profile-dropdown .danger:hover { background: #fef2f2; color: #dc2626; }
        .header-profile-btn { cursor: pointer; display: flex; align-items: center; gap: 0.5rem; padding: 0.3rem 0.75rem 0.3rem 0.5rem; border-radius: 9999px; background: rgba(255,255,255,0.2); transition: background 0.2s; border: 1px solid rgba(255,255,255,0.3); }
        .header-profile-btn:hover { background: rgba(255,255,255,0.3); }
        .header-profile-btn .avatar-sm { width: 2rem; height: 2rem; border-radius: 50%; background: white; display: flex; align-items: center; justify-content: center; color: #1e3a5f; }
    </style>
</head>
<body>
    <div class="min-h-screen bg-gray-100">
        <div class="max-w-7xl mx-auto px-4 py-5">
            <div class="flex flex-col lg:flex-row gap-6">
                <aside class="lg:w-72 flex-shrink-0">
                    <div id="agent-sidebar"></div>
                </aside>

                <main class="flex-1 space-y-5">
                    <div class="gradient-bg rounded-2xl p-5 text-white shadow-lg flex items-center justify-between">
                        <div>
                            <h2 class="text-2xl font-bold tracking-tight">📎 Step 4: Upload Documents</h2>
                            <p class="opacity-90 text-sm">Upload required supporting documents</p>
                        </div>
                        <div class="relative">
                            <button onclick="document.getElementById('profileDropdown').classList.toggle('open')" class="header-profile-btn">
                                <span class="avatar-sm"><i class="ri-user-line"></i></span>
                                <span class="text-sm font-medium hidden sm:inline">Agent</span>
                                <i class="ri-arrow-down-s-line text-sm"></i>
                            </button>
                            <div class="profile-dropdown" id="profileDropdown">
                                <a href="#"><i class="ri-user-settings-line"></i> My Profile</a>
                                <a href="#"><i class="ri-edit-line"></i> Edit Profile</a>
                                <div class="divider"></div>
                                <a href="#" id="dropdownSignOut" class="danger"><i class="ri-logout-box-line"></i> Sign Out</a>
                            </div>
                        </div>
                    </div>

                    <div class="bg-white rounded-xl border border-gray-200 p-4 shadow-sm">
                        <div class="flex items-center justify-between text-sm text-gray-500 mb-2">
                            <span>Step 4 of 8</span>
                            <span>50% Complete</span>
                        </div>
                        <div class="w-full bg-gray-200 rounded-full h-2">
                            <div class="bg-blue-600 h-2 rounded-full" style="width:50%"></div>
                        </div>
                    </div>

                    <div class="bg-white rounded-xl border border-gray-200 p-5 shadow-sm">
                        <h3 class="font-bold text-lg mb-4">Required Documents</h3>
                        <div class="grid md:grid-cols-2 lg:grid-cols-4 gap-4">
                            <div class="doc-upload-box" id="packingListBox" onclick="document.getElementById('packingListInput').click()">
                                <i class="ri-file-pdf-2-line doc-icon"></i>
                                <p class="font-medium text-sm mt-1">Packing List <span class="text-red-500">*</span></p>
                                <p class="text-xs text-gray-400" id="packingListStatus">Not uploaded</p>
                                <input type="file" id="packingListInput" class="hidden" accept=".pdf,.doc,.docx" onchange="handleFileUpload(this, 'packing_list')" />
                            </div>
                            <div class="doc-upload-box" id="billOfLadingBox" onclick="document.getElementById('billOfLadingInput').click()">
                                <i class="ri-file-pdf-2-line doc-icon"></i>
                                <p class="font-medium text-sm mt-1">Bill of Lading <span class="text-red-500">*</span></p>
                                <p class="text-xs text-gray-400" id="billOfLadingStatus">Not uploaded</p>
                                <input type="file" id="billOfLadingInput" class="hidden" accept=".pdf,.doc,.docx" onchange="handleFileUpload(this, 'bill_of_lading')" />
                            </div>
                            <div class="doc-upload-box" id="certificateOfOriginBox" onclick="document.getElementById('certificateOfOriginInput').click()">
                                <i class="ri-file-pdf-2-line doc-icon"></i>
                                <p class="font-medium text-sm mt-1">Certificate of Origin <span class="text-red-500">*</span></p>
                                <p class="text-xs text-gray-400" id="certificateOfOriginStatus">Not uploaded</p>
                                <input type="file" id="certificateOfOriginInput" class="hidden" accept=".pdf,.doc,.docx" onchange="handleFileUpload(this, 'certificate_of_origin')" />
                            </div>
                            <div class="doc-upload-box" id="importPermitBox" onclick="document.getElementById('importPermitInput').click()">
                                <i class="ri-file-pdf-2-line doc-icon"></i>
                                <p class="font-medium text-sm mt-1">Import Permit <span class="text-red-500">*</span></p>
                                <p class="text-xs text-gray-400" id="importPermitStatus">Not uploaded</p>
                                <input type="file" id="importPermitInput" class="hidden" accept=".pdf,.doc,.docx" onchange="handleFileUpload(this, 'import_permit')" />
                            </div>
                        </div>

                        <div class="flex justify-between mt-4 pt-4 border-t border-gray-200">
                            <a href="goods-information.html" class="bg-gray-100 hover:bg-gray-200 text-gray-700 px-6 py-2 rounded-lg text-sm font-semibold transition flex items-center gap-1">
                                <i class="ri-arrow-left-line"></i> Previous
                            </a>
                            <button id="uploadContinueBtn" class="bg-blue-600 hover:bg-blue-700 text-white px-6 py-2 rounded-lg text-sm font-semibold transition flex items-center gap-1">
                                Upload & Continue <i class="ri-arrow-right-line"></i>
                            </button>
                        </div>
                    </div>
                </main>
            </div>
        </div>
    </div>
    <script>
        document.addEventListener('click', function(e) {
            if (!e.target.closest('.header-profile-btn') && !e.target.closest('.profile-dropdown')) {
                document.getElementById('profileDropdown').classList.remove('open');
            }
        });
    </script>

        <script type="module" src="../../js/agent-sidebar.js"></script>
<!-- Supabase & Shared Authentication Guards -->
    <script type="module">
        import supabase from '../../js/supabase.js';
        import { checkPageAuth } from '../../js/auth-check.js';
        import { signOut } from '../../js/auth.js';
        import { loadCurrentUserProfile } from '../../js/profile-loader.js';
        import { 
            saveDraft, 
            loadDraft,
            getCurrentApplication,
            getDraftData 
        } from '../../js/agent-declaration-service.js';

        async function initPage() {
            console.log('=== INITIALIZING AUTH GUARD ON MOCK PAGE ===');
            const role = 'agent';
            
            // 1. Run auth check
            const hasAccess = await checkPageAuth(role);
            if (!hasAccess) {
                console.log('Access denied, redirecting...');
                return;
            }

            // 2. Load profile data from Supabase
            const { user, profile } = await loadCurrentUserProfile();
            
            // 3. Update sidebar and profile UI
            if (profile) {
                const displayName = profile.full_name || user?.email || 'User';
                const displayRole = role === 'agent' ? 'Clearing Agent' : 'Trader';
                
                const nameEl = document.getElementById(role + 'ProfileName') || document.querySelector('[data-user-name]');
                if (nameEl) nameEl.textContent = displayName;
                
                const roleEl = document.getElementById(role + 'ProfileRole') || document.querySelector('[data-user-role]');
                if (roleEl) roleEl.textContent = displayRole;
                
                const statusEl = document.getElementById(role + 'ProfileStatus');
                if (statusEl) statusEl.textContent = '● ' + (profile.status || 'Active');
                
                const tinEl = document.getElementById(role + 'ProfileTIN');
                if (tinEl && profile.organization) {
                    tinEl.textContent = 'Org: ' + profile.organization;
                }
            }

            // 4. Bind Logout Button Listeners
            const handleLogout = async (e) => {
                e.preventDefault();
                console.log('Signing out...');
                const result = await signOut();
                if (result.success) {
                    window.location.href = '../../auth/login.html';
                }
            };

            const signOutBtn = document.getElementById('signOutBtn');
            if (signOutBtn) signOutBtn.addEventListener('click', handleLogout);

            const dropdownSignOut = document.getElementById('dropdownSignOut');
            if (dropdownSignOut) dropdownSignOut.addEventListener('click', handleLogout);
        }

        document.addEventListener('DOMContentLoaded', initPage);
        if (document.readyState === 'interactive' || document.readyState === 'complete') {
            initPage();
        }

        // ================================================================
        // FORM HANDLING - DOCUMENTS UPLOAD
        // ================================================================

        const urlParams = new URLSearchParams(window.location.search);
        const applicationId = urlParams.get('application_id');
        let uploadedDocuments = {
            packing_list: null,
            bill_of_lading: null,
            certificate_of_origin: null,
            import_permit: null
        };

        if (applicationId) {
            loadExistingDraft(applicationId);
        }

        async function loadExistingDraft(appId) {
            try {
                const result = await loadDraft(appId);
                if (result.success && result.data) {
                    const draft = getDraftData();
                    if (draft.documents) {
                        uploadedDocuments = draft.documents;
                        updateDocumentUI();
                    }
                }
            } catch (error) {
                console.error('Error loading draft:', error);
            }
        }

        window.handleFileUpload = function(input, docType) {
            const file = input.files[0];
            if (!file) return;

            // Store file reference (in production, upload to Supabase Storage)
            uploadedDocuments[docType] = {
                name: file.name,
                size: file.size,
                type: file.type,
                uploaded_at: new Date().toISOString()
            };

            // Update UI
            const statusEl = document.getElementById(docType + 'Status');
            const boxEl = document.getElementById(docType + 'Box');
            if (statusEl) {
                statusEl.textContent = '✓ Uploaded';
                statusEl.className = 'text-xs text-green-600';
            }
            if (boxEl) {
                boxEl.classList.add('uploaded');
            }
        };

        function updateDocumentUI() {
            Object.keys(uploadedDocuments).forEach(docType => {
                if (uploadedDocuments[docType]) {
                    const statusEl = document.getElementById(docType + 'Status');
                    const boxEl = document.getElementById(docType + 'Box');
                    if (statusEl) {
                        statusEl.textContent = '✓ Uploaded';
                        statusEl.className = 'text-xs text-green-600';
                    }
                    if (boxEl) {
                        boxEl.classList.add('uploaded');
                    }
                }
            });
        }

        document.getElementById('uploadContinueBtn').addEventListener('click', async (e) => {
            e.preventDefault();
            
            if (!applicationId) {
                alert('No application ID found. Please start from the beginning.');
                window.location.href = 'declarant-information.html';
                return;
            }

            // Check if required documents are uploaded
            const requiredDocs = ['packing_list', 'bill_of_lading'];
            const missingDocs = requiredDocs.filter(doc => !uploadedDocuments[doc]);
            
            if (missingDocs.length > 0) {
                alert('Please upload all required documents (Packing List and Bill of Lading)');
                return;
            }

            // Save draft with documents
            const result = await saveDraft('documents', uploadedDocuments);
            
            if (result.success) {
                // Navigate to AI validation step
                window.location.href = `ai-validation.html?application_id=${applicationId}`;
            } else {
                alert('Error saving documents: ' + result.error);
            }
        });
    </script>
</body></html>
