<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>SSRA Customs · Payment Verification</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <link href="../assets/icons/remixicon.css" rel="stylesheet" />
    <script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2"></script>
    <script type="module" src="../../js/revenue-sidebar.js"></script>
    <style>
        .gradient-bg { background: linear-gradient(135deg, #1e3a5f 0%, #2a5f8f 100%); }
        .sidebar-link { transition: all 0.3s ease; cursor: pointer; display: flex; align-items: center; gap: 0.75rem; padding: 0.6rem 1rem; border-radius: 0.5rem; font-size: 0.9rem; color: #4b5563; }
        .sidebar-link:hover, .sidebar-link.active { background-color: #e8f0fe; color: #1e3a5f; }
        .sidebar-link i { font-size: 1.2rem; width: 1.5rem; text-align: center; }
        .status-badge { padding: 0.2rem 0.6rem; border-radius: 9999px; font-size: 0.65rem; font-weight: 600; }
        .status-approved { background: #d1fae5; color: #065f46; }
        .status-pending { background: #fef3c7; color: #92400e; }
        .status-review { background: #dbeafe; color: #1e40af; }
        .status-failed { background: #fee2e2; color: #991b1b; }
        .profile-dropdown { position: absolute; right: 0; top: calc(100% + 0.5rem); background: white; border-radius: 0.75rem; box-shadow: 0 10px 25px rgba(0,0,0,0.1); border: 1px solid #e5e7eb; min-width: 200px; z-index: 50; overflow: hidden; opacity: 0; transform: translateY(-10px); pointer-events: none; transition: all 0.2s ease; }
        .profile-dropdown.open { opacity: 1; transform: translateY(0); pointer-events: auto; }
        .profile-dropdown a { display: flex; align-items: center; gap: 0.75rem; padding: 0.6rem 1rem; font-size: 0.85rem; color: #374151; transition: background 0.15s; cursor: pointer; text-decoration: none; }
        .profile-dropdown a:hover { background: #e8f0fe; color: #1e3a5f; }
        .profile-dropdown .divider { height: 1px; background: #e5e7eb; margin: 0.25rem 0; }
        .profile-dropdown .danger { color: #dc2626; }
        .profile-dropdown .danger:hover { background: #fef2f2; color: #dc2626; }
        .header-profile-btn { cursor: pointer; display: flex; align-items: center; gap: 0.5rem; padding: 0.3rem 0.75rem 0.3rem 0.5rem; border-radius: 9999px; background: rgba(255,255,255,0.2); transition: background 0.2s; border: 1px solid rgba(255,255,255,0.3); }
        .header-profile-btn:hover { background: rgba(255,255,255,0.3); }
        .header-profile-btn .avatar-sm { width: 2rem; height: 2rem; border-radius: 50%; background: white; display: flex; align-items: center; justify-content: center; color: #1e3a5f; }
        .payment-card { border: 1px solid #e5e7eb; border-radius: 0.75rem; padding: 1rem; transition: all 0.2s ease; background: white; }
        .payment-card:hover { border-color: #1e3a5f; background: #f8fafc; }
        .payment-details { background: #f8fafc; border-radius: 0.5rem; padding: 0.75rem; }
    </style>
</head>
<body>
    <div class="min-h-screen bg-gray-100">
        <div class="max-w-7xl mx-auto px-4 py-5">
            <div class="flex flex-col lg:flex-row gap-6">
                <aside class="lg:w-72 flex-shrink-0">
                    <div id="revenue-sidebar"></div>
                </aside>

                <main class="flex-1 space-y-5">
                    <div class="gradient-bg rounded-2xl p-5 text-white shadow-lg flex items-center justify-between">
                        <div>
                            <h2 class="text-2xl font-bold tracking-tight">💳 Payment Verification</h2>
                            <p class="opacity-90 text-sm">Verify payment transactions and receipts</p>
                        </div>
                        <div class="relative">
                            <button onclick="document.getElementById('profileDropdown').classList.toggle('open')" class="header-profile-btn">
                                <span class="avatar-sm"><i class="ri-user-line"></i></span>
                                <span class="text-sm font-medium hidden sm:inline">Revenue</span>
                                <i class="ri-arrow-down-s-line text-sm"></i>
                            </button>
                            <div class="profile-dropdown" id="profileDropdown">
                                <a href="#"><i class="ri-user-settings-line"></i> My Profile</a>
                                <a href="#"><i class="ri-edit-line"></i> Edit Profile</a>
                                <div class="divider"></div>
                                <a href="#" class="danger" id="dropdownSignOut"><i class="ri-logout-box-line"></i> Sign Out</a>
                            </div>
                        </div>
                    </div>

                    <div class="space-y-3">
                        <div class="text-center py-8 text-gray-500">Loading payments...</div>
                    </div>
                </main>
            </div>
        </div>
    </div>
    <script>
        document.addEventListener('click', function(e) {
            if (!e.target.closest('.header-profile-btn') && !e.target.closest('.profile-dropdown')) {
                document.getElementById('profileDropdown').classList.remove('open');
            }
        });
    </script>
    <script type="module">
        import { checkPageAuth } from '../../js/auth-check.js';
        import { loadCurrentUserProfile } from '../../js/profile-loader.js';
        import { signOut as authSignOut } from '../../js/auth.js';
        import { fetchPayments, updatePaymentStatus } from '../../js/payments.js';

        async function initPage() {
            await checkPageAuth('revenue');
            await loadCurrentUserProfile();
            await loadPayments();
        }

        async function loadPayments() {
            console.log('=== LOADING PAYMENTS FOR VERIFICATION ===');
            const result = await fetchPayments({ includeAll: true });
            if (result.success && result.data) {
                renderPayments(result.data);
            } else {
                console.error('Failed to load payments:', result.error);
            }
        }

        function renderPayments(payments) {
            const container = document.querySelector('.space-y-3');
            if (!container) return;

            let html = '';
            payments.forEach(payment => {
                let badgeClass = 'status-pending';
                let displayStatus = payment.status;

                if (payment.status === 'completed') {
                    badgeClass = 'status-approved';
                    displayStatus = 'Verified';
                } else if (payment.status === 'pending') {
                    badgeClass = 'status-review';
                    displayStatus = 'Pending Verification';
                } else if (payment.status === 'failed') {
                    badgeClass = 'status-failed';
                }

                html += `
                    <div class="payment-card" data-payment-id="${payment.id}">
                        <div class="flex flex-wrap justify-between items-start gap-2">
                            <div>
                                <h4 class="font-bold ${payment.status === 'completed' ? 'text-emerald-600' : 'text-blue-600'}">${payment.payment_number || 'N/A'}</h4>
                                <p class="text-sm text-gray-500">Transaction: ${payment.transaction_id || 'N/A'} · SSP ${(payment.amount || 0).toLocaleString()}</p>
                                <div class="payment-details mt-2">
                                    <div class="grid grid-cols-2 gap-2 text-sm">
                                        <div><span class="text-gray-500">Payment Method:</span> ${payment.payment_method || 'Mobile Money'}</div>
                                        <div><span class="text-gray-500">Receipt Number:</span> ${payment.receipt_number || 'N/A'}</div>
                                        <div><span class="text-gray-500">Payment Date:</span> ${payment.paid_at ? new Date(payment.paid_at).toLocaleDateString() : new Date(payment.created_at).toLocaleDateString()}</div>
                                        <div><span class="text-gray-500">Status:</span> <span class="status-badge ${badgeClass}">${displayStatus}</span></div>
                                    </div>
                                </div>
                            </div>
                            <div class="flex gap-2">
                                ${payment.status === 'pending' ? `
                                    <button class="bg-blue-600 text-white px-4 py-1.5 rounded-lg text-sm font-semibold hover:bg-blue-700 transition" onclick="verifyPayment('${payment.id}')">Verify</button>
                                ` : ''}
                                <button class="border border-gray-300 px-4 py-1.5 rounded-lg text-sm hover:bg-gray-50 transition" onclick="viewReceipt('${payment.id}')">Receipt</button>
                            </div>
                        </div>
                    </div>
                `;
            });

            container.innerHTML = html || '<p class="text-gray-500 text-center py-8">No payments pending verification</p>';
        }

        window.verifyPayment = async function(paymentId) {
            if (confirm('Verify this payment receipt?')) {
                const result = await updatePaymentStatus(paymentId, 'completed');
                if (result.success) {
                    alert('✓ Payment verified successfully');
                    await loadPayments();
                } else {
                    alert('Verification failed: ' + result.error);
                }
            }
        };

        window.viewReceipt = function(paymentId) {
            alert('Receipt viewer - Feature coming soon');
        };

        async function handleSignOut() {
            const result = await authSignOut();
            if (result.success) {
                window.location.href = '../../auth/login.html';
            }
        }

        document.getElementById('dropdownSignOut')?.addEventListener('click', handleSignOut);

        initPage();
    </script>
</body>
</html>
