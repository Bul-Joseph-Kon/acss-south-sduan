<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>SSRA Customs · Duty Verification</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2"></script>
    <link href="../assets/icons/remixicon.css" rel="stylesheet" />
    
    <script type="module" src="../../js/revenue-sidebar.js"></script>
    <style>
        .gradient-bg { background: linear-gradient(135deg, #1e3a5f 0%, #2a5f8f 100%); }
        .sidebar-link { transition: all 0.3s ease; cursor: pointer; display: flex; align-items: center; gap: 0.75rem; padding: 0.6rem 1rem; border-radius: 0.5rem; font-size: 0.9rem; color: #4b5563; }
        .sidebar-link:hover, .sidebar-link.active { background-color: #e8f0fe; color: #1e3a5f; }
        .sidebar-link i { font-size: 1.2rem; width: 1.5rem; text-align: center; }
        .status-badge { padding: 0.2rem 0.6rem; border-radius: 9999px; font-size: 0.65rem; font-weight: 600; }
        .status-approved { background: #d1fae5; color: #065f46; }
        .status-pending { background: #fef3c7; color: #92400e; }
        .status-review { background: #dbeafe; color: #1e40af; }
        .status-rejected { background: #fee2e2; color: #991b1b; }
        .profile-dropdown { position: absolute; right: 0; top: calc(100% + 0.5rem); background: white; border-radius: 0.75rem; box-shadow: 0 10px 25px rgba(0,0,0,0.1); border: 1px solid #e5e7eb; min-width: 200px; z-index: 50; overflow: hidden; opacity: 0; transform: translateY(-10px); pointer-events: none; transition: all 0.2s ease; }
        .profile-dropdown.open { opacity: 1; transform: translateY(0); pointer-events: auto; }
        .profile-dropdown a { display: flex; align-items: center; gap: 0.75rem; padding: 0.6rem 1rem; font-size: 0.85rem; color: #374151; transition: background 0.15s; cursor: pointer; text-decoration: none; }
        .profile-dropdown a:hover { background: #e8f0fe; color: #1e3a5f; }
        .profile-dropdown .divider { height: 1px; background: #e5e7eb; margin: 0.25rem 0; }
        .profile-dropdown .danger { color: #dc2626; }
        .profile-dropdown .danger:hover { background: #fef2f2; color: #dc2626; }
        .header-profile-btn { cursor: pointer; display: flex; align-items: center; gap: 0.5rem; padding: 0.3rem 0.75rem 0.3rem 0.5rem; border-radius: 9999px; background: rgba(255,255,255,0.2); transition: background 0.2s; border: 1px solid rgba(255,255,255,0.3); }
        .header-profile-btn:hover { background: rgba(255,255,255,0.3); }
        .header-profile-btn .avatar-sm { width: 2rem; height: 2rem; border-radius: 50%; background: white; display: flex; align-items: center; justify-content: center; color: #1e3a5f; }
        .verification-card { border: 1px solid #e5e7eb; border-radius: 0.75rem; padding: 1rem; transition: all 0.2s ease; background: white; }
        .verification-card:hover { border-color: #1e3a5f; background: #f8fafc; }
        .duty-details { background: #f8fafc; border-radius: 0.5rem; padding: 0.75rem; }
    </style>
</head>
<body>
    <div class="min-h-screen bg-gray-100">
        <div class="max-w-7xl mx-auto px-4 py-5">
            <div class="flex flex-col lg:flex-row gap-6">
                <aside class="lg:w-72 flex-shrink-0">
                    <div id="revenue-sidebar"></div>
                </aside>

                <main class="flex-1 space-y-5">
                    <div class="gradient-bg rounded-2xl p-5 text-white shadow-lg flex items-center justify-between">
                        <div>
                            <h2 class="text-2xl font-bold tracking-tight">Revenue Assessment</h2>
                            <p class="opacity-90 text-sm">Review approved applications, verify AI-calculated charges, and generate payment invoices</p>
                        </div>
                        <div class="relative">
                            <button onclick="document.getElementById('profileDropdown').classList.toggle('open')" class="header-profile-btn">
                                <span class="avatar-sm"><i class="ri-user-line"></i></span>
                                <span class="text-sm font-medium hidden sm:inline">Revenue</span>
                                <i class="ri-arrow-down-s-line text-sm"></i>
                            </button>
                            <div class="profile-dropdown" id="profileDropdown">
                                <a href="#"><i class="ri-user-settings-line"></i> My Profile</a>
                                <a href="#"><i class="ri-edit-line"></i> Edit Profile</a>
                                <div class="divider"></div>
                                <a href="#" class="danger" id="dropdownSignOut"><i class="ri-logout-box-line"></i> Sign Out</a>
                            </div>
                        </div>
                    </div>

                    <div class="space-y-3">
                        <div class="text-center py-8 text-gray-500">Loading approved applications...</div>
                    </div>
                </main>
            </div>
        </div>
    </div>
    <script>
        document.addEventListener('click', function(e) {
            if (!e.target.closest('.header-profile-btn') && !e.target.closest('.profile-dropdown')) {
                document.getElementById('profileDropdown').classList.remove('open');
            }
        });
    </script>
    <script type="module">
        import { checkPageAuth } from '../../js/auth-check.js';
        import { loadCurrentUserProfile } from '../../js/profile-loader.js';
        import { signOut as authSignOut, getCurrentUser } from '../../js/auth.js';
        import { getApprovedApplicationsForRevenue, calculateTaxesForApplication, getTaxCalculation, verifyTaxCalculation, generatePaymentInvoice } from '../../js/tax-calculation.js';

        let user = null;
        let profile = null;

        async function initPage() {
            await checkPageAuth('revenue');
            profile = await loadCurrentUserProfile();
            user = await getCurrentUser();
            await loadApprovedApplications();
        }

        async function loadApprovedApplications() {
            console.log('=== LOADING APPROVED APPLICATIONS FOR REVENUE ===');
            const result = await getApprovedApplicationsForRevenue();
            if (result.success && result.data) {
                await renderApplications(result.data);
            } else {
                console.error('Failed to load applications:', result.error);
            }
        }

        async function renderApplications(applications) {
            const container = document.querySelector('.space-y-3');
            if (!container) return;

            let html = '';
            for (const app of applications) {
                const calcResult = await getTaxCalculation(app.id);
                let calculation = calcResult.success ? calcResult.data : null;

                if (!calculation) {
                    await calculateTaxesForApplication(app.id);
                    const retryCalc = await getTaxCalculation(app.id);
                    if (retryCalc.success) {
                        calculation = retryCalc.data;
                    }
                }

                const statusBadge = calculation && calculation.verified 
                    ? '<span class="status-badge status-approved">✓ Verified</span>'
                    : calculation 
                    ? '<span class="status-badge status-review">Awaiting Verification</span>'
                    : '<span class="status-badge status-pending">Calculating...</span>';

                const aiConfidence = calculation ? Math.round(calculation.aiConfidence * 100) : 0;

                html += `
                    <div class="verification-card" data-app-id="${app.id}">
                        <div class="flex flex-wrap justify-between items-start gap-2">
                            <div>
                                <h4 class="font-bold text-blue-600">${app.application_number || 'N/A'}</h4>
                                <p class="text-sm text-gray-500">${app.company_name || app.applicant_name || 'Unknown'} · ${app.goods_category || 'General'} · SSP ${(app.total_amount || 0).toLocaleString()}</p>
                                <div class="duty-details mt-2">
                                    <div class="grid grid-cols-2 md:grid-cols-3 gap-2 text-sm">
                                        ${calculation ? `
                                            <div><span class="text-gray-500">Import Duty:</span> SSP ${(calculation.breakdown.importDuty?.amount || 0).toLocaleString()}</div>
                                            <div><span class="text-gray-500">VAT:</span> SSP ${(calculation.breakdown.vat?.amount || 0).toLocaleString()}</div>
                                            <div><span class="text-gray-500">Excise Duty:</span> SSP ${(calculation.breakdown.exciseDuty?.amount || 0).toLocaleString()}</div>
                                            <div><span class="text-gray-500">Processing Fees:</span> SSP ${(calculation.breakdown.processingFees?.amount || 0).toLocaleString()}</div>
                                            <div><span class="text-gray-500">Other Charges:</span> SSP ${(calculation.breakdown.otherCharges?.amount || 0).toLocaleString()}</div>
                                            <div><span class="text-gray-500">Total Payable:</span> <strong>SSP ${(calculation.totalPayable || 0).toLocaleString()}</strong></div>
                                        ` : '<div class="col-span-3 text-gray-500">Calculating taxes...</div>'}
                                    </div>
                                    <div class="mt-2 text-xs text-gray-500">
                                        AI confidence: ${aiConfidence}% - Status: ${statusBadge}
                                    </div>
                                </div>
                            </div>
                            <div class="flex gap-2">
                                ${calculation && !calculation.verified ? `
                                    <button class="bg-blue-600 text-white px-4 py-1.5 rounded-lg text-sm font-semibold hover:bg-blue-700 transition" onclick="verifyAssessment('${app.id}')">Verify</button>
                                ` : calculation && calculation.verified ? `
                                    <button class="bg-green-600 text-white px-4 py-1.5 rounded-lg text-sm font-semibold hover:bg-green-700 transition" onclick="viewInvoice('${app.id}')">View Invoice</button>
                                ` : ''}
                                <button class="border border-gray-300 px-4 py-1.5 rounded-lg text-sm hover:bg-gray-50 transition" onclick="generateInvoice('${app.id}')">Generate Invoice</button>
                            </div>
                        </div>
                    </div>
                `;
            }

            container.innerHTML = html || '<p class="text-gray-500 text-center py-8">No approved applications pending revenue assessment</p>';
        }

        window.verifyAssessment = async function(applicationId) {
            const notes = prompt('Enter verification notes (optional):');
            if (notes !== null) {
                const result = await verifyTaxCalculation(applicationId, {
                    officerId: user?.id,
                    notes: notes || ''
                });

                if (result.success) {
                    alert('✓ Assessment verified successfully');
                    await loadApprovedApplications();
                } else {
                    alert('Verification failed: ' + result.error);
                }
            }
        };

        window.generateInvoice = async function(applicationId) {
            if (confirm('Generate payment invoice for this application?')) {
                const result = await generatePaymentInvoice(applicationId, {
                    officerId: profile?.id
                });

                if (result.success) {
                    alert('✓ Invoice generated: ' + result.data.invoice_number);
                    await loadApprovedApplications();
                } else {
                    alert('Invoice generation failed: ' + result.error);
                }
            }
        };

        window.viewInvoice = async function(applicationId) {
            alert('Invoice viewer - Feature coming soon');
        };

        async function handleSignOut() {
            const result = await authSignOut();
            if (result.success) {
                window.location.href = '../../auth/login.html';
            }
        }

        document.getElementById('dropdownSignOut')?.addEventListener('click', handleSignOut);

        initPage();
    </script>
</body>
</html>
